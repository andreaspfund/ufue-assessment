<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>UFUE Assessment – Jupiter Confiserien AG</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%;overflow:hidden;font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;background:#111827;color:#e2e8f0}

#header{
  height:48px;display:flex;align-items:center;gap:12px;padding:0 16px;
  background:#0f0f1a;border-bottom:2px solid #f59e0b;flex-shrink:0;
}
#header .logo{font-size:16px;font-weight:700;color:#f8fafc;letter-spacing:-0.3px}
#header .logo span{color:#f59e0b}
#header .subtitle{font-size:11px;color:#64748b}
.hbadge{margin-left:auto;background:#f59e0b;color:#0f0f1a;font-size:9px;font-weight:700;padding:3px 9px;border-radius:20px;letter-spacing:1px;text-transform:uppercase}

#app{display:flex;height:calc(100vh - 48px)}

#board-wrap{flex:1;display:flex;flex-direction:column;overflow:hidden;min-width:0}

#board-toolbar{
  display:flex;align-items:center;gap:6px;padding:8px 14px;
  background:#111827;border-bottom:1px solid #1f2937;flex-shrink:0;
}
.tbtn{
  background:#1f2937;border:1px solid #374151;border-radius:6px;color:#9ca3af;
  font-size:11px;font-weight:600;padding:5px 12px;cursor:pointer;transition:all .15s;font-family:inherit;
}
.tbtn:hover{background:#374151;color:#f8fafc}
#hint{margin-left:auto;font-size:10px;color:#4b5563}

#canvas-outer{
  flex:1;overflow:hidden;cursor:grab;position:relative;
  background:#ffffff;
}
#canvas-outer.grabbing{cursor:grabbing}
#canvas-inner{
  position:absolute;top:0;left:0;
  transform-origin:0 0;
  will-change:transform;
}
#canvas-inner svg{
  display:block;
  shape-rendering:geometricPrecision;
  text-rendering:optimizeLegibility;
}

#sidebar{
  width:295px;flex-shrink:0;display:flex;flex-direction:column;
  background:#111827;border-left:1px solid #1f2937;
}

#player{padding:14px;border-bottom:1px solid #1f2937;flex-shrink:0}
.player-label{font-size:9px;font-weight:700;letter-spacing:1.5px;text-transform:uppercase;color:#4b5563;margin-bottom:6px}
#ch-now-title{font-size:12.5px;font-weight:700;color:#f8fafc;margin-bottom:2px;line-height:1.3}
#ch-now-sub{font-size:10px;color:#6b7280;margin-bottom:10px}

#prog-wrap{height:4px;background:#1f2937;border-radius:4px;cursor:pointer;margin-bottom:12px}
#prog-fill{height:100%;background:#f59e0b;border-radius:4px;width:0%;transition:width .3s linear}
#prog-wrap:hover #prog-fill{background:#fbbf24}

#controls{display:flex;align-items:center;gap:6px;margin-bottom:10px}
.cbtn{
  background:#1f2937;border:1px solid #374151;border-radius:6px;
  color:#9ca3af;padding:6px 10px;cursor:pointer;font-size:12px;
  transition:all .15s;font-family:inherit;
}
.cbtn:hover{background:#374151;color:#f8fafc}
.cbtn.play{background:#1d4ed8;border-color:#1d4ed8;color:#fff;flex:1;font-weight:600}
.cbtn.play:hover{background:#1e40af}
.cbtn.stop{color:#ef4444;border-color:#3f1f1f}
.cbtn.stop:hover{background:#3f1f1f}

#settings{display:flex;gap:6px;margin-bottom:8px}
select{
  background:#1f2937;border:1px solid #374151;border-radius:6px;
  color:#9ca3af;padding:5px 8px;font-size:11px;font-family:inherit;cursor:pointer;flex:1;
}

#speaking-bar{display:flex;align-items:center;gap:8px;height:18px}
.wave{display:flex;gap:2px;align-items:center}
.wave span{width:3px;height:10px;background:#f59e0b;border-radius:2px;animation:wv 1s ease-in-out infinite}
.wave span:nth-child(2){animation-delay:.1s;height:16px}
.wave span:nth-child(3){animation-delay:.2s;height:8px}
.wave span:nth-child(4){animation-delay:.3s;height:14px}
.wave span:nth-child(5){animation-delay:.4s;height:10px}
@keyframes wv{0%,100%{transform:scaleY(1)}50%{transform:scaleY(1.7)}}
.wave-label{font-size:10px;color:#f59e0b;font-weight:600}
.hidden{visibility:hidden}

#ch-list-header{
  padding:10px 14px 6px;font-size:9px;font-weight:700;
  letter-spacing:1.5px;text-transform:uppercase;color:#4b5563;
  border-bottom:1px solid #1f2937;flex-shrink:0;display:flex;align-items:center;gap:8px;
}
#ch-list{flex:1;overflow-y:auto}
#ch-list::-webkit-scrollbar{width:4px}
#ch-list::-webkit-scrollbar-thumb{background:#374151;border-radius:4px}

.ch-item{
  display:flex;align-items:flex-start;gap:10px;padding:9px 14px;cursor:pointer;
  border-left:3px solid transparent;transition:all .15s;border-bottom:1px solid #1f293720;
}
.ch-item:hover{background:#1f2937}
.ch-item.active{background:#1e3a5f30;border-left-color:#f59e0b}
.ch-item.done .ch-num{background:#15803d!important;color:#fff!important;border-color:#15803d!important}
.ch-num{
  width:22px;height:22px;border-radius:50%;background:#1f2937;border:1px solid #374151;
  display:flex;align-items:center;justify-content:center;
  font-size:9px;font-weight:700;color:#6b7280;flex-shrink:0;font-family:monospace;transition:all .2s;
}
.ch-item.active .ch-num{background:#f59e0b;color:#0f0f1a;border-color:#f59e0b}
.ch-meta{flex:1;min-width:0}
.ch-title-list{font-size:11px;font-weight:600;color:#e2e8f0;line-height:1.3;margin-bottom:1px}
.ch-preview{font-size:9.5px;color:#4b5563;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.ch-item.active .ch-preview{color:#9ca3af}
</style>
</head>

  <div class="logo">📋 UFUE <span>Assessment</span></div>
  <div class="subtitle">Jupiter Confiserien AG &nbsp;·&nbsp; HF WISS Unternehmensführung</div>
  <div class="hbadge">für dummies</div>
</div>

      <span id="hint">Ziehen · Scrollrad zum Zoomen · Doppelklick zum Fit</span>

<script>
const CHAPTERS = [{"id": 1, "icon": "🏛️", "color": "#1E3A5F", "badge": "Block 1", "title": "Management-Ebenen & Unternehmensführung", "sub": "Normativ · Strategisch · Operativ · Input-Output", "paragraphs": [{"section": "Einstieg", "text": "Stell dir ein Restaurant vor. Der Koch am Herd — das ist das operative Management. Der Restaurantleiter, der den Wochenplan schreibt, das Budget kontrolliert und Mitarbeitende einteilt — das ist operativ. Der Inhaber, der überlegt, ob er ein zweites Restaurant eröffnet, welche Küche er anbietet, welchen Kundenkreis er ansprechen will — das ist strategisch. Und die Frage «Wofür stehen wir überhaupt? Wollen wir das günstigste Schnitzel oder das beste Erlebnis?» — das ist normativ."}, {"section": "Normatives Management", "text": "Das normative Management ist die höchste Ebene. Hier geht es um Werte, Kultur, Leitbild und die grundlegende Ausrichtung. Es beantwortet die Frage: Warum existieren wir, und wofür stehen wir? Das ist langfristig, oft jahrzehntelang stabil. Bei Jupiter bedeutet das: Premium-Chocolaterie, Handwerk, Tradition seit 1905. Das ist der Nordstern, der alle anderen Entscheidungen leitet. Wenn der normative Rahmen fehlt, verliert das Unternehmen seine Identität — und genau das ist bei Jupiter passiert: Kein klares Leitbild, deshalb war die Positionierung unscharf."}, {"section": "Strategisches Management", "text": "Das strategische Management fragt: Wo wollen wir in 3 bis 5 Jahren sein, und wie kommen wir dahin? Es trifft Richtungsentscheidungen. Bei Jupiter: Wollen wir 26 Filialen betreiben oder lieber 16 mit maximaler Profitabilität? Wollen wir E-Commerce aufbauen? Wollen wir B2B-Kunden gewinnen? Strategische Entscheidungen sind schwer umkehrbar und teuer. Wer eine Filiale eröffnet, hat einen Mietvertrag auf 5 Jahre. Wer eine Marke aufbaut, braucht Jahre. Deshalb braucht man Instrumente wie SWOT, BCG und Porter, um strategische Entscheidungen zu fundieren."}, {"section": "Operatives Management", "text": "Das operative Management ist der Alltag: Budgets, Monatsberichte, Schichtplanung, Bestellungen. Bei Jupiter: Die Filialleiterin in Basel plant ihre Woche, bestellt Ware, führt das Team. Das operative Management setzt um, was die Strategie vorgibt. Der klassische Fehler: Man verliert sich im Operativen und vergisst das Strategische. Man ist beschäftigt, aber nicht wirkungsvoll. Oder umgekehrt: Man hat eine brillante Strategie, aber die operative Umsetzung funktioniert nicht. Bei Jupiter ist genau das passiert — die strategische Neuausrichtung 2008 wurde operativ nicht konsequent genug umgesetzt."}, {"section": "Das Input-Output-System", "text": "Das Unternehmen als Input-Output-System ist ein einfaches aber mächtiges Denkmodell. Inputs sind Kapital, Mitarbeitende, Wissen, Rohstoffe. Outputs sind Produkte, Dienstleistungen, Kundenzufriedenheit. Dazwischen liegt der Transformationsprozess. Unternehmensführung bedeutet: Diesen Transformationsprozess so zu gestalten, dass aus möglichst wenig Input möglichst viel Output entsteht. Bei Jupiter: Der Input «Lembacher-Produkte» ist hochwertig. Aber der Transformationsprozess — also die Filialstruktur, die Kosten, das Management — ist ineffizient. Deshalb kommt hinten trotz gutem Produkt zu wenig raus."}, {"section": "Zusammenhang zwischen den Ebenen", "text": "Diese drei Ebenen sind nicht unabhängig — sie bauen zwingend aufeinander auf. Das normative Management gibt den Rahmen vor. Das strategische Management entwickelt daraus einen Plan. Das operative Management setzt um. Wenn eine Ebene fehlt oder falsch ist, bricht alles zusammen. Ein häufiger Fehler: Man arbeitet auf der operativen Ebene perfekt, aber die Strategie ist falsch. Man läuft sehr effizient in die falsche Richtung. Das ist wie ein Taxifahrer, der zu schnell fährt, aber die falsche Strasse nimmt. Jupiter 2010: Operativ lief viel gut — erfahrene Mitarbeitende, gute Produkte. Aber strategisch waren zu viele falsche Filialen geöffnet. Das operativ perfekte Führen von Verlustfilialen hilft nichts."}]}, {"id": 2, "icon": "👥", "color": "#0F766E", "badge": "Block 1", "title": "Shareholder vs. Stakeholder & Führungsorgane", "sub": "Interessen · GV · VR · GL · Leitbild", "paragraphs": [{"section": "Shareholder-Ansatz", "text": "Der Shareholder-Ansatz sagt: Das Unternehmen gehört den Aktionären. Das oberste Ziel ist die Maximierung des Aktionärswerts — also Gewinn, Dividende, Kurssteigerung. Alles andere ist sekundär. Der bekannteste Vertreter ist Milton Friedman, der 1970 schrieb: «The social responsibility of business is to increase its profits.» Das klingt radikal — aber es gibt eine Logik dahinter: Wenn jedes Unternehmen seinen Gewinn maximiert, fliessen Ressourcen in produktive Verwendungen, und die Gesellschaft profitiert insgesamt."}, {"section": "Stakeholder-Ansatz", "text": "Der Stakeholder-Ansatz sagt: Ein Unternehmen trägt Verantwortung gegenüber allen Anspruchsgruppen, nicht nur den Aktionären. Stakeholder sind: Mitarbeitende, Kunden, Lieferanten, Staat, Gesellschaft, Medien, Nachbarn. Der Ansatz sagt: Wer nur auf Aktionäre schaut, vernachlässigt die anderen Gruppen, und das rächt sich langfristig. Bei Jupiter: Die 70 Mitarbeitenden, die entlassen werden, sind Stakeholder. Wie man sie behandelt, beeinflusst das Unternehmensimage — und damit die Kundentreue und den Umsatz."}, {"section": "Was ist besser?", "text": "Die Antwort der modernen Unternehmensführung: Beides zusammen. Man nennt das den «Enlightened Shareholder Value»: Kurzfristig muss man Gewinne erzielen. Aber langfristig geht das nur, wenn man Mitarbeitende fair behandelt, Kunden begeistert, Lieferanten respektiert und gesellschaftlich verantwortlich handelt. Corporate Social Responsibility — kurz CSR — ist dieser Gedanke: Verantwortung übernehmen nicht weil man muss, sondern weil es langfristig besser ist. Bei Jupiter: Würdevoller Umgang mit den entlassenen Mitarbeitenden ist nicht Gutmenschentum — es schützt die Premiummarke."}, {"section": "Führungsorgane der AG", "text": "Eine Aktiengesellschaft in der Schweiz hat drei Führungsorgane. Die Generalversammlung ist die oberste Instanz — sie beschliesst Statuten, wählt den Verwaltungsrat und genehmigt den Jahresabschluss. Der Verwaltungsrat überwacht und kontrolliert. Er hat Pflichten, die er nicht delegieren darf — wie die Oberleitungspflicht oder die Pflicht zur Einleitung des Konkurses bei Überschuldung. Die Geschäftsleitung führt operativ. Bei Jupiter: Der VR hat Lembacher übernommen, die GL führt die 26 Filialen. Der VR trägt die letzte Verantwortung für OR 725a — die Überschuldungssituation."}, {"section": "Führungsorgane und Prüfung", "text": "Im Assessment müssen Sie zeigen, dass Sie die Hierarchie verstehen: GV beschliesst — VR überwacht und entscheidet strategisch — GL führt operativ. Bei der Massenentlassung: Der VR beschliesst die Schliessung von zehn Filialen. Die GL setzt um. Die Filialleiterinnen führen die Kündigungsgespräche. Jede Ebene hat ihre Zuständigkeit — und ihre Grenzen. Wer in der Prüfung schreibt «der Chef entscheidet alles», zeigt, dass er die Governance-Struktur nicht verstanden hat."}]}, {"id": 3, "icon": "🔭", "color": "#6D28D9", "badge": "Block 1", "title": "Vision, Leitbild & Unternehmenskultur", "sub": "Purpose · Eisberg-Modell · Werte · Wertvorstellungsprofil", "paragraphs": [{"section": "Was ist ein Leitbild?", "text": "Ein Leitbild ist ein schriftliches Bekenntnis: Wofür steht dieses Unternehmen? Es beantwortet drei Fragen. Wer sind wir? Was tun wir? Und wie tun wir es? Das Leitbild der Hilti AG sagt zum Beispiel: «Wir begeistern unsere Kunden und bauen eine bessere Zukunft.» Das klingt einfach — aber dahinter steckt eine klare Aussage: Wir sind mehr als ein Schraubenverkäufer, wir sind ein Partner im Bau. Für Jupiter: Es gibt kein Leitbild! Das ist ein fundamentales Problem, denn ohne Leitbild weiss niemand, wofür das Unternehmen steht."}, {"section": "Vision ist das Zukunftsbild", "text": "Die Vision beschreibt, wo das Unternehmen in 10 bis 20 Jahren stehen will. Sie ist emotional, motivierend, fast utopisch. Ein bekanntes Beispiel: John F. Kennedy sagt 1961: «Wir werden bis Ende des Jahrzehnts einen Menschen auf den Mond bringen.» Das war die Vision. Konkret, messbar, inspirierend. Für Jupiter: Eine mögliche Vision wäre «Bis 2030 sind wir die meistgeliebte Premium-Chocolaterie der Schweiz — bekannt für handgemachte Erlebnisse, die man nirgendwo anders bekommt.» Dieser Satz gibt Richtung für alle strategischen Entscheidungen."}, {"section": "Mission ist der tägliche Auftrag", "text": "Die Mission ist konkreter als die Vision. Sie beschreibt den heutigen Zweck: Für wen? Was? Wie? Google's Mission: «Informationen der Welt zu organisieren, damit sie für alle zugänglich und nutzbar sind.» Klar, präzise, handlungsleitend. Für Jupiter: «Wir bieten frische, handgemachte Schokolade in den besten Lagen der Schweiz — für Geniesser, die mehr erwarten als ein Supermarktregal.» Diese Mission schliesst automatisch aus: Kein Discount. Keine Randlagen. Keine Massenware."}, {"section": "Das Eisberg-Modell der Unternehmenskultur", "text": "Die Unternehmenskultur ist wie ein Eisberg. Über der Wasseroberfläche ist nur ein kleiner Teil sichtbar: Das Logo, der Dresscode, die Sprache im Unternehmen, die Rituale. Zum Beispiel: Bei Jupiter trägt jede Verkäuferin eine einheitliche Schürze und begrüsst jeden Kunden mit dem Vornamen. Das ist sichtbar. Unter der Oberfläche — und das macht 90 Prozent aus — liegen die unsichtbaren Werte: Wie gehen wir miteinander um? Was ist bei uns erlaubt, was nicht? Wie reagieren wir auf Fehler? Werden Mitarbeitende ermutigt, neue Ideen einzubringen — oder bestraft? Diese unsichtbare Kultur bestimmt alles. Und sie zu verändern braucht Jahre."}, {"section": "Peter Drucker und Kulturkonflikte", "text": "Peter Drucker, einer der grössten Managementdenker, hat gesagt: «Culture eats strategy for breakfast.» Was bedeutet das? Selbst die beste Strategie scheitert, wenn die Unternehmenskultur dagegen arbeitet. Beispiel: Jupiter beschliesst strategisch, Kosten zu senken. Aber die Kultur sagt: «Wir haben das immer so gemacht, warum ändern?» Widerstand, Frustration, Scheiterung. Oder umgekehrt: Eine Unternehmenskultur, die Qualität und Kundennähe wirklich lebt, liefert automatisch bessere Produkte und Services — ohne Regeln und Kontrolle. Deshalb ist Kulturarbeit keine Soft-Skill-Übung, sondern strategisch entscheidend."}, {"section": "Jupiter: Kein Leitbild ist das echte Problem", "text": "Jupiter AG hat nach der Übernahme durch Lembacher 2007 zwar eine strategische Neuausrichtung gemacht — aber kein Leitbild entwickelt. Das Ergebnis: Die 170 Mitarbeitenden wissen nicht klar, wofür sie stehen. Die Filialleiterin in Luzern macht es anders als die in Basel. Die Qualität schwankt. Der Auftrag für Aufgabe 1 ist deshalb: Entwickeln Sie ein Leitbild für Jupiter! Das Leitbild ist nicht Dekoration — es ist das Fundament für die Strategie in Aufgabe 2 und die Kommunikation der Entlassung in Aufgabe 3."}]}, {"id": 4, "icon": "🔍", "color": "#15803D", "badge": "Block 2", "title": "SWOT-Analyse — Stärken, Schwächen, Chancen, Risiken", "sub": "4 Felder · SO/ST/WO/WT-Strategien · Jupiter konkret", "paragraphs": [{"section": "Was ist die SWOT?", "text": "SWOT steht für Strengths, Weaknesses, Opportunities, Threats. Auf Deutsch: Stärken, Schwächen, Chancen und Risiken. Das ist die meistverwendete Methode im strategischen Management — weil sie in zehn Minuten erklärt ist und trotzdem enormen Wert liefert. Die zentrale Regel: Stärken und Schwächen sind intern. Sie liegen im Unternehmen selbst — in den Menschen, Prozessen, Produkten, der Finanzsituation. Chancen und Risiken sind extern. Sie kommen aus dem Markt, der Gesellschaft, der Technologie, dem Recht. Das Unternehmen hat sie nicht verursacht, muss aber darauf reagieren."}, {"section": "Stärken von Jupiter — konkret", "text": "Die erste Stärke: Die Marke Jupiter hat 100-jährige Geschichte. Das baut kein Startup in einem Jahr auf. Zweite Stärke: Die Partnerschaft mit Lembacher gibt Jupiter exklusive, handgemachte Produkte, die Coop und Migros nicht verkaufen können. Dritte Stärke: Die Lagen. Jupiter-Filialen sind in AAA-Einkaufslagen — Bahnhofstrassen, Einkaufszentren, Touristenzonen. Vierte Stärke: Das Frischschokoladen-Konzept. Kunden sehen zu, wie Schokolade frisch gemacht wird. Das ist ein Erlebnis, keine Transaktion. Fünfte Stärke: Die Bruttogewinnmarge von 44.8 Prozent zeigt, dass das Produkt grundsätzlich profitabel ist."}, {"section": "Schwächen von Jupiter — konkret", "text": "Die erste Schwäche: Negatives Eigenkapital von minus 288'000 Franken. Das Unternehmen ist überschuldet. Das ist keine kleine Delle — das ist existenzbedrohend. Zweite Schwäche: Mietkosten von 14.7 Prozent des Umsatzes. Für eine Handelsfirma ist das zu hoch. Zum Vergleich: Coop erreicht durch Skaleneffekte viel tiefere Kosten. Dritte Schwäche: Vier unrentable C-Filialen mit Umsatz unter einer Million Franken. Diese Filialen sind Geldvernichter. Vierte Schwäche: Der E-Shop ist unterentwickelt. Kein Online-Auftritt in einer Zeit, wo Amazon Schokolade liefert. Fünfte Schwäche: Keine klare Marktdifferenzierung gegenüber Läderach."}, {"section": "Chancen für Jupiter", "text": "Erste Chance: Der globale Trend zur Premiumisierung. Menschen kaufen lieber weniger, aber Besseres. Statt fünf Tafeln Migros-Schokolade eine handgemachte Pralinenschachtel von Jupiter. Zweite Chance: E-Commerce für Premium-Güter wächst stark. Ein professioneller Onlineshop mit Geschenkoptionen hat riesiges Potenzial. Dritte Chance: Das B2B-Geschenkegeschäft. Firmen suchen hochwertige Weihnachtsgeschenke für Mitarbeitende und Kunden. Jupiter-Geschenkkörbe mit Lembacher-Schokolade sind ideal. Vierte Chance: Tourismus — ausländische Touristen in Zürich, Luzern und Davos kaufen gerne Schweizer Spezialitäten als Souvenir."}, {"section": "Risiken für Jupiter", "text": "Erstes Risiko: Läderach expandiert aggressiv. Neue Filialen in den besten Lagen, gleiche Positionierung wie Jupiter, jünger und finanziell stärker. Zweites Risiko: Hersteller gehen direkt zu Kunden. Lindt eröffnet eigene Boutiquen. Das Chocolarium in Kilchberg ist ein Erlebnisort. Jupiter verliert das Alleinstellungsmerkmal. Drittes Risiko: Coop und Migros upgraden ihr Sortiment ständig. Heute kann man im Migros Prêt-à-Porter edler Schokolade kaufen, die vor zehn Jahren undenkbar gewesen wäre. Viertes Risiko: Die CHF-Stärke verteuert Importe und bremst Touristen aus dem Euro-Raum."}, {"section": "SWOT-Strategien — die Quadranten kombinieren", "text": "Eine SWOT-Analyse ohne Strategieableitung ist wertlos. Man kombiniert die vier Felder zu vier Strategien. SO-Strategie — Stärken nutzen, um Chancen zu ergreifen: Jupiter nutzt die Marke und Lembacher-Exklusivität, um den E-Shop zu einem Premiumkanal aufzubauen. ST-Strategie — Stärken nutzen, um Risiken abzuwehren: Den USP Frischschokolade als einzigartiges Erlebnis so stark positionieren, dass Läderach und Hersteller-Direktläden keine echte Bedrohung werden. WO-Strategie — Schwächen abbauen, um Chancen zu nutzen: Unrentable Filialen schliessen und die freiwerdenden Ressourcen in B2B und E-Commerce investieren. WT-Strategie — Schwächen reduzieren, um Risiken zu vermeiden: C-Filialen schliessen, bevor Läderach oder Coop diese Lagen übernimmt."}]}, {"id": 5, "icon": "⚡", "color": "#1D4ED8", "badge": "Block 2", "title": "Porter's Five Forces — Wettbewerbsanalyse", "sub": "5 Kräfte · Branchenattraktivität · Differenzierung", "paragraphs": [{"section": "Warum Five Forces?", "text": "Michael Porter, Professor in Harvard, hat 1979 eine wichtige Erkenntnis veröffentlicht: Die Profitabilität eines Unternehmens hängt nicht nur von der eigenen Leistung ab — sondern von der Struktur der Branche, in der es tätig ist. Manche Branchen sind strukturell profitabel — wie Luxusgüter oder Pharma. Andere sind strukturell schwierig — wie Fluggesellschaften oder Supermarkte. Porter hat fünf Kräfte identifiziert, die zusammen die Branchenattraktivität bestimmen. Wer diese Kräfte versteht, kann strategisch gegensteuern."}, {"section": "Kraft 1 — Rivalität unter bestehenden Konkurrenten", "text": "Das ist die offensichtlichste Kraft: Wie intensiv ist der Wettbewerb im Markt? Bei Jupiter ist die Rivalität sehr hoch. Direkte Konkurrenten sind Läderach — und sie eröffnen gerade überall neue Filialen. Sprüngli — das Synonym für Schweizer Premium-Confiserie, stark in Zürich. Teuscher — bekannt für Champagner-Trüffel, international positioniert. Und indirekte Konkurrenz von Coop, Migros, Aldi, Amazon. Je mehr Konkurrenten, je ähnlicher die Produkte und je geringer das Marktwachstum, desto intensiver der Wettbewerb. Für Jupiter bedeutet das: In saturierten Lagen kämpft man um jeden Kunden."}, {"section": "Kraft 2 — Verhandlungsmacht der Lieferanten", "text": "Wie viel Macht haben die Lieferanten? Wenn es viele Lieferanten gibt und man sie leicht wechseln kann, ist die Macht niedrig. Wenn es einen Monopollieferanten gibt, ist die Macht sehr hoch. Bei Jupiter ist die Situation ungewöhnlich: Lembacher ist gleichzeitig Hauptlieferant und Eigentümer. Das ist eine Doppelabhängigkeit. Positiv: Jupiter bekommt exklusive Produkte, die kein Konkurrent kaufen kann. Negativ: Es gibt keine echte Verhandlungsposition. Lembacher könnte die Konditionen verschlechtern, und Jupiter hätte wenig Gegenmacht."}, {"section": "Kraft 3 — Verhandlungsmacht der Kunden", "text": "Wie viel Macht haben die Kunden? Im B2C-Premium-Segment ist die Käufermacht tendenziell gering — wer echte Qualität will, ist weniger preissensitiv. Ein Kunde, der handgemachte Frischschokolade haben möchte, hat nur wenige Alternativen. Er akzeptiert einen höheren Preis. Im B2B-Segment sieht es anders aus: Ein Unternehmen, das 500 Weihnachtsgeschenke bestellt, hat echte Verhandlungsmacht. Es kann Läderach gegen Jupiter ausspielen. Hier braucht Jupiter eine klare Preispolitik und starke Beziehungen."}, {"section": "Kraft 4 — Bedrohung durch Substitute", "text": "Substitute sind Alternativen, die dasselbe Bedürfnis erfüllen — aber auf anderem Wege. Das Bedürfnis: Jemanden mit einem Geschenk verwöhnen. Das Substitut: Weinflaschen, Blumen, Candles, Gutscheine, Restaurantbesuche. Das Bedürfnis: Persönliche Freude beim Schokoladenkonsum. Das Substitut: Coop Fine Food, Lindt Boutique, Amazon-Geschenkbox. Für Jupiter ist die Substitutionsgefahr mittel bis hoch — besonders wenn man die Preis-Leistung nicht rechtfertigen kann. Solange Jupiter ein einzigartiges Erlebnis bietet, das Substitute nicht kopieren können, ist man sicher. Verliert Jupiter das Erlebnis — durch Sparrunden und ungeschultes Personal — ist die Gefahr hoch."}, {"section": "Kraft 5 — Bedrohung durch neue Anbieter", "text": "Wie einfach ist es, in diesen Markt einzutreten? Hohe Eintrittsbarrieren schützen bestehende Anbieter. Im Premium-Schokoladendetailhandel gibt es tatsächlich Barrieren: AAA-Lagen in der Bahnhofstrasse kosten enorm viel Miete. Ein Markenaufbau dauert Jahre. Handwerkliches Know-how ist schwer zu kopieren. Trotzdem: Läderach hat diese Barrieren überwunden — mit frischem Kapital und einer jungen, dynamischen Marke. Das zeigt: Eintrittsbarrieren schützen nur so lange, wie kein Konkurrent genug Kapital und Willen hat, sie zu überwinden."}, {"section": "Was bedeutet das für Jupiter?", "text": "Die Porter-Analyse zeigt: Jupiter ist in einer strukturell anspruchsvollen Branche. Hohe Rivalität, starke Substitutionsbedrohung, aufkommende neue Konkurrenten. Die einzige nachhaltige Position ist Differenzierung — und zwar eine, die Konkurrenten nicht einfach kopieren können. Das ist das Handwerk, das Erlebnis, die Exklusivität der Lembacher-Produkte. Das ist auch der Übergang zu Aufgabe 2: Porter's Five Forces begründen, warum Kostenführerschaft nicht funktioniert, und warum die Differenzierungsstrategie die einzig sinnvolle Option ist."}]}, {"id": 6, "icon": "📊", "color": "#C2410C", "badge": "Block 2", "title": "BCG-Matrix & GAP-Analyse", "sub": "Stars · Cash Cows · Dogs · Strategische Lücke", "paragraphs": [{"section": "BCG — Warum Portfolio denken?", "text": "Stell dir vor, du hast fünf Kinder. Eines ist Hochleistungssportler — da investierst du viel. Eines ist talentiert, braucht aber noch Förderung. Eines läuft gut, braucht keine Aufmerksamkeit. Und eines kostet nur Geld ohne Zukunft. Du würdest nicht alle fünf gleich behandeln. Genau das macht die BCG-Matrix: Sie hilft, ein Portfolio von Produkten, Filialen oder Geschäftsfeldern unterschiedlich zu behandeln — je nach ihrer Position im Markt."}, {"section": "Die zwei Achsen", "text": "Die BCG-Matrix hat zwei Achsen. Die vertikale Achse zeigt das Marktwachstum: Wächst der Markt schnell oder langsam? Ein wachsender Markt bedeutet neue Kunden, mehr Potenzial. Ein stagnierender Markt bedeutet, man kämpft nur um bestehende Kunden. Die horizontale Achse zeigt den relativen Marktanteil: Bin ich der Marktführer, oder bin ich klein? Ein hoher Marktanteil bedeutet Skalierung, Effizienz, Kostenvorteil. Ein tiefer Marktanteil bedeutet man ist ein kleiner Spieler ohne Machtposition."}, {"section": "Stars — Investieren!", "text": "Stars sind Produkte oder Filialen mit hohem Marktwachstum UND hohem Marktanteil. Wir sind gut positioniert in einem wachsenden Markt. Was macht man mit Stars? Investieren! Nicht sparen. Der Markt wächst — wer jetzt investiert, sichert die Führungsposition. Bei Jupiter sind die Stars: Die Frischschokolade — ein wachsendes Segment, und Jupiter hat hier einen Vorsprung. Die Filialen in Tourismusorten wie Davos, Zermatt oder Luzern — der Tourismusmarkt wächst. Das B2B-Geschenkegeschäft mit dem richtigen Ausbau."}, {"section": "Cash Cows — Melken!", "text": "Cash Cows haben einen hohen Marktanteil, aber das Marktwachstum ist gering. Das sind die stabilen, profitablen Einheiten. Man muss nicht mehr viel investieren — sie laufen. Aber sie generieren Cash, der für andere Bereiche verwendet werden kann. Bei Jupiter: Die grossen A-Filialen in Zürich Hauptbahnhof, Genf und Bern. Diese Filialen haben viele Stammkunden, gute Umsätze, etablierte Abläufe. Man muss sie nicht gross entwickeln — man soll sie effizienz betreiben und den Cash nehmen, um Stars zu entwickeln."}, {"section": "Question Marks — Entscheiden!", "text": "Question Marks haben ein hohes Marktwachstum, aber einen tiefen Marktanteil. Das Potenzial ist da — aber man hat es noch nicht genutzt. Die Frage ist: Investieren wir, um den Marktanteil zu erhöhen? Oder steigen wir aus? Es gibt keine halbe Option. Entweder man investiert richtig — dann werden Question Marks zu Stars. Oder man investiert nicht — dann werden sie zu Dogs. Bei Jupiter: Der E-Shop ist ein Question Mark. Der Online-Markt für Premium-Schokolade wächst. Aber Jupiter hat keinen professionellen Online-Auftritt. Entscheidung gefragt: Investieren — jetzt!"}, {"section": "Dogs — Desinvestieren!", "text": "Dogs haben sowohl tiefes Marktwachstum als auch tiefen Marktanteil. Es gibt keine gute Zukunft für diese Einheiten. Sie binden Kapital, das anderswo dringender gebraucht wird. Die Empfehlung ist klar: Desinvestieren, aussteigen, schliessen. Bei Jupiter sind die Dogs: Die vier C-Filialen mit weniger als einer Million Franken Umsatz. Diese Filialen haben wenig Frequenz, hohe relative Kosten und kein Wachstumspotenzial. Das ist der direkte Link zu Aufgabe 3: Die BCG-Analyse begründet, welche Filialen geschlossen werden müssen. Das ist keine willkürliche Entscheidung — es ist Portfolio-Logik."}, {"section": "GAP-Analyse — Die strategische Lücke", "text": "Die GAP-Analyse zeigt den Unterschied zwischen dem, wo man heute steht — dem IST — und dem, wo man sein möchte — dem SOLL. Bei Jupiter: IST ist ein Jahresverlust von 1.98 Millionen Franken und negatives Eigenkapital. SOLL ist Break-Even in 18 Monaten und danach Wachstum. Die GAP — also die Lücke — beträgt fast 2 Millionen Franken pro Jahr. Diese Lücke muss durch konkrete Massnahmen geschlossen werden: Filialschliessungen sparen 2 bis 3 Millionen. E-Commerce und B2B bringen zusätzliche Erträge. Die GAP-Analyse macht das Ziel sichtbar und zwingt zu konkreten Massnahmen."}]}, {"id": 7, "icon": "🏆", "color": "#1D4ED8", "badge": "Block 2", "title": "McKinsey 9-Box & SEP — Kernkompetenz", "sub": "Marktattraktivität × Wettbewerbsstärke · Strategische Erfolgsposition", "paragraphs": [{"section": "McKinsey 9-Box vs. BCG", "text": "Während die BCG-Matrix nur zwei Kriterien hat — Marktwachstum und Marktanteil — ist die McKinsey-Matrix differenzierter. Sie hat neun Felder statt vier. Die vertikale Achse misst die Marktattraktivität: Wie attraktiv ist dieser Markt? Gross, wachsend, profitabel, mit wenig Regulierung? Die horizontale Achse misst die Wettbewerbsstärke: Wie stark ist man selbst in diesem Markt? Die Marktattraktivität kann man nicht direkt beeinflussen — der Markt ist so wie er ist. Die eigene Wettbewerbsstärke kann man aktiv verbessern."}, {"section": "Die neun Felder", "text": "Oben rechts — hohe Attraktivität, starke Wettbewerbsposition: Das ist die ideale Zone. Investieren und wachsen. Unten links — tiefe Attraktivität, schwache Position: Das ist die Abbruchzone. Desinvestieren. Die mittlere Diagonale ist der schwierige Bereich: Selektiv investieren, genau hinschauen, nicht blind investieren. Bei Jupiter: Die Flagship-Filialen in AAA-Lagen mit hohem Umsatz landen oben rechts — investieren. Die C-Filialen in peripheren Lagen mit tiefem Umsatz landen unten links — schliessen."}, {"section": "Strategische Erfolgsposition SEP", "text": "Der Schweizer Strategieprofessor Cuno Pümpin hat den Begriff der Strategischen Erfolgsposition entwickelt, kurz SEP. Eine SEP ist eine Fähigkeit oder Ressource, die man besser beherrscht als alle Konkurrenten — und die für den Kunden relevant ist. Das ist der tiefste Kern der Wettbewerbsstrategie: Was können wir, was andere nicht können? Und wollen Kunden das?"}, {"section": "Was ist Jupters SEP?", "text": "Die SEP von Jupiter ist klar: Die Kombination aus handgemachter Frischschokolade, exklusiven Lembacher-Produkten und einem einzigartigen Einkaufserlebnis. Das können Coop und Migros nicht kopieren — sie haben die Produkte nicht. Das können Lindt-Boutiquen nicht vollständig kopieren — Jupiter hat das breite Sortiment und das Laden-Erlebnis. Das ist Jupiters Kernkompetenz. Alles, was diese SEP stärkt — Filialdesign, Schulung, Produktentwicklung — ist strategisch richtig. Alles, was diese SEP verwässert — Discount-Aktionen, billige Lagen, ungeschultes Personal — ist strategisch falsch."}, {"section": "Stärken-Schwächen-Profil", "text": "Das Stärken-Schwächen-Profil ist ein ergänzendes Instrument. Man bewertet die eigenen Fähigkeiten auf einer Skala von minus drei bis plus drei und vergleicht sie direkt mit den wichtigsten Konkurrenten. Bei Jupiter: In den Bereichen Produktqualität und Markenerlebnis sind wir bei plus zwei bis plus drei. In den Bereichen Online-Präsenz, Kosten und Finanzkraft sind wir bei minus zwei bis minus drei. Das Profil macht visuell sichtbar, wo Jupiter stark ist — und wo dringend Handlungsbedarf besteht. Es ist die interne Ergänzung zur externen SWOT-Analyse."}]}, {"id": 8, "icon": "🌐", "color": "#0F766E", "badge": "Block 2", "title": "PEST/PESTEL & Chancen-Gefahren-Profil", "sub": "Externe Umweltsphären · SGF · Positionierung", "paragraphs": [{"section": "PESTEL — Die externe Umwelt", "text": "PESTEL ist die Methode, um die externe Umwelt systematisch zu analysieren. P steht für Political — politische und rechtliche Faktoren. E für Economic — wirtschaftliche Faktoren wie Konjunktur, Zinsen, Kaufkraft. S für Social — soziale und demografische Trends. T für Technological — technologische Entwicklungen. E für Environmental — ökologische Faktoren. L für Legal — spezifische rechtliche Anforderungen. Der Unterschied zu SWOT: SWOT fasst die Ergebnisse zusammen, PESTEL analysiert systematisch die Quellen. PESTEL liefert die Rohdaten, SWOT verarbeitet sie zu Chancen und Risiken."}, {"section": "Political für Jupiter", "text": "Im politischen Bereich: Das Schweizer Arbeitsrecht ist streng — OR 335h bei Massenentlassungen, zwingende Konsultationspflicht, Kündigungsfristen. Das erhöht die Kosten eines Personalabbaus. Andererseits: Die Schweiz hat ein stabiles politisches Umfeld und starke Konsumentenrechte. Die Regulierung des Lebensmittelhandels ist klar und berechenbar. Für Jupiter ist der wichtigste politische Faktor: OR 725a — die gesetzliche Handlungspflicht bei Überschuldung. Das ist nicht optional. Der Verwaltungsrat muss handeln."}, {"section": "Economic und Social für Jupiter", "text": "Wirtschaftlich: Die Schweizer Konsumkraft ist global eine der höchsten. Premiumprodukte haben eine breite Käuferschaft. Aber: Der starke Franken verteuert Importe und reduziert den Einkaufstourismus aus dem Euro-Raum. Social: Der grösste Trend ist die Premiumisierung. Menschen kaufen bewusster und lieber ein starkes Erlebnis. Bio, Fairtrade, Handwerk, Herkunft — das sind Kaufentscheidungskriterien, die für Jupiter positiv sind. Demografisch: Die alternde Bevölkerung der Schweiz hat mehr verfügbares Einkommen und schätzt Qualität. Das ist eine Chance für Jupiter."}, {"section": "Technological für Jupiter", "text": "Technologisch ist E-Commerce der grösste Trend. Amazon, Zalando, Galaxus — alles wird online gekauft. Für Jupiter ist das sowohl Chance als auch Risiko. Risiko: Kunden kaufen Schokolade online bei der Konkurrenz. Chance: Jupiter könnte einen eigenen Premium-Online-Kanal aufbauen, der das Lembacher-Sortiment exklusiv anbietet. Dazu kommen digitale Loyalty-Programme, personalisierte Empfehlungen, B2B-Portale für Firmenkunden. Wer jetzt in E-Commerce investiert, baut einen Kanal ohne Mietkosten auf."}, {"section": "Chancen-Gefahren-Profil", "text": "Das Chancen-Gefahren-Profil ist die strukturierte Zusammenfassung der PESTEL-Analyse. Man bewertet jeden Faktor: Ist das eine Chance oder eine Gefahr? Wie stark? Und wie wahrscheinlich? Dann gewichtet man. Für Jupiter: Stärke Chance: Premiumisierungs-Trend. Stärke Gefahr: Läderach-Expansion. Das Profil fliesst direkt in die SWOT-Analyse ein — als Chancen und Risiken. So ist der Zusammenhang: PESTEL liefert externe Daten, Chancen-Gefahren-Profil strukturiert sie, SWOT integriert sie mit den internen Stärken und Schwächen."}, {"section": "SGF — Strategische Geschäftsfelder", "text": "Strategische Segmentierung fragt: In welchen Märkten sind wir tätig, und wie unterscheiden wir uns dabei? Für Jupiter gibt es drei Geschäftsfelder. SGF 1 ist der Detailhandel B2C — Filialen in der Schweiz für Endkonsumenten. Das ist der Kern. SGF 2 ist der Grosshandel B2B — Firmenkunden, Corporate Gifts, Events. Das ist unterentwickelt, aber vielversprechend. SGF 3 ist E-Commerce — Online-Bestellungen, Geschenk-Boxen, Lieferung. Das ist heute ein Question Mark, könnte aber ein Star werden. Jedes SGF hat eine eigene Strategie, eigene Konkurrenten und eigene Erfolgsfaktoren."}]}, {"id": 9, "icon": "🎯", "color": "#15803D", "badge": "Block 3", "title": "Ansoff-Matrix & Wachstumsstrategien", "sub": "4 Wachstumsrichtungen · Risiko · Jupiter konkret", "paragraphs": [{"section": "Wozu die Ansoff-Matrix?", "text": "Igor Ansoff, der Vater der Strategieplanung, hat in den 1950er Jahren eine simple aber brillante Matrix entwickelt. Sie beantwortet die Frage: Wie kann ein Unternehmen wachsen? Es gibt grundsätzlich nur vier Richtungen: Man kann mit bestehenden Produkten in bestehenden Märkten wachsen. Man kann neue Produkte in bestehenden Märkten einführen. Man kann bestehende Produkte in neuen Märkten verkaufen. Oder man kann völlig neue Produkte in neuen Märkten einführen. Das klingt einfach — aber die vier Optionen haben sehr unterschiedliche Risikoprofile."}, {"section": "Marktdurchdringung — Das Sicherste", "text": "Marktdurchdringung bedeutet: Mehr aus dem herausholen, was schon da ist. Gleiche Produkte, gleiche Kunden, gleiche Märkte — aber besser. Das ist die risikoärmste Option. Für Jupiter: Den bestehenden Kunden mehr verkaufen. Loyalty-Programme einführen — wer zehn Mal kauft, bekommt eine Belohnung. Die Öffnungszeiten optimieren. Den durchschnittlichen Einkaufswert erhöhen durch besseres Cross-Selling. Den E-Shop für bestehende Schweizer Kunden professionalisieren. Diese Massnahmen kosten wenig, haben klare Wirkung und sind sofort umsetzbar."}, {"section": "Produktentwicklung — Neue Produkte, gleiche Kunden", "text": "Produktentwicklung bedeutet: Den bestehenden Kunden etwas Neues anbieten. Gleicher Markt, aber neues Angebot. Risiko: Mittel. Man kennt die Kunden gut, aber das neue Produkt muss sich erst beweisen. Für Jupiter: Neue Frischschokoladen-Varietäten — saisonale Editionen, regionale Geschmäcker. Eine Probierdegustation als Erlebnisformat. Geschenkboxen-Sets mit Personalisierung. Ein Tasting-Abo — jeden Monat eine kuratierte Schachtel mit neuen Produkten. Diese Entwicklungen bauen auf der bestehenden Stärke auf, ohne neue Märkte erschliessen zu müssen."}, {"section": "Marktentwicklung — Neue Märkte, gleiche Produkte", "text": "Marktentwicklung bedeutet: Mit dem bestehenden Angebot neue Kundensegmente oder neue Regionen erschliessen. Risiko: Mittel bis hoch — man kennt die neuen Kunden nicht so gut. Für Jupiter: Den deutschsprachigen Onlinemarkt ausserhalb der Schweiz ansprechen. Deutsche und österreichische Kunden über den E-Shop beliefern. Das B2B-Segment aktiv entwickeln — Firmenkunden, die vorher nicht Zielgruppe waren. Touristen als Zielgruppe explizit ansprechen — Souvenir-Boxen, mehrsprachiger Online-Auftritt. Wichtig: Vor der Marktentwicklung muss der bestehende Markt gesunden. Zuerst stabilisieren, dann expandieren."}, {"section": "Diversifikation — Das Riskanteste", "text": "Diversifikation bedeutet: Neue Produkte in neuen Märkten. Das ist die riskanteste Option — man weiss wenig über die neuen Kunden und wenig über die neuen Produkte. Warum macht man es trotzdem? Um Risiken zu streuen oder wenn die bestehenden Märkte gesättigt sind. Für Jupiter jetzt: Definitiv nicht! Das Unternehmen ist überschuldet, kämpft ums Überleben. Ein Abenteuer in neuen Märkten würde die verbliebenen Ressourcen aufzehren. Diversifikation kommt vielleicht in fünf Jahren, wenn Jupiter wieder profitabel ist. Heute ist die Priorität: Stabilisieren, dann wachsen. Nicht umgekehrt."}, {"section": "Die richtige Reihenfolge für Jupiter", "text": "Ansoff gibt Jupiter eine klare Reihenfolge. Erstes Jahr: Marktdurchdringung — die bestehenden Filialen optimieren, Kosten senken, Stammkunden binden. Zweites Jahr: Produktentwicklung und Marktentwicklung kombinieren — neues Onlineangebot, B2B-Kanal aufbauen. Drittes Jahr: Evaluieren, ob Marktentwicklung ins Ausland sinnvoll ist. Das ist die strategische Logik, die Aufgabe 2 folgt: Zuerst die Basis stabilisieren, dann wachsen. Wer versucht zu expandieren, bevor die Basis stimmt, riskiert alles."}]}, {"id": 10, "icon": "⚔️", "color": "#7C3AED", "badge": "Block 3", "title": "Porter Wettbewerbsstrategien & Positionierung", "sub": "Kostenführerschaft · Differenzierung · Nische · Stuck in the Middle", "paragraphs": [{"section": "Die drei generischen Strategien", "text": "Michael Porter hat drei grundlegende Wettbewerbsstrategien definiert. Erstens Kostenführerschaft: Man ist der günstigste Anbieter im Markt. Zweitens Differenzierung: Man ist einzigartig — in Qualität, Design, Service, Marke. Drittens Fokus beziehungsweise Nische: Man konzentriert sich auf ein spezifisches Segment und führt dort entweder durch Kosten oder Differenzierung. Das Wichtigste: Man muss eine Strategie wählen. Wer versucht, alles gleichzeitig zu sein — günstig UND premium — landet in der gefährlichsten Position, die Porter «Stuck in the Middle» nennt."}, {"section": "Kostenführerschaft — nicht für Jupiter", "text": "Kostenführerschaft bedeutet: Man hat die tiefsten Kosten in der Branche und kann deshalb günstiger verkaufen als alle anderen. Das gelingt durch Skaleneffekte, Prozessoptimierung, Standardisierung. Wer ist Kostenführer im Schokoladenhandel? Coop und Migros. Sie haben tausende Filialen, riesige Einkaufsmacht, effiziente Logistik. Jupiter mit 26 Filialen kann gegen diese Skaleneffekte nicht ankämpfen. Kostenführerschaft ist für Jupiter keine realistische Option. Es wäre fatal, diese Strategie zu versuchen."}, {"section": "Differenzierung — die einzige Option für Jupiter", "text": "Differenzierung bedeutet: Man bietet etwas, das Konkurrenten nicht bieten können, und Kunden bereit sind, dafür mehr zu bezahlen. Apple ist das berühmteste Beispiel: Ein iPhone kostet fünfmal mehr als ein Billigsmartphone — weil das Ökosystem, das Design, die Marke einzigartig sind. Für Jupiter: Die Differenzierungsdimensionen sind Handwerk — keine Maschine, sondern Confiseure machen die Schokolade. Erlebnis — der Kunde sieht zu, riecht, probiert. Exklusivität — Lembacher-Produkte, die nur bei Jupiter erhältlich sind. Tradition — 100 Jahre Geschichte. Diese Kombination kann Läderach nicht einfach kopieren."}, {"section": "Nischenstrategie — ergänzend richtig", "text": "Eine Nischenstrategie fokussiert auf ein spezifisches Segment. Für Jupiter ist das eine ergänzende Strategie, nicht die Hauptstrategie. Die Nischen: Tourismusorte — in Davos, Luzern und Zermatt kaufen ausländische Touristen Schweizer Spezialitäten. B2B-Firmenkunden — ein eigenes Segment mit anderen Bedürfnissen als Privatkunden. Premium-Onlineshop — für Kunden ausserhalb der Filialreichweite. In diesen Nischen kann Jupiter sehr gezielt und profitabel agieren."}, {"section": "Stuck in the Middle — die grösste Gefahr", "text": "«Stuck in the Middle» ist Porters Begriff für die Falle, in die viele Unternehmen tappen. Man ist nicht der Günstigste — also gewinnt man preisbewusste Kunden nicht. Man ist nicht wirklich differenziert — also gibt es keinen überzeugenden Grund, mehr zu bezahlen. Das Ergebnis: Man verliert nach beiden Seiten. Bei Jupiter: Genau das passiert, wenn man C-Filialen in Randlagen mit durchschnittlichem Service weiterbetreibt. Diese Filialen sind weder günstig — die Mietkosten sind hoch — noch wirklich premium. Das ist Stuck in the Middle."}, {"section": "Positionierung — Was denken die Kunden?", "text": "Positionierung ist das Bild im Kopf des Kunden. Nicht was das Unternehmen sagt, dass es ist — sondern was der Kunde wirklich denkt. Ein Positionierungsmodell zeigt auf zwei Achsen, wo man gegenüber den Konkurrenten steht. Achse 1: Preis — günstig bis teuer. Achse 2: Erlebnis — transaktional bis emotional. Jupiter sollte in der Position «teuer, aber einzigartiges Erlebnis» sein. Das ist die Position, die Differenzierung stärkt und Kostenführer meidet. Aufgabe: Diese Positionierung in allem konsequent verankern — im Laden, im Service, im Onlineshop, in der Kommunikation."}]}, {"id": 11, "icon": "🎛️", "color": "#0F766E", "badge": "Block 4", "title": "Balanced Scorecard & Kennzahlensystem", "sub": "4 Perspektiven · KPIs · Jupiter BSC-Ziele", "paragraphs": [{"section": "Warum BSC? Das Problem mit reinen Finanzkennzahlen", "text": "Stell dir vor, du fährst Auto und schaust nur auf den Tachometer. Du weisst, wie schnell du fährst. Aber du weisst nicht, wie viel Benzin noch im Tank ist, ob der Motor überhitzt, ob du auf der richtigen Strasse bist. Genauso ist reines Finanz-Controlling: Man sieht die Vergangenheit, aber keine Frühindikatoren. Robert Kaplan und David Norton haben 1992 die Balanced Scorecard entwickelt, um dieses Problem zu lösen. Die BSC misst das Unternehmen aus vier Perspektiven gleichzeitig — und verbindet sie mit der Strategie."}, {"section": "Finanzperspektive", "text": "Die Finanzperspektive fragt: Wie sehen wir für die Aktionäre und Eigentümer aus? Hier sind die klassischen Kennzahlen zuhause: Umsatz, Bruttogewinnmarge, EBIT, Eigenkapitalrendite. Für Jupiter: Das Ziel ist Break-Even in 18 Monaten. Die KPIs sind Jahresverlust reduzieren von minus 1.98 auf null. Mietkosten senken von 14.7 auf unter 10 Prozent des Umsatzes. Personalkosten unter 22 Prozent bringen. Diese Finanzziele sind der Endpunkt — aber sie sagen nichts darüber, wie man sie erreicht."}, {"section": "Kundenperspektive", "text": "Die Kundenperspektive fragt: Wie sehen uns unsere Kunden? Sind sie zufrieden? Kommen sie wieder? Empfehlen sie uns weiter? Für Jupiter: Kundenzufriedenheit über 85 Prozent in jeder Filiale. Net Promoter Score — also die Bereitschaft zur Weiterempfehlung — über 50. Markenbekanntheit in der Zielgruppe steigern. Die Kundenperspektive ist der Vorlaufindikator für die Finanzen: Wenn Kunden heute unzufrieden sind, sinken morgen die Umsätze. Wer nur auf Finanzkennzahlen schaut, sieht diesen Zusammenbruch erst, wenn es zu spät ist."}, {"section": "Interne Prozessperspektive", "text": "Die Prozessperspektive fragt: In welchen internen Prozessen müssen wir exzellent sein, um Kunden zu begeistern? Für Jupiter: Wie schnell werden Kunden bedient? Wie konsistent ist die Produktqualität über alle Filialen? Wie effizient sind die Bestellprozesse? Die Prozessperspektive identifiziert die operativen Hebel, mit denen man die Kundenzufriedenheit verbessert. Wenn der Prozess langsam ist, wartet der Kunde. Wenn die Qualität schwankt, verliert man Stammkunden. Diese Prozessprobleme müssen sichtbar gemacht werden — deshalb braucht man Prozesskennzahlen."}, {"section": "Lern- und Entwicklungsperspektive", "text": "Die vierte Perspektive fragt: Wie können wir uns als Organisation entwickeln und verbessern? Das sind die weichsten Kennzahlen — aber die Grundlage für alles andere. Mitarbeiterkompetenz, Mitarbeiterzufriedenheit, Innovationsrate, Schulungstage. Für Jupiter: Jede Filialverkäuferin muss das Sortiment auswendig kennen und Kunden kompetent beraten können. Das ist eine Voraussetzung für die Kundenperspektive. Ohne kompetente Mitarbeitende keine Kundenzufriedenheit. Ohne Kundenzufriedenheit keine guten Finanzen. Die Kausalität geht von unten nach oben."}, {"section": "BSC als strategisches Steuerungsinstrument", "text": "Die Stärke der BSC liegt in der Verknüpfung. Jede Kennzahl ist mit der Strategie verbunden — und erklärt, warum sie gemessen wird. Die Strategie-Map zeigt diese Ursache-Wirkungsketten: Bessere Schulung verbessert die Prozesskompetenz. Bessere Prozesskompetenz erhöht die Kundenzufriedenheit. Höhere Kundenzufriedenheit steigert den Umsatz. Höherer Umsatz verbessert die Rendite. Diese Logikkette macht die BSC zu mehr als einem Kennzahlenset — sie wird zum strategischen Navigationssystem. Für das Assessment: Wenn Sie eine BSC für Jupiter entwickeln, zeigen Sie diese Kausalität — das ist der Unterschied zwischen einer guten und einer sehr guten Antwort."}]}, {"id": 12, "icon": "💰", "color": "#1D4ED8", "badge": "Block 4", "title": "Bilanz, Erfolgsrechnung & Kennzahlen", "sub": "T-Schema · Marge · Eigenkapital · Liquidität", "paragraphs": [{"section": "Die Bilanz — ein Foto zum Stichtag", "text": "Die Bilanz ist ein Foto des Unternehmens an einem bestimmten Tag — immer zum 31. Dezember oder einem anderen Stichtag. Sie zeigt links die Aktiven — alles, was das Unternehmen besitzt oder was ihm geschuldet wird. Rechts die Passiven — alles, wie das Vermögen finanziert ist. Die eiserne Regel: Aktiven müssen immer gleich Passiven sein. Links und rechts müssen sich die Waage halten. Deshalb heisst es «Bilanz» — es bilanziert, es balanciert."}, {"section": "Aktiven — was gehört uns?", "text": "Die Aktiven gliedern sich in zwei Teile. Das Umlaufvermögen ist kurzfristig: Kasse, Bankguthaben, Debitoren — also ausstehende Kundenzahlungen — und Warenvorräte. Bei Jupiter: Total Umlaufvermögen rund 7.3 Millionen Franken. Das Anlagevermögen ist langfristig: Maschinen, Ladeneinrichtungen, Fahrzeuge, immaterielle Werte. Bei Jupiter: Total Anlagevermögen rund 7.6 Millionen Franken. Total Aktiven: 14.9 Millionen Franken. Dieses Kapital muss irgendwo hergekommen sein — das zeigen die Passiven."}, {"section": "Passiven — woher kommt das Kapital?", "text": "Die Passiven zeigen die Finanzierungsquellen. Kurzfristiges Fremdkapital sind Schulden, die in weniger als einem Jahr fällig sind: Lieferantenrechnungen, kurzfristige Bankdarlehen, Steuern. Bei Jupiter: 4.1 Millionen Franken. Langfristiges Fremdkapital sind Schulden mit Laufzeit über einem Jahr: Hypotheken, Darlehen, Anleihen. Bei Jupiter: 11.2 Millionen Franken — das ist das Darlehen der Aktionärin Lembacher. Eigenkapital ist das, was nach allen Schulden übrig bleibt. Bei Jupiter: minus 288'075 Franken. Negativ! Das bedeutet: Die Schulden übersteigen alle Aktiven. Das ist Überschuldung."}, {"section": "Erfolgsrechnung — der Film übers Jahr", "text": "Während die Bilanz ein Foto ist, ist die Erfolgsrechnung ein Film — sie zeigt alles, was im Laufe des Jahres passiert ist. Oben steht der Umsatz: Bei Jupiter 36.4 Millionen Franken — das ist alles, was verkauft wurde. Dann zieht man die Warenkosten ab: 20.1 Millionen Franken. Was übrig bleibt, ist der Bruttogewinn — bei Jupiter 44.8 Prozent des Umsatzes. Das ist gut! Dann kommen alle Betriebskosten: Personal 8.6 Millionen, Miete 5.4 Millionen, Abschreibungen, Energie, Versicherungen. Was nach allem übrig bleibt, ist der EBIT — bei Jupiter minus 1.6 Millionen."}, {"section": "Warum ist Jupiter in der Krise, obwohl die Marge gut ist?", "text": "Das ist die entscheidende Frage. Die Bruttogewinnmarge von 44.8 Prozent bedeutet: Von jedem Franken Umsatz bleiben 45 Rappen für Betriebskosten und Gewinn. Das ist eigentlich gut. Der Fehler liegt in den Fixkosten: Miete 14.7 Prozent, Personal 23.6 Prozent. Zusammen fast 38 Prozent nur für Miete und Personal. Dazu Abschreibungen, Energie, Verwaltung — und es bleibt ein negatives Ergebnis. Die Lösung ist einfach aber schmerzhaft: Fixkosten senken. Das bedeutet Filialen schliessen und Personal reduzieren. Es gibt keinen anderen Weg."}, {"section": "Wichtige Kennzahlen im Überblick", "text": "Die Eigenkapitalquote — Eigenkapital durch Total Aktiven — sagt: Wie viel Prozent des Kapitals gehört wirklich uns? Bei Jupiter minus 1.9 Prozent — das ist Überschuldung. Der Anlagedeckungsgrad 2 — Eigenkapital plus langfristiges Fremdkapital durch Anlagevermögen — soll über 100 Prozent sein. Bei Jupiter 141 Prozent — das ist noch okay, weil das Lembacher-Darlehen langfristig ist. Die Umsatzrentabilität — Jahresgewinn durch Umsatz — bei Jupiter minus 5.5 Prozent. Der Fremdkapitalanteil — Fremdkapital durch Total Aktiven — bei Jupiter 102 Prozent. Das ist über 100 — das bedeutet Überschuldung."}]}, {"id": 13, "icon": "💧", "color": "#B45309", "badge": "Block 4", "title": "Liquidität, ABC-Analyse & Budgetierung", "sub": "Cash Ratio · Liquiditätsplan · Budgetprozess · Reporting", "paragraphs": [{"section": "Liquidität — der Unterschied zu Rentabilität", "text": "Viele verwechseln Rentabilität und Liquidität. Rentabilität bedeutet: Das Unternehmen verdient langfristig mehr, als es ausgibt. Liquidität bedeutet: Das Unternehmen hat jetzt, heute, genug Geld, um seine fälligen Rechnungen zu bezahlen. Man kann rentabel und trotzdem illiquid sein. Zum Beispiel: Ein Bauunternehmen, das ein grosses Projekt gewonnen hat, muss Materialien und Löhne vorfinanzieren — aber die Zahlung vom Kunden kommt erst in sechs Monaten. Wenn in der Zwischenzeit die Miete fällig wird und kein Geld auf dem Konto ist, ist das Unternehmen zahlungsunfähig — obwohl es profitabel ist."}, {"section": "Die drei Liquiditätskennzahlen", "text": "Liquiditätsgrad 1 oder Cash Ratio: Flüssige Mittel durch kurzfristiges Fremdkapital. Zeigt, ob man allein mit Cash die kurzfristigen Schulden bezahlen könnte. Sollte über 1 sein. Bei Jupiter: 0.72 — unter 1, also kritisch. Liquiditätsgrad 2 oder Quick Ratio: Flüssige Mittel plus Debitoren durch kurzfristiges Fremdkapital. Etwas entspannter, weil man auch auf eingehende Zahlungen zählen kann. Bei Jupiter: 1.12 — knapp über 1. Liquiditätsgrad 3 oder Current Ratio: Ganzes Umlaufvermögen durch kurzfristiges Fremdkapital. Bei Jupiter: 1.80 — gut."}, {"section": "Der Liquiditätsplan — Cash managen", "text": "Ein Liquiditätsplan zeigt monatlich: Was kommt rein — Cash-Einnahmen aus Verkäufen, Debitoren. Was geht raus — Miete, Löhne, Lieferantenrechnungen, Steuern. Was ist das Netto — Einnahmen minus Ausgaben. Und wie entwickelt sich der Saldo kumuliert. Der Zweck: Einen drohenden Liquiditätsengpass frühzeitig erkennen, bevor er zur Krise wird. Der Spruch «Cash is King» ist nicht übertrieben. Unternehmen gehen nicht bankrott, weil sie schlechte Produkte haben. Sie gehen bankrott, weil ihnen das Cash ausgeht. Lösungen beim Engpass: Debitoren schneller eintreiben, Kreditoren hinauszögern, Kredit aufnehmen, Aktiven verkaufen."}, {"section": "ABC-Analyse — Prioritäten setzen", "text": "Die ABC-Analyse ist ein einfaches aber mächtiges Werkzeug: Man ordnet Kunden oder Produkte nach ihrem Anteil am Gesamtumsatz. A-Kunden: 20 Prozent der Kunden generieren 80 Prozent des Umsatzes. Top-Priorität! Beste Betreuung, persönliche Beziehung, nie verlieren. B-Kunden: 30 Prozent der Kunden generieren 15 Prozent. Entwickeln — könnten A-Kunden werden. C-Kunden: 50 Prozent der Kunden generieren nur 5 Prozent. Effizient bedienen oder hinterfragen. Die ABC-Analyse funktioniert auch für Filialen: A-Filialen generieren den grössten Umsatz — investieren. C-Filialen generieren wenig — genau hinschauen."}, {"section": "Budgetierung — Planen mit Zahlen", "text": "Das Budget ist der Finanzplan für das kommende Jahr. Es gibt zwei Grundrichtungen: Top-Down bedeutet, die Führung gibt Umsatzziele vor — ausgehend vom Markt und den strategischen Zielen. Was müssen wir verkaufen, um Break-Even zu erreichen? Bottom-Up bedeutet, die einzelnen Einheiten melden ihren Bedarf — was braucht die Filiale in Bern, um den Umsatz zu erreichen? Gute Budgetierung kombiniert beide Richtungen: Der strategische Rahmen kommt von oben, die operativen Details von unten."}, {"section": "Reporting und Controlling", "text": "Das Reporting kontrolliert, ob das Budget eingehalten wird. Der Soll-Ist-Vergleich ist das wichtigste Instrument: Wo weiche ich vom Plan ab, und warum? Ein bekanntes Reporting-Tool ist das M11+1-Modell: Elf Monate Ist-Zahlen plus ein Monat Prognose ergibt einen rollierenden Jahresausblick. Man sieht immer, wie das Jahr endet. Das Performance Book ist eine Ein-Seiten-Übersicht aller wichtigen KPIs. Es wird monatlich im Performance Review Meeting — PRM — mit der Führung besprochen. Abweichungen werden sofort erklärt und Massnahmen beschlossen."}]}, {"id": 14, "icon": "👤", "color": "#6D28D9", "badge": "Block 1", "title": "Führungsstile — Hersey, Blanchard & Lewin", "sub": "S1–S4 · Reifegrad · Autoritär/Demokratisch/Laissez-faire", "paragraphs": [{"section": "Warum situatives Führen?", "text": "In den 1950er Jahren glaubten viele, es gebe den einen besten Führungsstil. Autoritär und kontrollierend — oder partizipativ und offen. Die Forschung zeigte aber: Es gibt keinen universellen besten Führungsstil. Was wirkt, hängt von der Situation ab — genauer: vom Reifegrad des Mitarbeitenden. Paul Hersey und Ken Blanchard haben diese Erkenntnis in ein einfaches 4-Felder-Modell gebracht, das heute noch in jedem Managementlehrgang gelehrt wird."}, {"section": "Was ist Reifegrad?", "text": "Der Reifegrad eines Mitarbeitenden hat zwei Dimensionen. Können — also Kompetenz, Erfahrung, Wissen, Fähigkeiten. Hat die Person das technische Know-how für die Aufgabe? Wollen — also Motivation, Bereitschaft, Selbstvertrauen. Will die Person diese Aufgabe? Ist sie engagiert? Man kann erfahren sein aber keine Lust haben — das gibt einen tiefen Reifegrad trotz hoher Kompetenz. Man kann motiviert sein aber unerfahren — das braucht Unterstützung. Die Kombination aus beiden bestimmt, wie man führen soll."}, {"section": "S1 — Anweisen: Tief Können, Tief Wollen", "text": "Beim Stil S1 — Anweisen — ist die Person weder erfahren noch motiviert. Der Führungsstil ist klar aufgabenorientiert: Ich sage, was zu tun ist, wie es zu tun ist und kontrolliere eng. Kaum Rückfragen, klare Anweisungen, viel Begleitung. Das klingt hart — ist aber hilfreich. Eine neue Mitarbeiterin bei Jupiter, die am ersten Tag in die Filiale kommt und noch nie Schokolade verkauft hat, braucht klare Anleitung. Sie braucht keinen Coach der fragt, was sie selbst denkt. Sie braucht: «So begrüsst du Kunden, so erklärst du die Produkte, so läuft die Kasse»."}, {"section": "S2 — Trainieren: Tief Können, Hoch Wollen", "text": "S2 — Trainieren — gilt für Mitarbeitende, die motiviert sind, aber noch wenig Erfahrung haben. Sie wollen wirklich, wissen aber noch nicht wie. Der Führungsstil ist ein Mix: Aufgaben klar erklären, aber auch Gründe nennen. Fragen stellen, Feedback geben, Lernprozess begleiten. Beispiel Jupiter: Eine motivierte junge Frau, die in zwei Jahren Filialleiterin werden möchte. Sie bringt Energie und Einsatz mit, kennt aber die betriebswirtschaftlichen Zusammenhänge noch nicht. Hier coacht man — man erklärt den Budgetprozess, begleitet die erste Gesprächsführung, gibt regelmässiges Feedback."}, {"section": "S3 — Partizipieren: Hoch Können, Tief Wollen", "text": "S3 — Partizipieren — gilt für erfahrene Mitarbeitende, die aber gerade demotiviert sind. Sie könnten — aber sie wollen nicht mehr richtig. Gründe: Monotonie, fehlende Anerkennung, Unsicherheit durch Restrukturierung. Der Führungsstil ist beziehungsorientiert: Zuhören, in Entscheidungen einbeziehen, Meinung fragen, Wertschätzung zeigen. Beispiel Jupiter in der Krise: Eine erfahrene Filialleiterin, die seit acht Jahren dabei ist, weiss genau, was zu tun ist. Aber sie macht sich Sorgen um ihren Job, ist demotiviert und zieht sich zurück. Hier hilft nicht mehr Anleitung — hier braucht es Einbindung: «Was denkst du, wie wir das Problem lösen sollen?»"}, {"section": "S4 — Delegieren: Hoch Können, Hoch Wollen", "text": "S4 — Delegieren — gilt für erfahrene, hochmotivierte Mitarbeitende. Die ideale Kombination. Der Führungsstil: Ziel vorgeben und loslassen. Kein Micromanagement, kein Kontrollieren jedes Schritts. Vertrauen als Grundhaltung. Beispiel Jupiter: Die Filialleiterin in Zürich-Hauptbahnhof, seit zwölf Jahren dabei, exzellente Resultate, kennt das Business in- und auswendig. Sie bekommt ihr Jahresumsatzziel und entscheidet selbst, wie sie es erreicht. Wer so jemanden mit S1 führt — ihr alles vorschreibt und jeden Schritt kontrolliert — demotiviert sie sofort. Das ist der häufigste Führungsfehler überhaupt."}, {"section": "Lewin — die drei klassischen Stile", "text": "Kurt Lewin hat schon in den 1930er Jahren drei grundlegende Führungsstile beschrieben. Autoritär: Der Chef entscheidet allein, gibt Befehle, erwartet Gehorsam. Schnell, klar, effizient — aber demotivierend auf Dauer. Demokratisch oder kooperativ: Entscheidungen werden gemeinsam getroffen, Mitarbeitende bringen Input. Langsamer, aber mehr Akzeptanz und bessere Entscheidungsqualität. Laissez-faire: Minimale Führung, maximale Autonomie. Nur sinnvoll bei hochspezialisierten Experten. Diese drei Stile sind das Fundament — Hersey und Blanchard haben sie verfeinert und situativ gemacht."}]}, {"id": 15, "icon": "🧠", "color": "#0F766E", "badge": "Block 1", "title": "McGregor, MbO & Kommunikationsmodell", "sub": "Theorie X/Y · Zielvereinbarung · Sender-Empfänger", "paragraphs": [{"section": "McGregor — Zwei Menschenbilder", "text": "Douglas McGregor hat in den 1960er Jahren zwei grundlegend verschiedene Menschenbilder beschrieben — und gezeigt, dass jedes Menschenbild einen anderen Führungsstil erzeugt. Theorie X sagt: Der Mensch ist von Natur aus faul. Er meidet Arbeit, wenn er kann. Er braucht Kontrolle, Druck und Belohnungen, um zu arbeiten. Er übernimmt keine Verantwortung, sucht Sicherheit. Theorie Y sagt: Der Mensch ist von Natur aus motiviert. Er kann Arbeit als Quelle der Befriedigung sehen. Er sucht Verantwortung, wenn die Bedingungen stimmen. Er hat Potenzial, das in den meisten Unternehmen nicht genutzt wird."}, {"section": "Welches Menschenbild ist richtig?", "text": "McGregor selbst glaubte, dass Theorie Y die realistischere Beschreibung des Menschen ist — aber dass viele Unternehmen Theorie X leben und damit eine selbsterfüllende Prophezeiung erzeugen. Wenn man Mitarbeitende wie unmotivierte Kinder behandelt — Kontrolle, Misstrauen, Strafen — werden viele tatsächlich passiv und unengagiert. Wenn man ihnen Vertrauen, Autonomie und Verantwortung gibt, zeigen viele echte Motivation. Bei Jupiter: Die autonome Führung der Filialleiterinnen ist ein Theorie-Y-Ansatz. Die Zentrale vertraut darauf, dass erfahrene Führungskräfte gute Entscheidungen treffen."}, {"section": "Management by Objectives — MbO", "text": "Management by Objectives — Führen durch Zielvereinbarung — wurde von Peter Drucker entwickelt und ist heute das meistverbreitete Führungskonzept der Welt. Das Grundprinzip: Vorgesetzter und Mitarbeitender vereinbaren gemeinsam konkrete, messbare Ziele für ein Jahr. Die Zielerreichung wird regelmässig kontrolliert und bewertet. Wichtig: SMART-Ziele — spezifisch, messbar, attraktiv, realistisch, terminiert. Für Jupiter: Die Filialleiterin in Genf vereinbart mit der GL: Umsatz 2.2 Millionen, Bruttogewinnmarge über 44 Prozent, Kundenzufriedenheit 87 Prozent, Personalkosten unter 23 Prozent. Wie sie das erreicht, entscheidet sie selbst."}, {"section": "AKV-Prinzip — Aufgaben, Kompetenzen, Verantwortung", "text": "Das AKV-Prinzip ist entscheidend beim Delegieren. A steht für Aufgaben: Was ist zu tun? K steht für Kompetenzen: Welche Entscheidungen darf man selbst treffen? Und V steht für Verantwortung: Wer ist am Ende rechenschaftspflichtig? Das Prinzip lautet: Alle drei müssen übereinstimmen. Man darf niemandem Verantwortung geben ohne die nötigen Kompetenzen. Das führt zu Frustration und Scheitern. Beispiel: Wenn man der Filialleiterin sagt, sie sei für den Umsatz verantwortlich — aber ihr nicht erlaubt, Preise anzupassen oder Aktionen zu starten — ist das AKV verletzt."}, {"section": "Kommunikationsmodell — Shannon und Weaver", "text": "Das Kommunikationsmodell von Shannon und Weaver aus den 1940er Jahren ist simpel aber fundamental. Es gibt einen Sender — die Führungskraft mit einer Botschaft. Es gibt einen Empfänger — die Mitarbeiterin. Die Botschaft wird über einen Kanal übertragen. Und es gibt Störungen — alles, was die Botschaft verzerrt. Beim Führen ist Kommunikation alles. Die Führungskraft denkt, sie hat klar kommuniziert — aber der Empfänger hat etwas ganz anderes verstanden. Warum? Weil Wörter Bedeutungen haben, die von Person zu Person variieren. Weil Nonverbales mitgeteilt wird. Weil Stress das Verständnis beeinträchtigt."}, {"section": "Feedback als Rückkoppelung", "text": "Das Kommunikationsmodell enthält auch den Feedback-Pfeil — die Rückkoppelung. Dieser Pfeil ist das Wichtigste. Nur durch Feedback weiss der Sender, ob seine Botschaft angekommen ist. Ohne Feedback kommuniziert man in eine Blackbox. Im Assessment-Kontext: Bei einer Massenentlassung muss die Führung klare Botschaften kommunizieren — warum, was, wann, wie. Und dann Feedback einholen: Haben die Mitarbeitenden es verstanden? Was sind ihre Fragen und Sorgen? Dieses Feedback ist nicht nur höflich — es ist strategisch entscheidend für die erfolgreiche Umsetzung der Restrukturierung."}]}, {"id": 16, "icon": "⚠️", "color": "#B91C1C", "badge": "Block 5", "title": "Unternehmenskrise — Kausalkette & OR 725", "sub": "Krisentypen · Kausalkette · OR 725a Überschuldung", "paragraphs": [{"section": "Krisen entstehen nicht über Nacht", "text": "Eine Unternehmenskrise ist wie eine Krankheit, die man lange ignoriert. Zuerst sind da nur kleine Warnsignale, die man als «temporäre Schwäche» abtut. Dann werden die Symptome stärker. Schliesslich wird die Krankheit lebensbedrohlich. Bei Unternehmen ist dieser Prozess gut dokumentiert und folgt einer Kausalkette: Strategische Krise, dann Ertragskrise, dann Liquiditätskrise, dann Überschuldung. Wer früh eingreift, hat viele Optionen. Wer bis zur Überschuldung wartet, hat fast keine mehr."}, {"section": "Stufe 1 — Strategische Krise", "text": "Die strategische Krise ist die erste Stufe — und die heimlichste. Das Unternehmen hat die falsche Strategie, oder die Strategie passt nicht mehr zum veränderten Markt. Umsätze und Margen sind noch akzeptabel, aber die Grundlage erodiert. Beispiel Jupiter: Nach der Übernahme 2007 wurde die Strategie richtig definiert — Premium, AAA-Lagen. Aber sie wurde nicht konsequent umgesetzt. Filialen blieben offen, die nicht ins Konzept passten. Das war die strategische Krise — sichtbar im Stärken-Schwächen-Profil und in der SWOT, aber noch nicht in der Erfolgsrechnung."}, {"section": "Stufe 2 — Ertragskrise", "text": "Die Ertragskrise wird sichtbar: Die Ertragsrechnung zeigt rote Zahlen. Umsatz rückläufig, Margen sinkend, EBIT negativ. Bei Jupiter 2010: EBIT minus 4.4 Prozent. Das ist messbar — hier merkt man es spätestens. Der klassische Fehler an diesem Punkt: Man versucht, Kosten zu sparen, ohne die Grundstrategie zu ändern. Man kürzt das Marketingbudget, reduziert Personal minimal, drückt auf Einkaufspreise. Das verzögert die Krise, löst sie aber nicht. Die Ursache — falsche Filialstruktur, zu hohe Fixkosten — bleibt."}, {"section": "Stufe 3 — Liquiditätskrise", "text": "Wenn die Ertragskrise nicht gelöst wird, folgt die Liquiditätskrise: Das Cash wird knapp. Lieferanten warten auf Bezahlung. Die Bank zieht Kreditlinien ein. Das Unternehmen hat keinen Spielraum mehr für Investitionen. Jeder Monat ist ein Kampf ums Überleben. Bei Jupiter ist die Liquidität angespannt — der Cash Ratio von 0.72 zeigt, dass die flüssigen Mittel die kurzfristigen Schulden nicht vollständig decken. Wenn Lembacher nicht als Stütze fungieren würde, wäre Jupiter bereits in einer akuten Zahlungsunfähigkeit."}, {"section": "Stufe 4 — Überschuldung und OR 725a", "text": "Die schlimmste Stufe: Das Eigenkapital ist aufgebraucht, die Schulden übersteigen die Aktiven. Bei Jupiter: Eigenkapital minus 288'075 Franken. Jetzt greift das Gesetz. OR Artikel 725a sagt: Wenn bei der Jahresbilanz begründete Besorgnis besteht, dass die Schulden sowohl zu Fortführungs- als auch zu Liquidationswerten die Aktiven übersteigen, muss der Verwaltungsrat sofort einen Revisionsbericht einholen und bei Bestätigung den Richter informieren — es sei denn, Sanierungsmassnahmen erscheinen durchführbar. Das ist keine Empfehlung. Das ist eine Rechtspflicht. Der Verwaltungsrat handelt — oder macht sich haftbar."}, {"section": "Früherkennung ist alles", "text": "Die wichtigste Lektion aus der Kausalkette: Frühzeitig erkennen und handeln. Je früher man in der Kette eingreift, desto mehr Optionen hat man. In der strategischen Krise: Viele Möglichkeiten, Zeit, Ressourcen. In der Ertragskrise: Mittlerer Handlungsdruck, noch gute Optionen. In der Liquiditätskrise: Grosser Druck, wenige Optionen, hohe Kosten. In der Überschuldung: Extremer Druck, letzte Optionen, Insolvenzgefahr. Früherkennungsinstrumente sind: Regelmässiges Reporting, BSC, Soll-Ist-Vergleich, Liquiditätsplan. Diese Instrumente existieren nicht zum Selbstzweck — sie existieren, um Probleme zu sehen, bevor sie zu Krisen werden."}]}, {"id": 17, "icon": "🔄", "color": "#B91C1C", "badge": "Block 5", "title": "Change Management & Sanierungsdreieck", "sub": "Kontinuierlich vs. Akut · Wille · Fähigkeit · Würdigkeit", "paragraphs": [{"section": "Veränderung als Konstante", "text": "«Das Einzige, was konstant ist, ist der Wandel» — dieser Satz des griechischen Philosophen Heraklit beschreibt die Realität jedes Unternehmens. Märkte verändern sich. Technologien verändern sich. Kundenbedürfnisse verändern sich. Das Unternehmen muss sich anpassen — kontinuierlich, oder wenn nötig akut. Change Management ist das systematische Führen von Veränderungen. Es reicht nicht, eine Entscheidung zu treffen — man muss Menschen durch den Veränderungsprozess begleiten."}, {"section": "Kontinuierliche vs. akute Veränderung", "text": "Typ A — Kontinuierliche Veränderung: Das Unternehmen passt sich laufend an, evolutionär, schrittweise. Beispiel Jupiter: Jährliche Sortimentsanpassung, graduelle Schulungsverbesserungen. Das ist managed Change — man hat Zeit, man plant, man kommuniziert sorgfältig. Typ B — Akute Veränderung: Eine Krise erzwingt sofortige, tiefgreifende Massnahmen. Kein Time for Planning. Jupiter 2010 ist in Typ B: Der Jahresverlust von fast zwei Millionen und negatives Eigenkapital erfordern sofortiges Handeln. Das Lufthansa-Beispiel aus den Unterlagen: Wenn ein Unternehmen, das stark ist, durch externe Schocks — Pandemie, Streiks, Ölpreisschock — plötzlich in die Krise gerät, braucht es akutes Change Management."}, {"section": "Widerstände gegen Veränderung", "text": "Das grösste Hindernis bei jedem Change ist der menschliche Widerstand. «Es war schon immer so.» «Das haben wir noch nie so gemacht.» «Das funktioniert bei uns nicht.» Diese Sätze hört man immer. Woher kommt Widerstand? Angst vor dem Unbekannten. Angst vor Jobverlust. Verlorene Sicherheit. Mangelndes Vertrauen in die Führung. Das Management von Widerständen ist eine Kernkompetenz der Führungskraft. Man bekämpft Widerstände nicht — man versteht sie, adressiert die Ängste, und schafft Vertrauen durch Transparenz."}, {"section": "Das Sanierungsdreieck", "text": "Damit eine Unternehmenssanierung gelingen kann, müssen drei Bedingungen gleichzeitig erfüllt sein — das Sanierungsdreieck. Erstens Sanierungswille: Will die Führung — Verwaltungsrat, Geschäftsleitung — wirklich sanieren? Mit allen Konsequenzen? Das klingt selbstverständlich, ist es aber nicht. Viele VR-Mitglieder zögern, weil ihnen die Massnahmen zu schmerzhaft erscheinen. Ohne echten Willen ist jeder Sanierungsplan Makulatur. Bei Jupiter: Lembacher als Eigentümer muss unmissverständlich hinter der Restrukturierung stehen."}, {"section": "Sanierungsfähigkeit und -würdigkeit", "text": "Zweitens Sanierungsfähigkeit: Verfügt das Unternehmen über die nötigen Ressourcen? Genug Cash, um die Restrukturierungskosten zu tragen? Fähige Führungskräfte, die den Prozess managen? Externe Berater, die nötig sind? Bei Jupiter: Lembacher kann eine neue Kapitaltranche bereitstellen. Das ist die Voraussetzung. Drittens Sanierungswürdigkeit: Braucht der Markt dieses Unternehmen noch? Was wäre, wenn Jupiter morgen verschwinden würde? Wenn niemand es vermissen würde — dann lohnt die Sanierung nicht. Für Jupiter: Ja — handgemachte Premium-Chocolaterie mit Tradition und Lembacher-Exklusivität ist einzigartig. Der Markt braucht Jupiter."}, {"section": "Die typischen Ausreden", "text": "Die Unterlagen aus dem Kurs zeigen eine interessante Folie zu Sanierungswillen: Typische Ausreden, warum eine Sanierung angeblich nicht möglich ist. «Es war schon immer so» — kein Veränderungswille. «Ich brauche nur etwas mehr Kapital» — man sieht nicht die strukturellen Ursachen. «Die Krise ist temporär, es wird sich wieder normalisieren» — Hoffnung statt Handeln. «Wenn wir das ändern, verlieren wir unsere besten Mitarbeitenden» — Angst vor Massnahmen. Diese Ausreden erkennen und widerlegen ist eine Kernaufgabe des Change-Managements im Assessment."}]}, {"id": 18, "icon": "🛠️", "color": "#1D4ED8", "badge": "Block 5", "title": "Sanierungsmassnahmen & Handlungsoptionen", "sub": "Bilanzwirksam · Erfolgswirksam · Liquiditätswirksam · A & B", "paragraphs": [{"section": "Drei Kategorien von Sanierungsmassnahmen", "text": "Wenn ein Unternehmen in der Krise ist, gibt es drei grundlegende Kategorien von Massnahmen. Bilanzwirksame Massnahmen verbessern die Bilanzstruktur — sie sanieren das Eigenkapital. Erfolgswirksame Massnahmen verbessern die Erfolgsrechnung — sie steigern Erträge oder senken Kosten. Liquiditätswirksame Massnahmen verbessern den Cashflow — sie sichern die Zahlungsfähigkeit. Eine echte Sanierung braucht in der Regel alle drei Kategorien gleichzeitig. Nur die Bilanz sanieren reicht nicht, wenn das Unternehmen weiter Verluste schreibt."}, {"section": "Bilanzwirksame Massnahmen", "text": "Bilanzwirksame Massnahmen verbessern das Eigenkapital direkt. Kapitalerhöhung: Neue Gelder fliessen ins Eigenkapital. Bei Jupiter: Lembacher stellt eine neue EK-Tranche bereit. Das eliminiert das negative Eigenkapital sofort. Kapitalherabsetzung: Man schreibt das Aktienkapital buchmässig ab, um aufgelaufene Verluste auszubuchen. Das klingt negativ, ist aber oft notwendig, um die Bilanz zu bereinigen, bevor man neues Kapital einbringt. Gläubigerverzicht: Gläubiger — zum Beispiel Lembacher als Darlehensgeber — verzichten auf Teile ihrer Forderungen. Das erhöht das Eigenkapital, aber der Gläubiger verliert."}, {"section": "Erfolgswirksame Massnahmen", "text": "Erfolgswirksame Massnahmen verbessern die Gewinn-und-Verlust-Rechnung. Umsatzsteigernde Massnahmen: E-Commerce aufbauen, B2B-Kanal entwickeln, neue Produkte einführen. Das steigert die Erträge. Kostensenkende Massnahmen: Filialen schliessen — damit sinken Miete und Personal. Prozesse effizienter gestalten. Beschaffungskonditionen verhandeln. Bei Jupiter ist der grösste Hebel die Filialschliessung: Zehn Filialen schliessen spart direkt 5 bis 6 Millionen Franken an Miete und Personalkosten pro Jahr. Das ist die Massnahme, die das Unternehmen rettet."}, {"section": "Liquiditätswirksame Massnahmen", "text": "Liquiditätswirksame Massnahmen verbessern den Cashflow kurzfristig. Debitorenmanagement: Offene Rechnungen schneller eintreiben. Bei Jupiter: Beschleunigung der B2B-Zahlungseinholung. Creditorenmanagement: Zahlungsfristen bei Lieferanten aushandeln. Aktienverkauf: Nicht betriebsnotwendige Aktiven verkaufen. Zum Beispiel: Jupiter könnte Ladeneinrichtungen von geschlossenen Filialen verkaufen. Factoring: Offene Forderungen an einen Finanzdienstleister verkaufen — sofort Liquidität, aber zu einem Abschlag. Kurzfristige Kreditlinie: Die Bank um einen temporären Überbrückungskredit bitten."}, {"section": "Handlungsoptionen A — Eigentum erhalten", "text": "Kategorie A umfasst Optionen, bei denen die Eigentümerstruktur erhalten bleibt. Option A1: Going Concern — Weiterbetrieb als Sanierung, unterstützt durch Lembacher. Option A2: Kapitalerhöhung — Lembacher stellt neues EK bereit. Option A3: Restrukturierung — Kosten senken, Filialen schliessen — das ist genau Aufgabe 3. Option A4: Kapitalherabsetzung — bilanztechnische Bereinigung. Option A5: Gläubigerverzicht — Lembacher verzichtet auf Teile des Darlehens. Für Jupiter ist die Kombination A2 plus A3 die wahrscheinlichste und sinnvollste Option: Neues Kapital von Lembacher, kombiniert mit der Restrukturierung."}, {"section": "Handlungsoptionen B — Eigentum verändern", "text": "Kategorie B umfasst Optionen, bei denen die Eigentümerstruktur sich verändert. Management Buyout: Das Managementteam übernimmt das Unternehmen. Fusion: Zusammenschluss mit einem Konkurrenten — zum Beispiel mit Sprüngli oder Läderach. Verkauf: Das Unternehmen wird an einen strategischen Investor verkauft. Nachlassvertrag: Kontrollierter Schuldenabbau unter Aufsicht eines Richters. Konkurs: Liquidation — das absolute letzte Mittel. Für Jupiter ist Kategorie B die Rückfalloption: Wenn Lembacher nicht sanieren will, müsste ein neuer Eigentümer gefunden werden. Aber Kategorie A ist vorzuziehen, weil die Lembacher-Exklusivität ein zentrales Asset ist."}]}, {"id": 19, "icon": "⚖️", "color": "#B91C1C", "badge": "Block 5+A3", "title": "OR 335h — Massenentlassung & Sozialplan", "sub": "Konsultation · Fristen · Sozialplan · Kaskade", "paragraphs": [{"section": "Was ist eine Massenentlassung?", "text": "Das Schweizer Obligationenrecht, kurz OR, definiert Massenentlassung klar. In einem Betrieb mit 20 bis 99 Beschäftigten gilt eine Massenentlassung bei mindestens 10 Entlassungen innert 30 Tagen. In einem Betrieb mit 100 bis 299 Beschäftigten bei mindestens 10 Prozent der Stellen. In einem Betrieb über 300 Beschäftigten bei mindestens 30 Entlassungen. Bei Jupiter mit circa 170 Mitarbeitenden und 70 geplanten Entlassungen: Das sind 41 Prozent — weit über der Schwelle. Die Massenentlassungs-Bestimmungen gemäss OR 335h greifen zwingend."}, {"section": "OR 335i — Die Konsultationspflicht", "text": "OR 335i verpflichtet den Arbeitgeber zur Konsultation mit der Arbeitnehmervertretung. Was bedeutet das konkret? Rechtzeitige Information über die Gründe — warum wird entlassen? Über das Ausmass — wie viele Personen betrifft es? Über den Zeitraum — wann passiert es? Und über die geplanten Auswahlkriterien — wer wird entlassen, wer nicht? Und dann muss der Arbeitgeber Massnahmen prüfen, um die Entlassungen zu vermeiden, zu begrenzen oder die Folgen zu mildern. Der Verwaltungsrat darf nicht allein entscheiden und dann verkünden — er muss vorher konsultieren."}, {"section": "Die RAV-Meldung", "text": "Vor der Ankündigung der Massenentlassung muss das RAV — das Regionale Arbeitsvermittlungszentrum — informiert werden. Die Kündigung darf frühestens 30 Tage nach dieser Meldung wirksam werden. Das gibt den betroffenen Mitarbeitenden Zeit, sich um eine neue Stelle zu kümmern, und dem RAV Zeit, Unterstützungsangebote vorzubereiten. Wer diese Meldung vergisst oder zu spät macht, riskiert rechtliche Konsequenzen und kann die Kündigungen nicht fristgerecht aussprechen."}, {"section": "Kündigungsfristen gemäss OR 335c", "text": "Im ersten Dienstjahr: ein Monat Kündigungsfrist. Im zweiten bis neunten Dienstjahr: zwei Monate. Ab dem zehnten Dienstjahr: drei Monate. Achtung Ausnahme: OR 336c schützt Mitarbeitende während Krankheit, Unfall und Schwangerschaft — in dieser Zeit sind Kündigungen nichtig. Das ist besonders relevant bei Jupiter: Wenn Mitarbeitende gerade krank sind, wenn die Massenentlassung verkündet wird, muss man extrem sorgfältig vorgehen. Wer eine kranke Mitarbeiterin kündigt, riskiert einen kostspieligen Rechtsstreit — und die Kündigung wird vom Richter für ungültig erklärt."}, {"section": "Der Sozialplan — mehr als Pflicht", "text": "Ein Sozialplan ist in der Schweiz nicht gesetzlich vorgeschrieben — aber er ist für jedes grössere Unternehmen praktisch obligatorisch. Ein guter Sozialplan enthält: Abfindungen je nach Dienstjahren, typischerweise ein bis drei Monatslöhne. Outplacement-Unterstützung d
