<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>UFUE Assessment – Jupiter Confiserien AG</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%;overflow:hidden;font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;background:#111827;color:#e2e8f0}

#header{height:48px;display:flex;align-items:center;gap:12px;padding:0 16px;background:#0f0f1a;border-bottom:2px solid #f59e0b;flex-shrink:0}
#header .logo{font-size:16px;font-weight:700;color:#f8fafc}
#header .logo span{color:#f59e0b}
#header .subtitle{font-size:11px;color:#64748b}
.hbadge{margin-left:auto;background:#f59e0b;color:#0f0f1a;font-size:9px;font-weight:700;padding:3px 9px;border-radius:20px;letter-spacing:1px;text-transform:uppercase}

#app{display:flex;height:calc(100vh - 48px)}

#board-wrap{flex:1;display:flex;flex-direction:column;overflow:hidden;min-width:0}
#board-toolbar{display:flex;align-items:center;gap:6px;padding:8px 14px;background:#111827;border-bottom:1px solid #1f2937;flex-shrink:0}
.tbtn{background:#1f2937;border:1px solid #374151;border-radius:6px;color:#9ca3af;font-size:11px;font-weight:600;padding:5px 12px;cursor:pointer;transition:all .15s;font-family:inherit}
.tbtn:hover{background:#374151;color:#f8fafc}
#hint{margin-left:auto;font-size:10px;color:#4b5563}

#canvas-outer{flex:1;overflow:hidden;cursor:grab;position:relative;background:#ffffff}
#canvas-outer.grabbing{cursor:grabbing}
#canvas-inner{position:absolute;top:0;left:0;transform-origin:0 0;will-change:transform}
#canvas-inner svg{display:block;shape-rendering:geometricPrecision;text-rendering:optimizeLegibility}

#sidebar{width:300px;flex-shrink:0;display:flex;flex-direction:column;background:#111827;border-left:1px solid #1f2937}

#player{padding:14px;border-bottom:1px solid #1f2937;flex-shrink:0}
.player-label{font-size:9px;font-weight:700;letter-spacing:1.5px;text-transform:uppercase;color:#4b5563;margin-bottom:6px}
#ch-now-title{font-size:12px;font-weight:700;color:#f8fafc;margin-bottom:1px;line-height:1.3}
#ch-now-sub{font-size:9px;color:#4b5563;margin-bottom:10px;line-height:1.4}

#prog-wrap{height:4px;background:#1f2937;border-radius:4px;cursor:pointer;margin-bottom:12px}
#prog-fill{height:100%;background:#f59e0b;border-radius:4px;width:0%;transition:width .3s linear}
#prog-wrap:hover #prog-fill{background:#fbbf24}

#controls{display:flex;align-items:center;gap:6px;margin-bottom:10px}
.cbtn{background:#1f2937;border:1px solid #374151;border-radius:6px;color:#9ca3af;padding:6px 10px;cursor:pointer;font-size:12px;transition:all .15s;font-family:inherit}
.cbtn:hover{background:#374151;color:#f8fafc}
.cbtn.play{background:#1d4ed8;border-color:#1d4ed8;color:#fff;flex:1;font-weight:600}
.cbtn.play:hover{background:#1e40af}
.cbtn.stop{color:#ef4444;border-color:#3f1f1f}
.cbtn.stop:hover{background:#3f1f1f}

#settings{display:flex;gap:6px;margin-bottom:8px}
select{background:#1f2937;border:1px solid #374151;border-radius:6px;color:#9ca3af;padding:5px 8px;font-size:11px;font-family:inherit;cursor:pointer;flex:1}

#speaking-bar{display:flex;align-items:center;gap:8px;height:18px}
.wave{display:flex;gap:2px;align-items:center}
.wave span{width:3px;height:10px;background:#f59e0b;border-radius:2px;animation:wv 1s ease-in-out infinite}
.wave span:nth-child(2){animation-delay:.1s;height:16px}
.wave span:nth-child(3){animation-delay:.2s;height:8px}
.wave span:nth-child(4){animation-delay:.3s;height:14px}
.wave span:nth-child(5){animation-delay:.4s;height:10px}
@keyframes wv{0%,100%{transform:scaleY(1)}50%{transform:scaleY(1.7)}}
.wave-label{font-size:10px;color:#f59e0b;font-weight:600}
.hidden{visibility:hidden}

#ch-list-header{padding:10px 14px 6px;font-size:9px;font-weight:700;letter-spacing:1.5px;text-transform:uppercase;color:#4b5563;border-bottom:1px solid #1f2937;flex-shrink:0;display:flex;align-items:center;gap:8px}
#ch-list{flex:1;overflow-y:auto}
#ch-list::-webkit-scrollbar{width:4px}
#ch-list::-webkit-scrollbar-thumb{background:#374151;border-radius:4px}

.ch-item{display:flex;align-items:flex-start;gap:10px;padding:9px 14px;cursor:pointer;border-left:3px solid transparent;transition:all .15s;border-bottom:1px solid #1f293720}
.ch-item:hover{background:#1f2937}
.ch-item.active{background:#1e3a5f30;border-left-color:#f59e0b}
.ch-item.done .ch-num{background:#15803d!important;color:#fff!important;border-color:#15803d!important}
.ch-num{width:22px;height:22px;border-radius:50%;background:#1f2937;border:1px solid #374151;display:flex;align-items:center;justify-content:center;font-size:9px;font-weight:700;color:#6b7280;flex-shrink:0;font-family:monospace;transition:all .2s}
.ch-item.active .ch-num{background:#f59e0b;color:#0f0f1a;border-color:#f59e0b}
.ch-meta{flex:1;min-width:0}
.ch-badge{display:inline-block;font-size:8px;font-weight:700;padding:1px 5px;border-radius:3px;text-transform:uppercase;letter-spacing:0.5px;margin-bottom:2px}
.ch-title-list{font-size:10.5px;font-weight:600;color:#e2e8f0;line-height:1.3;margin-bottom:1px}
.ch-sub-list{font-size:9px;color:#374151;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.ch-item.active .ch-sub-list{color:#6b7280}

/* Row dividers */
.row-divider{padding:6px 14px 4px;font-size:8px;font-weight:700;letter-spacing:1.5px;text-transform:uppercase;color:#374151;background:#0f0f1a;border-bottom:1px solid #1f2937;border-top:1px solid #1f2937}
</style>
</head>
<body>

<div id="header">
  <div class="logo">📋 UFUE <span>Assessment</span></div>
  <div class="subtitle">Jupiter Confiserien AG &nbsp;·&nbsp; HF WISS Unternehmensführung</div>
  <div class="hbadge">für dummies</div>
</div>

<div id="app">

      <span id="hint">Ziehen · Scrollrad zum Zoomen · Doppelklick = Fit</span>

const CHAPTERS = [{"id": 1, "icon": "🍫", "color": "#C2410C", "badge": "Fallstudie", "sub": "Oben Links · Jupiter Profil & Bilanzkrise", "title": "Jupiter Confiserien AG — Wer sind wir?", "paragraphs": [{"section": "Das Unternehmen", "text": "Ganz oben links auf dem Board startet die Fallstudie. Jupiter Confiserien AG wurde 1905 in Olten gegründet als «Schweizer Chocoladen und Kolonialhaus». Heute: eine Premium-Chocolaterie mit 26 Filialen in der ganzen Schweiz, 170 Mitarbeitenden und der Marke «du coeur». Seit 2007 gehört Jupiter der Lembacher AG — einem exklusiven Schokoladenhersteller aus der Schweiz."}, {"section": "Die Krise in Zahlen", "text": "Die Bilanz per 31. Dezember 2010 zeigt das Problem klar. Total Aktiven 14,9 Millionen. Umlaufvermögen 7,3 Millionen, Anlagevermögen 7,7 Millionen. Auf der Passivseite: Fremdkapital 15,2 Millionen. Eigenkapital: minus 288'075 Franken. Das ist keine Kleinigkeit — das ist Überschuldung. Die Schulden übersteigen alle Aktiven."}, {"section": "Die Erfolgsrechnung", "text": "Umsatz 36,4 Millionen. Bruttogewinn 44,8 Prozent — eigentlich gut. Aber dann: Personal 23,6 Prozent, Miete 14,7 Prozent, Abschreibungen 5,9 Prozent. EBIT minus 4,4 Prozent. Jahresverlust minus 1,99 Millionen Franken. Das Grundproblem: Die Strategie ist richtig, aber die Kostenstruktur passt nicht dazu. Zu viele Filialen, zu hohe Mieten."}, {"section": "Was das bedeutet", "text": "Diese Zahlen sind die Ausgangslage für alles. Aufgabe 1 analysiert sie. Aufgabe 2 entwickelt die Strategie dagegen. Aufgabe 3 setzt die schmerzhafteste Massnahme um — den Stellenabbau. Die Zahl 288'075 Franken negatives Eigenkapital ist der Auslöser für alles. Merksatz: Die Substanz ist da, 44,8 Prozent Marge beweist es. Das Problem ist die Struktur, nicht das Produkt."}]}, {"id": 2, "icon": "⚡", "color": "#1E3A5F", "badge": "Block 1", "sub": "Oben Mitte · Management-Ebenen & St. Galler Modell", "title": "Management-Ebenen — Das St. Galler Modell", "paragraphs": [{"section": "Drei Ebenen der Führung", "text": "Neben der Fallstudie zeigt das Board die drei Management-Ebenen nach dem St. Galler Modell. Ganz oben: normatives Management. Das sind Vision, Leitbild und Werte — die Frage: Wofür stehen wir? Darunter: strategisches Management. SWOT, BCG, Porter, Ansoff — die Frage: Wohin wollen wir? Ganz unten: operatives Management. Budget, Reporting, Kennzahlen — die Frage: Wie setzen wir es um?"}, {"section": "Warum alle drei Ebenen nötig sind", "text": "Das St. Galler Modell zeigt: Alle drei Ebenen müssen aufeinander abgestimmt sein. Wer nur operativ hetzt, verliert die Richtung. Wer nur strategisch träumt, setzt nichts um. Und wer kein Leitbild hat, führt ohne Kompass. Bei Jupiter: Die Strategie sagt Premium. Die operative Realität sagt Verluste. Das ist die Lücke — und genau die soll das Assessment schliessen."}, {"section": "Management-Techniken: MbO, MbD, MbE", "text": "Das Board zeigt drei Führungstechniken. Management by Objectives: Ziele vereinbaren und Selbstkontrolle zulassen — so führt Jupiter die Filialleiterinnen. Management by Delegation: Aufgaben delegieren, AKV klar regeln — Filialautonomie bei Jupiter. Management by Exception: Nur bei Ausnahmen eingreifen — die Zentrale greift ein, wenn Kennzahlen ausserhalb des Toleranzbereichs liegen."}]}, {"id": 3, "icon": "🎯", "color": "#1E3A5F", "badge": "Block 1", "sub": "Oben Mitte-Rechts · Hersey & Blanchard + Lewin + McGregor", "title": "Führungsstile — Situativ, Autoritär und die Menschenbilder", "paragraphs": [{"section": "Hersey & Blanchard — Situatives Führen", "text": "Paul Hersey und Ken Blanchard: Der richtige Führungsstil hängt vom Reifegrad des Mitarbeitenden ab. Reifegrad kombiniert Können und Wollen. S1 Anweisen für R1: Neue Mitarbeiterin, unsicher, kein Können — klar anweisen und eng begleiten. S2 Trainieren für R2: Wollen da, Können fehlt — coachen, erklären, Feedback geben. S3 Partizipieren für R3: Kann alles, ist aber demotiviert — einbeziehen, zuhören, Autonomie geben. S4 Delegieren für R4: Erfahren und motiviert — Ziel vorgeben, Weg freilassen."}, {"section": "Führungsstile nach Kurt Lewin", "text": "Kurt Lewin unterschied drei Stile. Autoritär: Der Chef entscheidet allein. Schnell, klar, kein Input. Richtig in Krisen — Jupiter braucht das aktuell, um schnell zu handeln. Demokratisch: Gemeinsame Entscheidungen, mehr Akzeptanz, aber langsamer. Richtig für den Normalbetrieb. Laissez-faire: Mitarbeitende entscheiden selbst. Nur sinnvoll bei hocherfahrenen Spezialisten wie erfahrenen Filialleiterinnen in R4."}, {"section": "McGregor — Theorie X und Theorie Y", "text": "Zwei gegensätzliche Menschenbilder. Theorie X: Der Mensch ist faul, muss kontrolliert werden. Führt zu autoritärem Stil, Misstrauen, enger Kontrolle. Theorie Y: Der Mensch sucht Verantwortung, ist von Natur aus motiviert. Führt zu kooperativem Stil, Vertrauen, Delegation. Jupiter führt Filialen autonom mit Theorie Y — setzt aber Rahmen mit klaren MbO-Zielen."}]}, {"id": 4, "icon": "📊", "color": "#0F766E", "badge": "Block 1", "sub": "Oben Rechts · BSC + Shareholder/Stakeholder + Führungsorgane", "title": "BSC, Shareholder vs. Stakeholder und die AG-Organe", "paragraphs": [{"section": "Balanced Scorecard — vier Perspektiven", "text": "Die Balanced Scorecard von Kaplan und Norton misst Unternehmenserfolg aus vier Winkeln. Finanzen: Umsatz, Eigenkapitalrendite, Break-Even. Kunden: Marktanteil, Kundenzufriedenheit, Markenbekanntheit. Prozesse: Effizienz, Mietkosten, Durchlaufzeiten. Lernen und Entwicklung: Mitarbeiterkompetenz, Innovation, Kultur. Bei Jupiter: Finanzziel Break-Even 2012, EK-Quote über 10 Prozent. Kundenziel Touristenanteil 30 Prozent. Prozesspotenzial Mietkosten unter 12 Prozent."}, {"section": "Shareholder vs. Stakeholder", "text": "Shareholder sind die Aktionäre — bei Jupiter die Lembacher AG. Sie wollen Rendite. Stakeholder sind alle Anspruchsgruppen: 170 Mitarbeitende, Kunden, Lieferanten, Vermieter, RAV. In der Krise steht Jupiter vor dem Dilemma: Die Shareholderin braucht Sanierung. Aber die Stakeholder — besonders die 70 zu entlassenden Mitarbeitenden — tragen die Konsequenzen. Langfristig gewinnen beide nur, wenn Jupiter überlebt."}, {"section": "Die drei AG-Organe", "text": "Eine AG hat drei gesetzliche Organe. Generalversammlung: Die Aktionäre — hier Lembacher AG — wählen den Verwaltungsrat und genehmigen den Jahresbericht. Verwaltungsrat: Strategische Leitung und Aufsicht. Er hat den Restrukturierungsentscheid getroffen. Bei OR 725a Überschuldung ist er handlungspflichtig. Geschäftsleitung: Operative Leitung, setzt VR-Beschlüsse um, rapportiert monatlich."}]}, {"id": 5, "icon": "🧬", "color": "#6D28D9", "badge": "Block 1", "sub": "Oben Rechts · Unternehmenskultur & Ethik", "title": "Unternehmenskultur — Eisberg, Ethik und Leitbild", "paragraphs": [{"section": "Das Eisberg-Modell", "text": "Unternehmenskultur ist wie ein Eisberg. Sichtbar sind nur 10 Prozent: Logo, Kleiderordnung, Rituale, Sprache. Unsichtbar unter Wasser sind 90 Prozent: Werte, Normen, Überzeugungen, Denkweisen. Peter Drucker: Culture eats strategy for breakfast. Bei Jupiter: Das Leitbild sagt Qualität und Erlebnis. Aber der Kostendruck zwingt zur Sparsamkeit. Das ist ein Kulturbruch — und erklärt die Demotivation in C-Filialen."}, {"section": "Ethik — drei Modelle", "text": "Modell 1: Gewinn über Moral. Gesetze einhalten, sonst Gewinnmaximierung. Modell 2: Moral über Gewinn, soziale Priorität. Modell 3: CSR, Corporate Social Responsibility — Gewinne und Verantwortung kombinieren. Das ist der heutige Standard. Auch wirtschaftlich klüger: Unternehmen mit gutem Ruf haben tiefere Kapitalkosten und bessere Mitarbeiterbindung. Für Jupiter bei der Massenentlassung: CSR bedeutet würdevolle Kommunikation und ein fairer Sozialplan."}, {"section": "Jupiter hat kein Leitbild — das ist das Problem", "text": "Jupiter hat kein Leitbild. Das ist eine der Kernschwächen in Aufgabe 1. Ohne Leitbild fehlt die Orientierung. Filialleiterinnen wissen nicht: Was hat Priorität — Erlebnis oder Kosten? Kunden können die Marke nicht einordnen. Die Aufgabe: Ein Leitbild entwickeln. Vorschlag: Purpose «Wir begeistern Menschen durch Schokolade». Vision 2027: Profitabelste Premium-Chocolaterie der Schweiz. Mission: Frischschokolade in besten Lagen. Werte: Qualität, Erlebnis, Nachhaltigkeit."}]}, {"id": 6, "icon": "🔍", "color": "#15803D", "badge": "Aufgabe 1", "sub": "Zeile 2 Links · SWOT-Analyse", "title": "SWOT-Analyse — Jupiter unter der Lupe", "paragraphs": [{"section": "Was ist SWOT?", "text": "Die SWOT-Analyse ist das Fundament von Aufgabe 1. SWOT steht für Strengths, Weaknesses, Opportunities, Threats. Stärken und Schwächen sind intern — im Unternehmen selbst. Chancen und Risiken sind extern — im Marktumfeld. Der Sportler-Vergleich: Deine Schnelligkeit ist intern, das Wetter am Wettkampftag ist extern. Du kannst das Wetter nicht ändern, aber du kannst mit den richtigen Schuhen darauf reagieren."}, {"section": "Stärken von Jupiter", "text": "Was hat Jupiter, das andere nicht haben? Erstens: Marke mit 100 Jahren Geschichte — das kauft man nicht, das wächst. Zweitens: Lembacher-Exklusivität. Frischschokolade, die kein Coop je kopieren kann. Drittens: AAA-Lagen mit hoher Frequenz — Bahnhöfe, Altstädte, Tourismusorte. Viertens: Bruttogewinnmarge 44,8 Prozent — das Produkt funktioniert. Fünftens: Frischschokolade als echter USP."}, {"section": "Schwächen von Jupiter", "text": "Was zieht nach unten? Erstens und kritischst: Negatives Eigenkapital minus 288'075 Franken — Überschuldung, keine theoretische Schwäche. Zweitens: Mietkosten 14,7 Prozent — Richtwert unter 10 Prozent. Drittens: Vier C-Filialen, die mehr kosten als sie bringen. Viertens: E-Commerce unterentwickelt. Fünftens: Nur Schweiz — kein Wachstumshebel aussen."}, {"section": "Chancen und Risiken", "text": "Chancen: Premiumisierung im Schokoladenmarkt boomt global. E-Commerce für Premiumgüter wächst zweistellig. B2B-Geschenkegeschäft ist skalierbar und margenreich. Risiken: Coop und Migros haben ihr Premiumsortiment massiv ausgebaut. Läderach expandiert aggressiv in beste Lagen. Hersteller verkaufen direkt online. Fachkräftemangel für Confiseurinnen."}, {"section": "SWOT-Strategien — die vier Kombinationen", "text": "Der entscheidende Schritt: Aus SWOT konkrete Strategien ableiten. SO: Stärken plus Chancen — Premiummarke und Lembacher für E-Commerce nutzen. ST: Stärken gegen Risiken — USP Frischschokolade verteidigen, das kann kein Online-Shop replizieren. WO: Schwächen abbauen, Chancen nutzen — C-Filialen schliessen, Ressourcen ins B2B investieren. WT: Schwächen reduzieren, Risiken minimieren — C-Filialen schliessen bevor Läderach sie verdrängt."}]}, {"id": 7, "icon": "⚔️", "color": "#15803D", "badge": "Aufgabe 1", "sub": "Zeile 2 Mitte · Porter's Five Forces", "title": "Porter's Five Forces — Warum Differenzierung Pflicht ist", "paragraphs": [{"section": "Was Porter misst", "text": "Michael Porter — Harvard Business School — entwickelte 1979 dieses Modell. Seine These: Die Profitabilität einer Branche wird durch fünf strukturelle Kräfte bestimmt. Wer sie versteht, kann strategisch reagieren. Für Jupiter: Das Ergebnis dieser Analyse zwingt zu einer klaren Antwort."}, {"section": "Die fünf Kräfte bei Jupiter", "text": "Kraft 1 Rivalität: Lindt, Läderach, Sprüngli, Coop/Migros — sehr hoch. Kraft 2 Lieferanten: Lembacher ist Eigentümer und Lieferant — Abhängigkeit, aber auch Exklusivität. Kraft 3 Kunden: Premiumkunden sind preisunelastisch — tiefe Kundenmacht, gut für Jupiter. Kraft 4 Substitute: Coop-Chocoladen, Online-Versand, Direktverkauf der Hersteller — hohe Gefahr für Standardprodukte. Kraft 5 Neue Konkurrenten: Läderach zeigt gerade, dass Eintritt möglich ist — mittlere Gefahr."}, {"section": "Das Fazit für Jupiter", "text": "Porter sagt klar: In diesem Markt gibt es nur einen Ausweg. Differenzierung. Jupiter kann niemals Kostenführer sein — Coop hat Skaleneffekte, die unerreichbar sind. Jupiter muss so einzigartig sein, dass Kunden gezielt kommen. Für das Erlebnis, die Handwerksqualität, die Geschichte. Das begründet direkt die Strategie in Aufgabe 2: Differenzierung als zwingender Ansatz."}]}, {"id": 8, "icon": "📈", "color": "#15803D", "badge": "Aufgabe 1", "sub": "Zeile 2 Rechts-Mitte · SEP & Stärken-Schwächen-Profil", "title": "SEP und Stärken-Schwächen-Profil", "paragraphs": [{"section": "SEP nach Pümpin", "text": "Die Strategische Erfolgsposition, kurz SEP, ist ein Konzept des Schweizer Strategieprofessors Cuno Pümpin. Definition: Aufbau von wichtigen Fähigkeiten, die dem Unternehmen langfristig überdurchschnittliche Ergebnisse ermöglichen. Das ist die Schweizer Version der Kernkompetenz. Bei Jupiter ist die SEP klar: Frischschokolade plus Premium-Erlebnis in besten Lagen. Das kann kein anderer replizieren — das ist die Grundlage der gesamten Differenzierungsstrategie."}, {"section": "Das Stärken-Schwächen-Profil", "text": "Das Stärken-Schwächen-Profil ist eine visuelle Darstellung: Wo steht Jupiter im Vergleich zur Konkurrenz, auf einer Skala von minus drei bis plus drei? Stark positiv: Marke und Image, Produktqualität, Standortqualität, Bruttogewinnmarge. Schwach negativ: Eigenkapital stark negativ, Kostenstruktur negativ, E-Commerce schwach. Das Profil macht Prioritäten mit einem Blick sichtbar. Jupiter hat die richtigen Stärken — aber schleppt strukturelle Schwächen mit, die die Stärken auffressen."}]}, {"id": 9, "icon": "🐄", "color": "#15803D", "badge": "Aufgabe 1", "sub": "Zeile 2 Rechts · BCG-Matrix", "title": "BCG-Matrix — Welche Filialen sind Stars, welche Dogs?", "paragraphs": [{"section": "Das Grundprinzip", "text": "Die BCG-Matrix der Boston Consulting Group analysiert das Portfolio auf zwei Achsen: Marktwachstum und relativer Marktanteil. Vier Felder, vier Tiere, vier klare Strategien. Das Ziel: Entscheiden, wo man investiert, wo man Gewinn nimmt und wo man aufhört."}, {"section": "Die vier Felder bei Jupiter", "text": "Stars: Hohes Wachstum, hoher Marktanteil. Investieren. Bei Jupiter: Frischschokolade als Produkt, A-Filialen in Tourismusstandorten. Cash Cows: Tiefes Wachstum, hoher Marktanteil. Melken. Bei Jupiter: Flagship A-Filialen Zürich, Genf, Bern — stabil, profitabel, kaum Investitionsbedarf. Question Marks: Hohes Wachstum, tiefer Marktanteil. Entscheiden! Bei Jupiter: E-Commerce und B2B-Geschenke. Der Markt boomt, Jupiter hat noch nicht investiert. Dogs: Tiefes Wachstum, tiefer Marktanteil. Schliessen. Bei Jupiter: Die vier C-Filialen. Das ist keine Meinung — das ist Portfolio-Logik."}, {"section": "BCG ist die Grundlage für Aufgabe 3", "text": "Der direkte Zusammenhang: BCG zeigt, welche Filialen Dogs sind. Dogs schliessen ist die Normstrategie. Das begründet, warum in Aufgabe 3 Mitarbeitende entlassen werden müssen. Ohne BCG ist die Massenentlassung willkürlich. Mit BCG ist sie analytisch fundiert. Im Assessment immer explizit machen: Gemäss BCG sind die C-Filialen Dogs — das begründet die Schliessungen in Aufgabe 3."}]}, {"id": 10, "icon": "🔢", "color": "#15803D", "badge": "Aufgabe 1", "sub": "Zeile 2 Rechts · McKinsey & GAP & Kennzahlen", "title": "McKinsey-Matrix, GAP-Analyse und Finanzkennzahlen", "paragraphs": [{"section": "McKinsey 9-Box-Matrix", "text": "Die McKinsey-Matrix verfeinert BCG: Statt vier gibt es neun Felder. Achsen sind Marktattraktivität und Wettbewerbsvorteil, beide mit drei Stufen. Ergebnis für Jupiter: A-Flagship-Filialen oben rechts — Marktattraktivität hoch, Wettbewerbsvorteil stark, Signal: Investieren und Wachsen. B-Filialen in der Mitte — selektiv investieren. C-Filialen unten links — Marktattraktivität tief, Wettbewerbsvorteil schwach, Signal: Desinvestieren. Bestätigt BCG, aber nuancierter."}, {"section": "GAP-Analyse", "text": "Die GAP-Analyse zeigt die strategische Lücke. Zwei Kurven: Wie entwickelt sich Jupiter ohne neue Massnahmen? Und wie soll es sich entwickeln? Die Lücke dazwischen ist der GAP — der Handlungsbedarf. Bei Jupiter: Ohne Massnahmen wächst der Verlust. Mit Filialbereinigung, E-Commerce und Markenstärke kann Jupiter die Lücke schliessen und bis 2012 den Break-Even erreichen. Die GAP-Analyse macht den Handlungsdruck quantifizierbar."}, {"section": "Die wichtigsten Finanzkennzahlen", "text": "Eigenkapitalquote: EK durch Total Aktiven. Bei Jupiter minus 1,9 Prozent — Alarm! Umsatzrentabilität ROS: Jahresgewinn durch Umsatz — minus 5,5 Prozent, Verlustzone. Bruttogewinnmarge: 44,8 Prozent, solide. Cash Ratio Liquidität 1: Kasse durch kurzfristiges FK — unter 1, kritisch. Quick Ratio: Kasse plus Debitoren durch kurzfristiges FK — über 1, ok. Mietintensität: 14,7 Prozent, viel zu hoch, Ziel unter 12 Prozent. Diese Formeln musst du auswendig können und auf Jupiter anwenden."}]}, {"id": 11, "icon": "🚀", "color": "#15803D", "badge": "Aufgabe 2", "sub": "Zeile 3 Links · Ansoff-Matrix", "title": "Ansoff-Matrix — Vier Wachstumsrichtungen für Jupiter", "paragraphs": [{"section": "Die vier Felder", "text": "Igor Ansoff, 1957: Vier Wachstumsrichtungen auf zwei Achsen — Produkte und Märkte, je bestehend oder neu. Marktdurchdringung: Bestehende Produkte in bestehenden Märkten. Sicherste Strategie. Für Jupiter: E-Shop stärken, Stammkunden binden, Topfilialen ausbauen. Produktentwicklung: Neue Produkte in bestehenden Märkten. Für Jupiter: Neue Frischschokoladen-Serien, limitierte Saisoneditionen, Sushi-Konfekt ausbauen. Marktentwicklung: Bestehende Produkte in neuen Märkten. Für Jupiter langfristig: E-Shop in weitere CH-Regionen, Franchise. Diversifikation: Neu plus neu. Für Jupiter jetzt: Nein! Zu riskant bei Verlusten."}, {"section": "Die richtige Reihenfolge", "text": "Ansoff sagt für Jupiter klar: Zuerst Marktdurchdringung — die sicherste Strategie mit den besten Filialen. Dann Produktentwicklung — bestehende Kunden mit neuen Produkten begeistern. Marktentwicklung und Diversifikation erst nach erfolgreicher Stabilisierung. Das ist die logische Sequenz, die auch die Roadmap in Aufgabe 2 widerspiegelt."}]}, {"id": 12, "icon": "♟️", "color": "#15803D", "badge": "Aufgabe 2", "sub": "Zeile 3 Mitte · Porter Wettbewerbsstrategien", "title": "Porter Wettbewerbsstrategien — Differenzierung oder Tod", "paragraphs": [{"section": "Drei generische Strategien", "text": "Porter beschrieb drei grundlegende Strategien für nachhaltige Wettbewerbsvorteile. Kostenführerschaft: Der günstigste im Markt sein. Für Jupiter unmöglich — Coop und Migros haben Skaleneffekte, die nie erreichbar sind. Differenzierung: Einzigartig sein durch Qualität, Design, Erlebnis. Das ist Jupiters einziger Weg. Premium, Handwerk, Lembacher-Exklusivität, Frischschokolade. Nischenstrategie: Auf ein Segment konzentrieren. Für Jupiter partiell: Tourismusorte, B2B-Geschenke."}, {"section": "Stuck in the Middle — die grösste Falle", "text": "Porter warnt vor Stuck in the Middle: Weder Kostenführer noch echter Differenzierer. Kein klares Profil. Kein erkennbarer Vorteil. Verluste sind die Folge. Und genau das ist Jupiters heutiges Problem: Die Strategie sagt Premium, aber C-Filialen in Randlagen mit schwachem Erlebnis sagen das Gegenteil. Wer Premium sein will, muss überall Premium sein. Die Lösung: C-Filialen schliessen und die Topfilialen konsequent als Premiumstandorte positionieren."}]}, {"id": 13, "icon": "📋", "color": "#15803D", "badge": "Aufgabe 2", "sub": "Zeile 3 Rechts · Strategieimplementierung & 3 Schwerpunkte", "title": "Die drei Schwerpunkte und die 18-Monats-Roadmap", "paragraphs": [{"section": "Der strategische Kreislauf", "text": "Eine Strategie ist erst dann real, wenn sie implementiert wird. Der Kreislauf: Analyse mit SWOT und Porter und BCG. Dann Strategie mit Ansoff, Porter und Vision. Dann Umsetzung mit Projektaufträgen und Budget. Dann Kontrolle mit KPIs, BSC und Reporting. Und zurück zur Analyse. Bei Jupiter dreht dieser Kreislauf gerade in einer Krise — deshalb ist die Umsetzung besonders dringlich."}, {"section": "Die drei Schwerpunkte", "text": "Aufgabe 2 verlangt drei Projektaufträge. Schwerpunkt Eins Filialbereinigung: Wer ist verantwortlich — Geschäftsleitung. Was — Standortrating mit Deckungsbeitragsrechnung aller 26 Filialen. Bis wann — Entscheid in vier Wochen, Umsetzung in sechs Monaten. Einsparpotenzial zwei bis drei Millionen Franken pro Jahr. Schwerpunkt Zwei E-Commerce: E-Shop Relaunch plus B2B-Portal. Budget 200'000 bis 300'000 Franken, Wachstum ohne neue Fixkosten. Schwerpunkt Drei Markenstärke: Erlebniskonzept für Topfilialen, Storytelling, Kooperation mit Schweiz Tourismus."}, {"section": "Die 18-Monats-Roadmap", "text": "Monate Eins bis Drei — Stabilisierung: Sofort Standortanalyse starten, Lembacher um neue Finanzierungstranche bitten, Krisenteam bilden. Monate Drei bis Sechs — Bereinigung: Zehn Filialen schliessen, das ist Aufgabe 3. Monate Sechs bis Zwölf — Fokus: E-Shop live, Markenerlebnis in Topfilialen, B2B-Kanal aufbauen. Monate Zwölf bis Achtzehn — Wachstum: Break-Even erreichen. SMART-Ziele: Eigenkapitalquote auf über 10 Prozent, Mietkosten unter 12 Prozent, E-Shop-Anteil über 15 Prozent."}]}, {"id": 14, "icon": "🌟", "color": "#6D28D9", "badge": "Block 3", "sub": "Zeile 3 Ganz Rechts · Vision · Leitbild · Werte", "title": "Vision, Leitbild und Werte — Normatives Management", "paragraphs": [{"section": "Die Hierarchie", "text": "Ganz rechts in Zeile 3 zeigt das Board die normative Ebene. Die Hierarchie von unten nach oben: Werte beschreiben wie wir uns verhalten. Mission beschreibt was wir täglich tun. Vision zeigt wo wir in fünf bis zehn Jahren sein wollen. Purpose beantwortet warum wir überhaupt existieren — über den Profit hinaus. Jedes Element prägt das nächste. Ohne klare Werte keine glaubwürdige Mission."}, {"section": "Jupiter Leitbild — neu entwickeln", "text": "Jupiter hat kein Leitbild — das ist die Kernschwäche in Aufgabe 1. Die Aufgabe: Eines entwickeln. Purpose: Wir begeistern Menschen durch Schokolade. Vision 2027: Profitabelste Premium-Chocolaterie der Schweiz. Mission: Frische Handwerks-Schokolade in AAA-Lagen. Werte: Qualität, Erlebnis, Nachhaltigkeit. Strategischer Standort: Heute ist Punkt A — Überschuldung, Verluste. Ziel ist Punkt B — Profitabilität. Der Weg dazwischen ist die Strategie aus Aufgabe 2."}]}, {"id": 15, "icon": "💰", "color": "#0F766E", "badge": "Block 4", "sub": "Zeile 4-5 Links · Bilanz T-Schema & Erfolgsrechnung", "title": "Bilanz und Erfolgsrechnung — die Zahlen im Detail", "paragraphs": [{"section": "Das T-Schema der Bilanz", "text": "Die Bilanz ist eine Momentaufnahme am Stichtag. Links Aktiven — Mittelverwendung, was das Unternehmen hat. Rechts Passiven — Mittelherkunft, woher das Geld kommt. Goldene Regel: Aktiven gleich Passiven, immer. Bei Jupiter: Umlaufvermögen 7,3 Millionen, davon Kasse 2,7 Millionen, Debitoren 1,8 Millionen, Vorräte 2,7 Millionen. Anlagevermögen 7,7 Millionen. Total 14,9 Millionen."}, {"section": "Die Passivseite", "text": "Kurzfristiges Fremdkapital 4 Millionen: Kreditoren, Kontokorrent. Langfristiges Fremdkapital 11,2 Millionen: fast alles Darlehen von der Aktionärin Lembacher. Eigenkapital minus 288'075 Franken. Das heisst: Das gesamte Eigenkapital ist verbraucht und ins Negative gerutscht. Anlagedeckungsgrad 2 — EK plus LFK durch AV — ergibt 141 Prozent, weil Lembacher das Darlehen stützt. Aber das EK ist trotzdem negativ."}, {"section": "Die Erfolgsrechnung Schritt für Schritt", "text": "Nettoumsatz 36,4 Millionen, 100 Prozent. Minus Warenaufwand 55,2 Prozent. Ergibt Bruttogewinn 44,8 Prozent — das ist solide. Minus Personal 23,6 Prozent. Minus Miete 14,7 Prozent. Minus Abschreibungen 5,9 Prozent. Ergibt EBIT minus 4,4 Prozent. Minus Finanzaufwand 1 Prozent. Jahresverlust minus 5,5 Prozent, also minus 1,99 Millionen Franken. Kostentreiber: Miete 14,7 plus Personal 23,6 ergibt 38,3 Prozent des Umsatzes. Jede geschlossene Filiale senkt direkt beides."}]}, {"id": 16, "icon": "🏦", "color": "#0F766E", "badge": "Block 4", "sub": "Zeile 5 Rechts · Finanzierungsformen", "title": "Finanzierungsformen — Wie Unternehmen Geld beschaffen", "paragraphs": [{"section": "Die 2x2-Matrix", "text": "Finanzierung auf zwei Dimensionen. Dimension Eins: Woher kommt das Geld? Aussenfinanzierung von aussen, von Investoren oder Gläubigern. Innenfinanzierung aus dem Unternehmen selbst — Gewinne, Abschreibungen, Rückstellungen. Dimension Zwei: Wer trägt das Risiko? Fremdkapital muss zurückbezahlt werden. Eigenkapital trägt kein festes Rückzahlungsversprechen — der Eigentümer trägt das Risiko."}, {"section": "Jupiter braucht Aussenfinanzierung EK", "text": "Bei Jupiter: Die Hauptfinanzierung läuft über das Darlehen der Aktionärin Lembacher — das ist Aussenfinanzierung Fremdkapital. Für die Sanierung braucht Jupiter eine neue Eigenkapitaltranche von Lembacher — Aussenfinanzierung Eigenkapital. Oder eine Kapitalherabsetzung, um das negative EK buchhalterisch zu bereinigen — Innenfinanzierung. Hauptrisiko: Die Abhängigkeit von Lembacher. Wenn Lembacher das Darlehen kündigt, ist Jupiter sofort zahlungsunfähig."}]}, {"id": 17, "icon": "⚠️", "color": "#B91C1C", "badge": "Block 5", "sub": "Zeile 5-6 Rechts · Krise & OR 725", "title": "Unternehmenskrise — OR 725 und die Krisentypen", "paragraphs": [{"section": "Die vier Krisentypen", "text": "Krisen entwickeln sich in Stufen. Strategische Krise: Die Strategie passt nicht mehr zum Markt. Noch unsichtbar in den Zahlen, aber die Basis bröckelt. Ertragskrise: Verluste werden sichtbar, EBIT negativ — bei Jupiter 2010 minus 4,4 Prozent. Liquiditätskrise: Cash wird knapp, Lieferanten warten. Bilanzkrise und Überschuldung: EK negativ, Schulden übersteigen alle Aktiven — Jupiter heute. Je früher man eingreift, desto mehr Optionen hat man."}, {"section": "OR 725 und 725a", "text": "OR 725 Kapitalverlust: Wenn das EK unter die Hälfte des Aktienkapitals fällt, muss der VR sofort handeln. OR 725a Überschuldung: Schulden übersteigen alle Aktiven, bewertet zu Fortführungswerten und Liquidationswerten. Der VR muss die Revisionsstelle informieren und bei Ungewissheit den Richter. Going Concern bedeutet: Das Unternehmen kann die nächsten 12 Monate weitergeführt werden. Bei Jupiter: EK minus 288'075 — OR 725a greift. Der VR hat Handlungspflicht. Das ist nicht optional."}]}, {"id": 18, "icon": "🔗", "color": "#B45309", "badge": "Assessment", "sub": "Zeile 6 · Roter Faden & Zusammenhänge", "title": "Roter Faden — Wie alle drei Aufgaben zusammenhängen", "paragraphs": [{"section": "A1 Analyse — Instrumente und Ergebnis", "text": "Aufgabe 1 Instrumente: SWOT, Porter, BCG, McKinsey, Kennzahlen. Ergebnis: Jupiter ist überschuldet, die Differenzierungsstrategie ist richtig, aber die Kosten sind zu hoch. Das ist nicht eine Meinung — das folgt analytisch aus den Modellen."}, {"section": "A2 Strategie — Instrumente und Ergebnis", "text": "Aufgabe 2 Instrumente: Ansoff, Porter Wettbewerb, drei Schwerpunkte, Roadmap, BSC. Ergebnis: Filialbereinigung plus E-Commerce plus Markenstärke gleich Sanierungspaket. Die Roadmap zeigt: Erst A3 — dann erst Wachstum."}, {"section": "A3 Personal — Instrumente und Ergebnis", "text": "Aufgabe 3 Instrumente: OR 335h und i, Kommunikationskaskade, Sozialplan, Imageschutz. Ergebnis: 16 Profitfilialen, unter 100 Mitarbeitende, Kosten minus 30 Prozent, Marke intakt. Der Imageschutz in A3 schützt direkt die Markenstrategie in A2 — wer das vergisst, riskiert, dass A2 nicht funktioniert."}, {"section": "Die Modell-Verbindungen", "text": "SWOT belegt die Notwendigkeit von A2 und A3. BCG Dogs begründen direkt die Filialschliessungen in A3. Porter Five Forces begründen die Differenzierungsstrategie in A2. Finanzkennzahlen EK negativ triggern OR 725a und die Handlungspflicht. A2 Roadmap sequenziert A3 zuerst — erst sparen, dann investieren. BSC misst ob die A2-Strategie wirkt."}, {"section": "Die Kernbotschaft für das Assessment", "text": "Jupiter hat eine starke Marke, eine gute Marge von 44,8 Prozent und exklusive Produkte. Das Problem ist nicht das Produkt — es ist die Kostenstruktur. Die Lösung: Fokussieren mit A3, digital wachsen mit A2, Marke stärken. Das Assessment-Schema für jede Antwort: Erstens Methode erklären. Zweitens auf Jupiter anwenden. Drittens Zusammenhang zu anderen Aufgaben herstellen."}]}, {"id": 19, "icon": "🌍", "color": "#0F766E", "badge": "Block 2", "sub": "Zeile 7 Links · PEST/PESTEL", "title": "PESTEL — Die sechs Umweltsphären", "paragraphs": [{"section": "Warum Umweltanalyse?", "text": "PESTEL analysiert das externe Umfeld — alles was auf das Unternehmen einwirkt, aber nicht direkt kontrollierbar ist. Die Ergebnisse fliessen als Chancen und Gefahren direkt in die SWOT ein. Merksatz: PEST ist der Input für O und T in der SWOT."}, {"section": "Die sechs Sphären bei Jupiter", "text": "Political: OR 335h und OR 725a setzen gesetzliche Rahmenbedingungen. Economic: CHF-Stärke reduziert Touristenfrequenz in den Filialen — direkter Umsatzeinfluss. Social: Premiumisierungstrend im Konsumverhalten — Chance für Jupiter. Technological: E-Commerce wächst, Jupiters E-Shop ist unterentwickelt — Risiko und Chance zugleich. Environmental: Fair Trade und nachhaltige Schokolade als Chance für Markenstärke. Legal: Massenentlassung unterliegt strengen Konsultations- und Meldepflichten."}, {"section": "Chancen-Gefahren-Profil", "text": "Das Chancen-Gefahren-Profil bewertet externe Faktoren auf einer Skala von stark positiv bis stark negativ. Wie attraktiv ist der Markt insgesamt? Wie stark sind einzelne externe Kräfte? Das Profil ergänzt die interne Stärken-Schwächen-Analyse und liefert zusammen das vollständige SWOT-Bild. Bei Jupiter: Marktgrösse und Wachstum sind positiv, Regulierung und Konkurrenz sind gemischt."}]}, {"id": 20, "icon": "🗺️", "color": "#0F766E", "badge": "Block 2", "sub": "Zeile 7 Mitte-Links · SGF & Positionierung", "title": "SGF und Positionierung — Wo konkurrieren wir?", "paragraphs": [{"section": "Strategische Geschäftsfelder", "text": "SGF beantworten: Wo konkurrieren wir? Jedes SGF braucht eine eigene Strategie, weil Konkurrenz und Erfolgsfaktoren verschieden sind. Jupiter hat drei SGF. SGF 1 Detailhandel B2C: Filialen, Endkunden, Premiumsegment — das Kerngeschäft. SGF 2 Grosshandel B2B: Firmengeschenke, Events — Wachstumssegment. SGF 3 E-Commerce: Onlineshop CH — Zukunftssegment. Die Strategie für alle drei muss aufeinander abgestimmt sein."}, {"section": "Positionierung", "text": "Positionierung beantwortet: Warum kaufen Kunden bei Jupiter und nicht beim Wettbewerb? Die Entscheidungskriterien der Kunden: Qualität sehr wichtig — Jupiter punktet mit Frische und Handwerk. Erlebnis sehr wichtig — Chocolaterie-Erlebnis differenziert. Marke wichtig — 100 Jahre Jupiter. Preis weniger wichtig — Premiumkunden sind preisunelastisch. Verfügbarkeit — AAA-Lagen sind der Hebel. Jupiter ist auf die richtigen Kriterien ausgerichtet. Die Herausforderung: Das konsequent leben und kommunizieren."}]}, {"id": 21, "icon": "📡", "color": "#1E3A5F", "badge": "Block 1", "sub": "Zeile 7 Mitte · Kommunikation & Führungsvorgang", "title": "Kommunikationsmodell und Zielhierarchie", "paragraphs": [{"section": "Sender-Empfänger-Modell", "text": "Das Kommunikationsmodell von Shannon und Weaver: Sender kodiert eine Botschaft. Empfänger empfängt und dekodiert. Störungen verfälschen die Botschaft. Feedback schliesst den Kreislauf. Wichtigste Erkenntnis: Kommunikation ist nicht was der Sender sagt — es ist was der Empfänger versteht. Bei Jupiter: Eine Botschaft der GL über Filialnschliessungen wird von jedem anders dekodiert. Deshalb braucht es direkte Gespräche, klare Sprache, kein Interpretationsspielraum."}, {"section": "Zielhierarchie", "text": "Ein Unternehmen hat nicht nur ein Ziel, sondern eine Pyramide. Finanzielle Ziele: Umsatz, Rentabilität, EK-Quote. Marktziele: Marktanteil, Bekanntheit. Soziale Ziele: Mitarbeiterzufriedenheit. Ökologische Ziele: Nachhaltigkeit, ESG. Technologische Ziele: Innovation, E-Commerce. Bei Jupiter stehen finanzielle Ziele — Überschuldung beseitigen — aktuell in Konflikt mit sozialen Zielen — Arbeitsplätze erhalten. Das ist das Kerndilemma in Aufgabe 3."}]}, {"id": 22, "icon": "📊", "color": "#0F766E", "badge": "Block 4", "sub": "Zeile 7 Mitte-Rechts · Budgetierung & FIBU/BEBU", "title": "Budgetierung, Reporting und FIBU versus BEBU", "paragraphs": [{"section": "Budgetierungsprozess", "text": "Budget entsteht auf zwei Wegen. Top-Down: Die Führung gibt Umsatzziele vor — was müssen wir erreichen, um profitabel zu sein? Bottom-Up: Die Filialen melden ihren Ressourcenbedarf von unten nach oben. In der Praxis kombiniert man beides: Die Führung setzt den Rahmen, die Filialen planen darin. Das M11 plus 1 Forecast ist ein rollierender Plan: Elf Monate Ist plus ein Monat Prognose — immer ein Jahr voraus."}, {"section": "FIBU vs BEBU", "text": "Finanzbuchhaltung FIBU: Blick in die Vergangenheit. Legt Rechenschaft ab, erstellt Bilanz und Erfolgsrechnung. Gesetzlich vorgeschrieben. Betriebsbuchhaltung BEBU oder Controlling: Blick in die Zukunft. Plant Budget, macht Soll-Ist-Vergleiche, analysiert Kostenstellen. Freiwillig aber unverzichtbar. Einfach: FIBU sagt was war. BEBU sagt was kommen soll und ob wir auf Kurs sind. Beide zusammen ergeben ein vollständiges Bild der finanziellen Lage."}]}, {"id": 23, "icon": "🔤", "color": "#0F766E", "badge": "Block 4", "sub": "Zeile 7 Rechts · ABC-Analyse & Liquiditätsplan", "title": "ABC-Analyse und Liquiditätsplan", "paragraphs": [{"section": "ABC-Analyse", "text": "Die ABC-Analyse sortiert nach Bedeutung. A-Kunden oder A-Filialen: 20 Prozent der Einheiten bringen 80 Prozent des Umsatzes — maximale Pflege und Investition. B-Kunden: 30 Prozent der Einheiten, 15 Prozent Umsatz — entwickeln. C-Kunden: 50 Prozent der Einheiten, nur 5 Prozent Umsatz — prüfen und priorisieren. Bei Jupiter direkt: Die 12 A-Filialen machen ungefähr 80 Prozent des Umsatzes — investieren. Die 4 C-Filialen bringen fast nichts — schliessen. Die ABC-Analyse bestätigt BCG aus einer anderen Perspektive."}, {"section": "Liquiditätsplan", "text": "Cash is King. Der Liquiditätsplan zeigt monatlich: Einzahlungen Cash In minus Auszahlungen Cash Out ergibt den Net Cash. Kumuliert über alle Monate zeigt er, wann die Kasse leer wird. Bei Jupiter 2010: Cash Ratio 0,72 — unter dem kritischen Wert von 1. Das bedeutet: Kurzfristige Schulden übersteigen die Kasse. Der Merksatz: Liquidität schlägt Rentabilität. Ein profitables Unternehmen kann Konkurs gehen, wenn es nicht liquide ist. Erst Survival, dann Profit."}]}, {"id": 24, "icon": "🔄", "color": "#B45309", "badge": "Block 5", "sub": "Zeile 8 Links · Change Management", "title": "Change Management — Kontinuierlich vs. Akut", "paragraphs": [{"section": "Zwei Typen der Veränderung", "text": "Typ A kontinuierliche Veränderung: Evolution, Schritt für Schritt. Kaizen, Lean, TQM. Zeit vorhanden, Management kann planen. Bei Jupiter ein Beispiel: jährliche Sortimentsanpassung. Typ B akute Veränderung: Diskontinuität, Bruch, Schock. Kein Zeit für Analyse. Unmittelbarer Handlungszwang. Bei Jupiter aktuell: Jahresverlust plus negatives EK gleich akute Krise. Es braucht sofortiges Handeln — der VR hat entschieden, es wird umgesetzt."}, {"section": "Das Lufthansa-Beispiel", "text": "Lufthansa wird in den UFUE-Unterlagen als Beispiel genutzt: Starke Position als Weltklasse-Airline. Dann externe Schocks: Terroranschläge 2001, SARS 2003, Finanzkrise 2008, Corona 2020. Jedes Mal brauchte Lufthansa ein massives Change-Programm: Personalabbau, Flottenreduktion, Restrukturierung. Die Lehre: Auch starke Unternehmen brauchen Change Management, wenn das Umfeld sich dramatisch verändert. Stärke schützt nicht vor externen Schocks — Agilität schon."}]}, {"id": 25, "icon": "△", "color": "#B91C1C", "badge": "Block 5", "sub": "Zeile 8 Mitte-Links · Sanierungsdreieck", "title": "Sanierungsdreieck — Alle drei Faktoren müssen stimmen", "paragraphs": [{"section": "Die drei Ecken", "text": "Damit eine Sanierung gelingt, braucht es gleichzeitig drei Dinge. Sanierungswille: Will die Führung wirklich sanieren? Gibt es echten Mut zur Veränderung? Typische Ausreden: Es war schon immer so. Wir brauchen nur etwas mehr Kapital. Fehlt der Wille, scheitert die Sanierung immer — egal wie viel Kapital fliesst. Sanierungsfähigkeit: Hat das Unternehmen die nötigen Ressourcen für die Übergangsphase? Bei Jupiter: Lembacher kann eine neue Eigenkapitaltranche einbringen — das ist die Fähigkeit. Sanierungswürdigkeit: Braucht der Markt dieses Unternehmen noch? Wenn Jupiter morgen schliesst, fehlt die Frischschokolade, das Erlebnis, die Geschichte — das ist die Würdigkeit."}, {"section": "Was passiert wenn eine Ecke fehlt", "text": "Fehlt der Wille: Massnahmen werden halbherzig umgesetzt, Verluste wachsen weiter. Fehlt die Fähigkeit: Zu wenig Cash, Insolvenz bevor die Strategie wirkt. Fehlt die Würdigkeit: Man rettet ein Unternehmen, das der Markt gar nicht braucht — das Geld ist verloren. Bei Jupiter: Alle drei Ecken sind gegeben. Der VR hat den Willen gezeigt. Lembacher hat die Fähigkeit. Die Marke und der Markt beweisen die Würdigkeit. Das bedeutet: Sanierung ist möglich — wenn konsequent umgesetzt."}]}, {"id": 26, "icon": "⛓", "color": "#B91C1C", "badge": "Block 5", "sub": "Zeile 8 Mitte · Kausalkette Früherkennung", "title": "Kausalkette — Wie Krisen entstehen und eskalieren", "paragraphs": [{"section": "Die vier Stufen", "text": "Stufe 1 Strategische Krise: Falsche Positionierung, Strategie passt nicht zum Markt. Noch keine sichtbaren Verluste — aber die Basis bröckelt. Früh und unsichtbar. Bei Jupiter: Die Restrukturierung 2008 war nicht konsequent genug. Stufe 2 Ertragskrise: Umsatz sinkt, Margen fallen, EBIT negativ. Jetzt messbar in der Erfolgsrechnung. Bei Jupiter 2010: EBIT minus 4,4 Prozent. Stufe 3 Liquiditätskrise: Cash wird knapp, Kreditoren warten. Akut und kritisch. Stufe 4 Überschuldung: EK negativ, OR 725a greift. Insolvenzgefahr."}, {"section": "Jupiter auf der Kausalkette", "text": "Jupiter ist 2010 zwischen Stufe 3 und 4. Cash Ratio 0,72 deutet auf Liquiditätsengpass. EK negativ zeigt Überschuldung. Die Kausalkette zeigt: Man hätte früher eingreifen müssen — schon bei der Ertragskrise 2009. Die Lehre: Frühwarnindikatoren einbauen. EBIT-Trend, Mietintensität, Liquiditätsentwicklung monatlich prüfen. Wenn ein Indikator ins Rote dreht, sofort handeln — nicht warten bis vier Stufen erreicht sind."}]}, {"id": 27, "icon": "🎚", "color": "#B45309", "badge": "Block 5", "sub": "Zeile 8 Rechts-Mitte · Strategische Kontrolle", "title": "Strategische Kontrolle — Vier Arten der Überwachung", "paragraphs": [{"section": "Die vier Kontrollarten", "text": "Strategische Kontrolle überwacht, ob die Strategie noch stimmt. Art 1 Prämissenkontrolle: Stimmen die Annahmen noch? Hat sich das Wettbewerbsumfeld verändert? Art 2 Durchführungskontrolle: Werden Massnahmen wirklich umgesetzt? Sind Meilensteine erreicht? Art 3 Strategische Überwachung: Offenes Radar für neue Chancen und Risiken. Art 4 Prämissen-Anpassung: Wenn Abweichungen festgestellt werden, Strategie korrigieren — die Lernschleife."}, {"section": "Strategisch vs. operativ", "text": "Strategische Führung: Zeithorizont 3 bis 5 Jahre, Richtungsentscheidungen, Top-Management. Operatives Management: Zeithorizont unter einem Jahr, Budget, Reporting, Tagesgeschäft, Linie. Beide sind wichtig, aber man darf sie nicht verwechseln. Ein Verwaltungsrat, der sich täglich in das operative Geschäft einmischt, macht einen Fehler. Und eine Geschäftsleitung, die nie strategisch denkt, verliert die Richtung."}]}, {"id": 28, "icon": "⚖️", "color": "#B91C1C", "badge": "Aufgabe 3", "sub": "Zeile 8+9 Ganz Rechts · Handlungsoptionen & OR 335h", "title": "Handlungsoptionen, OR 335h und der Sozialplan", "paragraphs": [{"section": "Handlungsoptionen A — Eigentum erhalten", "text": "Kategorie A bedeutet: Das Eigentum bleibt bei Lembacher. A1 Going Concern — Weiterbetrieb, Lembacher stützt, Voraussetzung: Liquidität gesichert. A2 Kapitalerhöhung — Lembacher bringt neue Eigenkapitaltranche, Voraussetzung: Investorenbereitschaft. A3 Restrukturierung — Kosten senken, Filialen schliessen, das ist Aufgabe 3, Voraussetzung: Sanierungsplan. A4 Kapitalherabsetzung — EK buchmässig bereinigen. A5 Gläubigerverzicht — Lembacher verzichtet auf Teil des Darlehens. Für Jupiter am wahrscheinlichsten: A3 plus A2."}, {"section": "Handlungsoptionen B — Eigentum verändern", "text": "Kategorie B bedeutet: Eigentümerstruktur ändert sich. B1 MBO: Management kauft die Firma — braucht Kapital. B2 Fusion mit einem Konkurrenten — Partner muss wollen. B3 Verkauf des Unternehmens — Käufer finden. B4 Nachlassvertrag: gerichtlich überwachter Schuldenabbau. B5 Konkurs: Liquidation, letzter Ausweg. Für Jupiter: Kategorie B ist aktuell nicht nötig, weil Lembacher die Fähigkeit und den Willen zur Sanierung hat."}, {"section": "OR 335h — Massenentlassung", "text": "OR 335h gilt bei Jupiter: 70 von 170 Mitarbeitende entlassen — das sind 41 Prozent, klar über dem Schwellenwert. Pflichten: Konsultation der Mitarbeitervertretung vor jeder Kündigung nach OR 335i. RAV-Meldung vor Aussprache der Kündigungen. Kündigungsfristen nach OR 335c: Erstes Jahr ein Monat, zweites bis neuntes Jahr zwei Monate, ab zehntem Jahr drei Monate. Der Sozialplan ist in der Schweiz freiwillig, aber imagekritisch. Kommunikation: Mitarbeitende erfahren es immer zuerst — nie durch die Medien."}, {"section": "Das richtige Narrativ", "text": "Jupiter darf nicht sagen: Wir mussten sparen. Das klingt nach Versagen. Jupiter soll sagen: Wir fokussieren uns auf unsere stärksten Standorte, um die Premiummarke nachhaltig zu stärken. Der Unterschied ist entscheidend. Das erste Narrativ zerstört das Premiumimage, das A2 aufbauen soll. Das zweite Narrativ schützt die Marke. Merksatz für das Assessment: Aufgabe 3 muss Aufgabe 2 schützen — wer das vergisst, hat einen wichtigen Zusammenhang verpasst."}]}];

const BADGE_STYLE = {"Fallstudie": "background:#431407;color:#fdba74", "Aufgabe 1": "background:#14532d;color:#86efac", "Aufgabe 2": "background:#14532d;color:#86efac", "Aufgabe 3": "background:#450a0a;color:#fca5a5", "Block 1": "background:#1e3a5f;color:#93c5fd", "Block 2": "background:#1e3a5f;color:#93c5fd", "Block 3": "background:#1e3a5f;color:#93c5fd", "Block 4": "background:#134e4a;color:#5eead4", "Block 5": "background:#450a0a;color:#fca5a5", "Block 1+4": "background:#134e4a;color:#5eead4", "Assessment": "background:#431407;color:#fdba74"};

// Row labels for visual dividers
const ROW_LABELS = {
  1:  "📍 Zeile 1 — Fallstudie + Block 1",
  6:  "📍 Zeile 2 — Analyse A1 Links",
  9:  "📍 Zeile 2 — Analyse A1 Rechts",
  11: "📍 Zeile 3 — Strategie A2",
  14: "📍 Zeile 3 — Leitbild",
  15: "📍 Zeile 4-5 — Finanzen + Krise",
  18: "📍 Zeile 6 — Roter Faden",
  19: "📍 Zeile 7 — PEST · SGF · Komm. · Budget · ABC",
  24: "📍 Zeile 8 — Change · Sanierung · Kontrolle",
};

let cur=null, paraIdx=0, playing=false, utt=null;
let voices=[], selVoice=null, spd=1.0;
let sc=1, ox=0, oy=0, drag=false, sx,sy,sox,soy;

window.addEventListener('DOMContentLoaded', ()=>{
  buildList(); initBoard(); loadVoices();
  if(window.speechSynthesis) speechSynthesis.onvoiceschanged=loadVoices;
});

function loadVoices(){
  if(!window.speechSynthesis) return;
  const all=speechSynthesis.getVoices();
  if(!all.length) return;
  voices=all;
  const sel=document.getElementById('voice-sel');
  sel.innerHTML='';
  [...all].sort((a,b)=>(a.lang.startsWith('de')?0:1)-(b.lang.startsWith('de')?0:1)).forEach(v=>{
    const i=all.indexOf(v);
    const o=document.createElement('option');
    o.value=i;
    o.textContent=(v.lang.startsWith('de')?'🇩🇪 ':v.lang.startsWith('en')?'🇬🇧 ':'')+v.name;
    if(!selVoice&&v.lang.startsWith('de')){o.selected=true;selVoice=v;}
    sel.appendChild(o);
  });
  if(!selVoice&&all.length) selVoice=all[0];
  const de=all.filter(v=>v.lang.startsWith('de')).length;
  document.getElementById('ch-count').textContent=`28 Kapitel · ${de} Stimme(n)`;
}

function changeVoice(){ selVoice=voices[+document.getElementById('voice-sel').value]||null; }
function changeSpeed(){
  spd=parseFloat(document.getElementById('speed-sel').value);
  if(playing){const p=paraIdx;stopAll();setTimeout(()=>speak(p),100);}
}

function buildList(){
  const list=document.getElementById('ch-list');
  CHAPTERS.forEach(ch=>{
    if(ROW_LABELS[ch.id]){
      const div=document.createElement('div');
      div.className='row-divider';
      div.textContent=ROW_LABELS[ch.id];
      list.appendChild(div);
    }
    const d=document.createElement('div');
    d.className='ch-item'; d.id='ci'+ch.id;
    const bs=BADGE_STYLE[ch.badge]||'background:#374151;color:#9ca3af';
    d.innerHTML=`<div class="ch-num">${ch.id}</div>
      <div class="ch-meta">
        <div><span class="ch-badge" style="${bs}">${ch.badge}</span></div>
        <div class="ch-title-list">${ch.icon} ${ch.title}</div>
        <div class="ch-sub-list">${ch.sub}</div>
      </div>`;
    d.onclick=()=>selectCh(ch);
    list.appendChild(d);
  });
}

function selectCh(ch){
  stopAll(); cur=ch; paraIdx=0;
  document.querySelectorAll('.ch-item').forEach(e=>e.classList.remove('active'));
  const el=document.getElementById('ci'+ch.id);
  if(el){el.classList.add('active');el.scrollIntoView({behavior:'smooth',block:'nearest'});}
  document.getElementById('ch-now-title').textContent=ch.icon+' '+ch.title;
  document.getElementById('ch-now-sub').textContent=ch.sub;
  setProgress(0);
}

function togglePlay(){
  if(!cur){if(CHAPTERS.length){selectCh(CHAPTERS[0]);speak(0);}return;}
  if(playing){speechSynthesis.cancel();playing=false;updBtn();showWave(false);}
  else speak(paraIdx);
}

function speak(idx){
  if(!cur||!window.speechSynthesis) return;
  if(idx>=cur.paragraphs.length){onDone();return;}
  paraIdx=idx;
  const p=cur.paragraphs[idx];
  const text=(p.section?p.section+'. ':'')+p.text;
  utt=new SpeechSynthesisUtterance(text);
  utt.rate=spd; utt.pitch=1; utt.lang='de-DE';
  if(selVoice) utt.voice=selVoice;
  utt.onstart=()=>{playing=true;updBtn();showWave(true);setProgress((idx/cur.paragraphs.length)*100);};
  utt.onend=()=>speak(idx+1);
  utt.onerror=e=>{if(e.error!=='interrupted'&&e.error!=='canceled'){playing=false;updBtn();showWave(false);}};
  speechSynthesis.speak(utt);
}

function onDone(){
  playing=false;updBtn();showWave(false);setProgress(100);
  document.getElementById('ci'+cur.id)?.classList.add('done');
  const i=CHAPTERS.findIndex(c=>c.id===cur.id);
  if(i>=0&&i<CHAPTERS.length-1) setTimeout(()=>{selectCh(CHAPTERS[i+1]);speak(0);},1000);
}

function stopAll(){
  if(window.speechSynthesis) speechSynthesis.cancel();
  playing=false;paraIdx=0;updBtn();showWave(false);setProgress(0);
}

function prevCh(){
  const i=CHAPTERS.findIndex(c=>c.id===cur?.id);
  const ch=i>0?CHAPTERS[i-1]:CHAPTERS[0];
  selectCh(ch);speak(0);
}
function nextCh(){
  const i=CHAPTERS.findIndex(c=>c.id===cur?.id);
  if(i>=0&&i<CHAPTERS.length-1){selectCh(CHAPTERS[i+1]);speak(0);}
}
function seekClick(e){
  if(!cur) return;
  const r=e.currentTarget.getBoundingClientRect();
  const idx=Math.round((e.clientX-r.left)/r.width*(cur.paragraphs.length-1));
  stopAll();speak(Math.max(0,Math.min(idx,cur.paragraphs.length-1)));
}

function setProgress(p){document.getElementById('prog-fill').style.width=p+'%';}
function updBtn(){document.getElementById('btn-play').textContent=playing?'⏸ Pause':'▶ Play';}
function showWave(on){
  document.getElementById('wave').classList.toggle('hidden',!on);
  document.getElementById('wave-label').classList.toggle('hidden',!on);
}

function initBoard(){
  const outer=document.getElementById('canvas-outer');
  setTimeout(fitBoard,200);
  outer.addEventListener('wheel',e=>{
    e.preventDefault();
    const r=outer.getBoundingClientRect(),mx=e.clientX-r.left,my=e.clientY-r.top;
    const d=e.deltaY>0?-0.1:0.1,ns=Math.min(Math.max(sc+d,0.05),8);
    ox=mx-(mx-ox)*(ns/sc);oy=my-(my-oy)*(ns/sc);sc=ns;applyT();
  },{passive:false});
  outer.addEventListener('mousedown',e=>{if(e.button!==0)return;drag=true;sx=e.clientX;sy=e.clientY;sox=ox;soy=oy;outer.classList.add('grabbing');});
  document.addEventListener('mousemove',e=>{if(!drag)return;ox=sox+(e.clientX-sx);oy=soy+(e.clientY-sy);applyT();});
  document.addEventListener('mouseup',()=>{drag=false;outer.classList.remove('grabbing');});
  outer.addEventListener('dblclick',fitBoard);
}
function applyT(){document.getElementById('canvas-inner').style.transform=`translate(${ox}px,${oy}px) scale(${sc})`;}
function fitBoard(){
  const outer=document.getElementById('canvas-outer');
  const svg=document.querySelector('#canvas-inner svg');
  if(!svg) return;
  const ow=outer.clientWidth,oh=outer.clientHeight;
  const vb=svg.viewBox.baseVal,svgW=vb.width||5822,svgH=vb.height||2816;
  sc=Math.min(ow/svgW,oh/svgH)*0.97;
  ox=(ow-svgW*sc)/2;oy=(oh-svgH*sc)/2;applyT();
}
function zoom(d){sc=Math.min(Math.max(sc+d,0.05),8);applyT();}
function toggleFullscreen(){
  const el=document.getElementById('board-wrap');
  if(!document.fullscreenElement) el.requestFullscreen().catch(()=>{});
  else document.exitFullscreen();
}
document.addEventListener('keydown',e=>{
  if(e.target.tagName==='SELECT') return;
  if(e.code==='Space'){e.preventDefault();togglePlay();}
  if(e.code==='ArrowRight') nextCh();
  if(e.code==='ArrowLeft') prevCh();
  if(e.code==='KeyF') fitBoard();
});
</script>
</body>
</html>
