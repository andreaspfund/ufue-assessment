<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>UFUE Assessment – Jupiter Confiserien AG</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%;overflow:hidden;font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;background:#111827;color:#e2e8f0}

/* ── HEADER ── */
#header{
  height:48px;display:flex;align-items:center;gap:12px;padding:0 16px;
  background:#0f0f1a;border-bottom:2px solid #f59e0b;flex-shrink:0;
}
#header .logo{font-size:16px;font-weight:700;color:#f8fafc;letter-spacing:-0.3px}
#header .logo span{color:#f59e0b}
#header .subtitle{font-size:11px;color:#64748b}
.hbadge{margin-left:auto;background:#f59e0b;color:#0f0f1a;font-size:9px;font-weight:700;padding:3px 9px;border-radius:20px;letter-spacing:1px;text-transform:uppercase}

/* ── LAYOUT ── */
#app{display:flex;height:calc(100vh - 48px)}

/* ── BOARD ── */
#board-wrap{flex:1;display:flex;flex-direction:column;overflow:hidden;min-width:0}

#board-toolbar{
  display:flex;align-items:center;gap:6px;padding:8px 14px;
  background:#111827;border-bottom:1px solid #1f2937;flex-shrink:0;
}
.tbtn{
  background:#1f2937;border:1px solid #374151;border-radius:6px;color:#9ca3af;
  font-size:11px;font-weight:600;padding:5px 12px;cursor:pointer;transition:all .15s;font-family:inherit;
}
.tbtn:hover{background:#374151;color:#f8fafc}
#hint{margin-left:auto;font-size:10px;color:#4b5563}

/* Canvas — WHITE background */
#canvas-outer{
  flex:1;overflow:hidden;cursor:grab;position:relative;
  background:#ffffff;
}
#canvas-outer.grabbing{cursor:grabbing}
#canvas-inner{
  position:absolute;top:0;left:0;
  transform-origin:0 0;
  will-change:transform;
  image-rendering:crisp-edges;
}
/* Make SVG crisp at any zoom */
#canvas-inner svg{
  display:block;
  shape-rendering:geometricPrecision;
  text-rendering:optimizeLegibility;
  image-rendering:optimizeQuality;
}

/* ── SIDEBAR ── */
#sidebar{
  width:295px;flex-shrink:0;display:flex;flex-direction:column;
  background:#111827;border-left:1px solid #1f2937;
}

/* player */
#player{padding:14px;border-bottom:1px solid #1f2937;flex-shrink:0}
.player-label{font-size:9px;font-weight:700;letter-spacing:1.5px;text-transform:uppercase;color:#4b5563;margin-bottom:6px}
#ch-now-title{font-size:13px;font-weight:700;color:#f8fafc;margin-bottom:2px;line-height:1.3}
#ch-now-sub{font-size:10px;color:#6b7280;margin-bottom:10px}

#prog-wrap{height:4px;background:#1f2937;border-radius:4px;cursor:pointer;margin-bottom:12px}
#prog-fill{height:100%;background:#f59e0b;border-radius:4px;width:0%;transition:width .3s linear}
#prog-wrap:hover #prog-fill{background:#fbbf24}

#controls{display:flex;align-items:center;gap:6px;margin-bottom:10px}
.cbtn{
  background:#1f2937;border:1px solid #374151;border-radius:6px;
  color:#9ca3af;padding:6px 10px;cursor:pointer;font-size:12px;
  transition:all .15s;font-family:inherit;
}
.cbtn:hover{background:#374151;color:#f8fafc}
.cbtn.play{background:#1d4ed8;border-color:#1d4ed8;color:#fff;flex:1;font-weight:600}
.cbtn.play:hover{background:#1e40af}
.cbtn.stop{color:#ef4444;border-color:#3f1f1f}
.cbtn.stop:hover{background:#3f1f1f}

#settings{display:flex;gap:6px;margin-bottom:8px}
select{
  background:#1f2937;border:1px solid #374151;border-radius:6px;
  color:#9ca3af;padding:5px 8px;font-size:11px;font-family:inherit;cursor:pointer;flex:1;
}

#speaking-bar{display:flex;align-items:center;gap:8px;height:18px}
.wave{display:flex;gap:2px;align-items:center}
.wave span{width:3px;height:10px;background:#f59e0b;border-radius:2px;animation:wv 1s ease-in-out infinite}
.wave span:nth-child(2){animation-delay:.1s;height:16px}
.wave span:nth-child(3){animation-delay:.2s;height:8px}
.wave span:nth-child(4){animation-delay:.3s;height:14px}
.wave span:nth-child(5){animation-delay:.4s;height:10px}
@keyframes wv{0%,100%{transform:scaleY(1)}50%{transform:scaleY(1.7)}}
.wave-label{font-size:10px;color:#f59e0b;font-weight:600}
.hidden{visibility:hidden}

#ch-list-header{
  padding:10px 14px 6px;font-size:9px;font-weight:700;
  letter-spacing:1.5px;text-transform:uppercase;color:#4b5563;
  border-bottom:1px solid #1f2937;flex-shrink:0;display:flex;align-items:center;gap:8px;
}
#ch-list{flex:1;overflow-y:auto}
#ch-list::-webkit-scrollbar{width:4px}
#ch-list::-webkit-scrollbar-thumb{background:#374151;border-radius:4px}

.ch-item{
  display:flex;align-items:flex-start;gap:10px;padding:10px 14px;cursor:pointer;
  border-left:3px solid transparent;transition:all .15s;border-bottom:1px solid #1f293720;
}
.ch-item:hover{background:#1f2937}
.ch-item.active{background:#1e3a5f30;border-left-color:#f59e0b}
.ch-item.done .ch-num{background:#15803d!important;color:#fff!important;border-color:#15803d!important}
.ch-num{
  width:24px;height:24px;border-radius:50%;background:#1f2937;border:1px solid #374151;
  display:flex;align-items:center;justify-content:center;
  font-size:10px;font-weight:700;color:#6b7280;flex-shrink:0;font-family:monospace;transition:all .2s;
}
.ch-item.active .ch-num{background:#f59e0b;color:#0f0f1a;border-color:#f59e0b}
.ch-meta{flex:1;min-width:0}
.ch-title-list{font-size:11.5px;font-weight:600;color:#e2e8f0;line-height:1.3;margin-bottom:2px}
.ch-preview{font-size:10px;color:#4b5563;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.ch-item.active .ch-preview{color:#9ca3af}
</style>
</head>

</div>

      <span id="hint">Ziehen · Scrollrad zum Zoomen · Doppelklick zum Fit</span>
    </div>
    <div id="canvas-outer">
      <div id="canvas-inner">

<script>
const CHAPTERS = [{"id": 1, "title": "Einführung — Was ist Unternehmensführung?", "icon": "🏭", "color": "#1E3A5F", "badge": "Block 1", "sub": "Management-Ebenen · St. Galler Modell · Input-Output", "paragraphs": [{"text": "Willkommen zur Übersicht über das Modul Unternehmensführung, anhand der Fallstudie der Jupiter Confiserien AG."}, {"text": "Bevor wir in die Details eintauchen, klären wir eine grundlegende Frage: Was ist eigentlich Unternehmensführung?"}, {"text": "Stell dir ein Unternehmen wie ein Schiff vor. Das Schiff hat Matrosen, die arbeiten. Es hat Maschinen, die funktionieren. Und es hat einen Kapitän, der entscheidet: Wohin fahren wir? Welchen Weg nehmen wir? Was tun wir, wenn ein Sturm kommt?"}, {"text": "Unternehmensführung ist genau das — das Steuern des Schiffes. Nicht das Schaufeln der Kohle, nicht das Kochen in der Küche. Sondern das grosse Bild: Ziele setzen, Strategie entwickeln, und sicherstellen, dass das Schiff auch wirklich ankommen wird."}, {"text": "Im St. Galler Management Modell gibt es dafür drei Ebenen:"}, {"text": "Die erste Ebene ist das normative Management. Das ist die Frage: Wofür stehen wir? Was sind unsere Werte? Zum Beispiel: Jupiter AG sagt, sie stehen für Premium-Schokolade und Erlebnis. Das ist die normative Ebene — die Grundhaltung."}, {"text": "Die zweite Ebene ist das strategische Management. Das ist die Frage: Wohin wollen wir in den nächsten fünf Jahren? Welche Märkte wollen wir bearbeiten? Welche Produkte entwickeln wir? Hier arbeiten wir mit Werkzeugen wie der SWOT-Analyse, der BCG-Matrix oder Porter's Five Forces."}, {"text": "Die dritte Ebene ist das operative Management. Das ist der Alltag: Budget erstellen, Reporting, Kennzahlen kontrollieren, Kosten im Griff behalten. Bei Jupiter bedeutet das: Die Filialleiterinnen führen ihre Teams, erstellen Berichte, und melden Abweichungen."}, {"text": "Der entscheidende Zusammenhang: Diese drei Ebenen bauen aufeinander auf. Die Werte bestimmen die Strategie. Die Strategie bestimmt das operative Handeln. Wer nur operativ denkt, ohne Strategie, verliert sich im Tagesgeschäft. Wer nur strategisch träumt, ohne operative Umsetzung, bleibt ein Wunschdenker."}, {"text": "Beispiel Jupiter: Der Verwaltungsrat hat strategisch entschieden — Fokus auf Premium, AAA-Lagen, Schweiz. Operativ wurde das aber nicht sauber umgesetzt: Zu viele unrentable Filialen blieben offen. Das ist die Lücke zwischen Strategie und Operation — und genau diese Lücke hat Jupiter in die Krise geführt."}]}, {"id": 2, "title": "Die Fallstudie — Jupiter Confiserien AG", "icon": "🍫", "color": "#C2410C", "badge": "Fallstudie", "sub": "Geschichte · Krise · Zahlen · Ausgangslage", "paragraphs": [{"text": "Jupiter wurde 1905 in Olten gegründet, als «Schweizer Chocoladen & Kolonialhaus». Damals verkauften sie Kaffee, Tee und Schokolade. In den ersten Jahrzehnten wuchs das Unternehmen stark — bis auf 37 Filialen in der Schweiz.", "section": "Jetzt lernen wir unsere Fallstudie kennen: die Jupiter Confiserien AG."}, {"text": "Mit der Zeit wurde die Firma grösser, verzettelte sich, versuchte sogar internationale Expansion nach Venedig, Deutschland, Frankreich und Spanien."}, {"text": "Dann kam 2007 der grosse Wendepunkt: Die Lembacher AG, ein renommierter Premium-Confiseur, übernahm Jupiter. Mit dieser Übernahme folgte 2008 eine Restrukturierung: Weg vom Kiosk-Modell, hin zur Premium-Chocolaterie in besten Einkaufslagen. Die Mitarbeitenden wurden von 300 auf 170 reduziert."}, {"text": "Das klingt gut — aber jetzt kommen wir zu den schlechten Nachrichten."}, {"text": "Im Jahr 2010 schreibt Jupiter einen Jahresverlust von fast zwei Millionen Franken. Das Eigenkapital ist negativ: minus 288'000 Franken. Das Unternehmen ist technisch gesehen überschuldet."}, {"text": "Wie ist das möglich? Der Umsatz beträgt 36 Millionen Franken. Die Bruttogewinnmarge ist mit 44.8 Prozent eigentlich gut. Das Problem liegt in den Kosten:"}, {"text": "Die Mietkosten betragen 14.7 Prozent des Umsatzes — das ist für eine Handelsfirma sehr hoch. Dazu kommen Personalkosten von 23.6 Prozent. Zusammen sind das fast 38 Prozent des Umsatzes allein für Miete und Personal — bevor überhaupt irgendwas anderes bezahlt wird."}, {"text": "Stell dir vor: Von jedem Franken Umsatz gehen 55 Rappen für die Ware, 24 Rappen für Personal und 15 Rappen für Miete weg. Das ergibt zusammen 94 Rappen — und es gibt noch Abschreibungen, Finanzaufwand und andere Kosten. Ergebnis: Verlust."}, {"text": "Der Verwaltungsrat hat nun entschieden: Zehn weitere Filialen werden geschlossen. Von 26 bleiben 16 übrig. Die Mitarbeitenden werden von 170 auf weniger als 100 reduziert."}, {"text": "Das ist die Ausgangslage für alle drei Aufgaben im Assessment."}]}, {"id": 3, "title": "Aufgabe 1 — Die Unternehmensanalyse", "icon": "🔍", "color": "#15803D", "badge": "Aufgabe 1", "sub": "SWOT · Porter · BCG · McKinsey · Kennzahlen", "paragraphs": [{"text": "In Aufgabe 1 analysieren wir die Situation von Jupiter systematisch. Dafür verwenden wir mehrere Instrumente."}, {"text": "Das erste und bekannteste Instrument ist die SWOT-Analyse. SWOT steht für Strengths, Weaknesses, Opportunities, Threats — auf Deutsch: Stärken, Schwächen, Chancen und Risiken.", "section": "Die SWOT-Analyse"}, {"text": "Die Grundregel ist einfach: Stärken und Schwächen sind intern — sie liegen im Unternehmen selbst. Chancen und Risiken sind extern — sie kommen aus dem Marktumfeld."}, {"text": "Stärken von Jupiter:\nDie Marke ist seit 100 Jahren bekannt. Der Mutterkonzern Lembacher liefert exklusive, handgemachte Qualitätsprodukte. Die Filialen liegen in AAA-Lagen mit hoher Frequenz. Das Frischschokoladen-Konzept ist einzigartig — das können Coop und Migros nicht kopieren. Und die Bruttogewinnmarge von 44.8 Prozent ist eigentlich solide."}, {"text": "Schwächen von Jupiter:\nDas Eigenkapital ist negativ — das Unternehmen ist überschuldet. Die Jahresverluste häufen sich. Die Mietkosten von 14.7 Prozent sind zu hoch. Vier C-Filialen mit weniger als einer Million Umsatz fressen Geld. Und Jupiter verkauft nur in der Schweiz — es gibt kein internationales Wachstumspotenzial."}, {"text": "Chancen:\nDer Trend zur Premiumisierung bei Schokolade wächst. E-Commerce ist noch nicht ausgeschöpft. Das B2B-Geschenkegeschäft — also Firmenkunden, die Präsentkörbe bestellen — ist skalierbar. Und der Tourismus erholt sich."}, {"text": "Risiken:\nCoop und Migros haben ihr Premium-Schokoladensortiment massiv ausgebaut. Die Hersteller wie Lindt verkaufen heute selbst online. Und Läderach expandiert aggressiv in die besten Lagen — genau dort, wo Jupiter ist."}, {"text": "Der entscheidende Schritt ist aber, aus der SWOT-Analyse Strategien abzuleiten. Es gibt vier Kombinationen:"}, {"text": "Stärken plus Chancen bedeutet: Ausbauen. Jupiter sollte seine Marke und Lembacher-Exklusivität nutzen, um im E-Commerce zu wachsen."}, {"text": "Stärken plus Risiken bedeutet: Abwehren. Den USP Frischschokolade gegen Online-Konkurrenz verteidigen."}, {"text": "Schwächen plus Chancen: Aufholen. Unrentable Filialen schliessen und die freiwerdenden Ressourcen in das B2B-Geschäft investieren."}, {"text": "Schwächen plus Risiken: Rückzug. Die C-Filialen schliessen, bevor Läderach sie verdrängt."}, {"text": "Das zweite Instrument ist Porter's Five Forces — die fünf Wettbewerbskräfte.", "section": "Porter's Five Forces"}, {"text": "Michael Porter, der Strategieprofessor aus Harvard, sagt: Die Profitabilität einer Branche wird durch fünf Kräfte bestimmt."}, {"text": "Erstens die Rivalität im Markt. Für Jupiter ist diese sehr hoch. Lindt, Läderach, Sprüngli und Teuscher sind direkte Konkurrenten — und alle kämpfen um dieselben Toplagen."}, {"text": "Zweitens die Lieferantenmacht. Interessanterweise ist Lembacher gleichzeitig Lieferant und Eigentümer. Das ist eine doppelte Abhängigkeit — aber auch eine Stärke, weil Jupiter exklusive Produkte bekommt."}, {"text": "Drittens die Käufermacht. Premiumkunden sind preisunelastisch — sie kaufen Qualität und Erlebnis, nicht den billigsten Preis. Das ist gut für Jupiter."}, {"text": "Viertens die Substitution. Das Risiko ist hoch: Coop verkauft Lindt, Migros verkauft Cailler, Amazon liefert Geschenkkörbe. Kunden können leicht auf günstigere Alternativen ausweichen."}, {"text": "Fünftens der Markteintritt. Die hohen Standortkosten in AAA-Lagen sind eine natürliche Barriere — aber Läderach überspringt sie gerade mit frischem Kapital."}, {"text": "Fazit aus Porter: Jupiter befindet sich in einer strukturell schwierigen Wettbewerbsposition. Es gibt nur einen Ausweg: Differenzierung. Jupiter muss sich klar von Coop, Migros und Online-Shops abheben — durch Qualität, Handwerk und Erlebnis. Kostenführer kann Jupiter niemals werden."}, {"text": "Das dritte Instrument ist die BCG-Matrix — das Portfolio-Analyse-Tool der Boston Consulting Group.", "section": "Die BCG-Matrix"}, {"text": "Die Matrix hat zwei Achsen: Marktwachstum und relativer Marktanteil. Daraus entstehen vier Felder."}, {"text": "Stars — hohes Wachstum, hoher Marktanteil: Investieren. Bei Jupiter sind das die Frischschokolade, der Sushi-Konfekt und die Filialen in Tourismusorten wie Davos und Zermatt."}, {"text": "Cash Cows — tiefes Wachstum, hoher Marktanteil: Melken, Ertrag maximieren. Das sind die Jupiter-A-Flaggschiff-Filialen in Zürich, Genf und Bern. Die laufen, bringen Geld, brauchen wenig Investitionen."}, {"text": "Question Marks — hohes Wachstum, tiefer Marktanteil: Entscheiden! Der E-Shop und das B2B-Geschenkegeschäft haben Potenzial — aber Jupiter hat noch nicht investiert. Hier muss entschieden werden: Entweder richtig investieren, oder aussteigen."}, {"text": "Dogs — tiefes Wachstum, tiefer Marktanteil: Desinvestieren, schliessen! Das sind die Jupiter-C-Filialen. Vier Standorte mit weniger als einer Million Umsatz, hohen Mietkosten, und kaum Ertrag. Diese Filialen kosten mehr als sie bringen."}, {"text": "Der direkte Zusammenhang zur Aufgabe 3: Die BCG-Matrix zeigt klar, welche Filialen geschlossen werden sollten. Das ist keine willkürliche Entscheidung — es ist eine Portfolio-Entscheidung. Dogs schliessen ist Strategie, nicht Kapitulation."}, {"text": "Während BCG nur zwei Kriterien hat, arbeitet die McKinsey-Matrix mit neun Feldern. Sie bewertet jedes Geschäftsfeld auf zwei Dimensionen: Marktattraktivität und Wettbewerbsvorteil.", "section": "Die McKinsey 9-Box-Matrix"}, {"text": "Jupiter-A-Filialen landen in der oberen rechten Ecke — hohe Attraktivität, starker Wettbewerbsvorteil. Klares Signal: Investieren."}, {"text": "Jupiter-C-Filialen landen unten links — tiefe Attraktivität, schwacher Wettbewerbsvorteil. Klares Signal: Desinvestieren."}, {"text": "Zum Abschluss der Unternehmensanalyse schauen wir auf die Zahlen.", "section": "Die Finanzanalyse"}, {"text": "Die Eigenkapitalquote berechnet sich so: Eigenkapital geteilt durch Total Aktiven. Bei Jupiter ergibt das minus 288'075 geteilt durch 14'941'040 — das ist minus 1.9 Prozent. Eine negative Eigenkapitalquote bedeutet: Das Unternehmen ist überschuldet. Das Fremdkapital übersteigt die Aktiven."}, {"text": "Die Umsatzrentabilität — Jahresgewinn geteilt durch Umsatz — ist minus 5.5 Prozent. Jeder Franken Umsatz kostet das Unternehmen mehr als er bringt."}, {"text": "Die Bruttogewinnmarge jedoch — Bruttogewinn geteilt durch Umsatz — ist 44.8 Prozent. Das ist eigentlich gut! Das zeigt: Das Problem liegt nicht im Einkauf und Verkauf. Das Problem liegt in den Fixkosten."}, {"text": "Der grösste Kostentreiber: Die Mietkosten betragen 14.7 Prozent des Umsatzes. Stell dir vor: Eine Filiale macht 800'000 Franken Umsatz. Die Miete kostet allein 117'000 Franken. Plus Personal, plus Ware, plus Abschreibungen — da bleibt nichts übrig."}, {"text": "Fazit Aufgabe 1: Jupiter hat eine starke Marke und eine gute Produktmarge. Aber die Kostenstruktur passt nicht zur Unternehmensgrösse. Die Differenzierungsstrategie ist richtig — aber sie muss mit einer schlankeren Filialstruktur kombiniert werden."}]}, {"id": 4, "title": "Aufgabe 2 — Strategieentwicklung", "icon": "🎯", "color": "#15803D", "badge": "Aufgabe 2", "sub": "Ansoff · Differenzierung · Roadmap · Projektaufträge", "paragraphs": [{"text": "In Aufgabe 2 geht es darum, die Analyseergebnisse in konkrete Strategien und Projektaufträge umzuwandeln."}, {"text": "Ein zentrales Instrument für Wachstumsstrategien ist die Ansoff-Matrix. Sie zeigt vier Wachstumsrichtungen.", "section": "Die Ansoff-Matrix"}, {"text": "Marktdurchdringung: Bestehende Produkte in bestehenden Märkten. Mehr aus dem verkaufen, was wir schon haben. Das ist die sicherste und günstigste Option. Für Jupiter: Den E-Shop in der Schweiz stärken, Stammkunden binden, Loyalty-Programme einführen."}, {"text": "Produktentwicklung: Neue Produkte in bestehenden Märkten. Für Jupiter: Neue Frischschokoladen-Serien, limitierte Sondereditions, neue Sushi-Konfekt-Variationen."}, {"text": "Marktentwicklung: Bestehende Produkte in neuen Märkten. Für Jupiter längerfristig denkbar: Franchise-Modell im Ausland, neue Regionen in der Schweiz."}, {"text": "Diversifikation: Neue Produkte in neuen Märkten. Das ist die riskanteste Option. Bei Jupiter ist das jetzt nicht sinnvoll — das Unternehmen hat negative Eigenkapital und muss zuerst stabilisiert werden. Kein Abenteuer."}, {"text": "Empfehlung: Zuerst Marktdurchdringung — die bestehenden Stärken konsequent ausspielen. Dann Produktentwicklung — den USP Frischschokolade weiter ausbauen."}, {"text": "Auf Basis der Analyse schlagen wir drei Schwerpunkte vor:", "section": "Die drei strategischen Schwerpunkte"}, {"text": "Schwerpunkt 1: Filialbereinigung und Kostenreduktion.\nDas ist der dringendste Hebel. Jede unrentable Filiale, die geschlossen wird, spart sofort Miete und Personalkosten. Zehn Filialen schliessen bedeutet ungefähr zwei bis drei Millionen Franken Einsparung pro Jahr. Das Werkzeug dafür ist die Deckungsbeitragsrechnung: Umsatz minus variable Kosten minus Mietkosten. Ist das Ergebnis negativ — schliessen."}, {"text": "Der Projektauftrag lautet: Die Geschäftsleitung und der CFO führen bis in vier Wochen ein Standortrating durch. Entscheidung: Welche zehn Filialen werden geschlossen? Verantwortlich: GL und ein externer HR-Spezialist für die Personalthemen."}, {"text": "Schwerpunkt 2: E-Commerce und Digitalstrategie.\nDer E-Shop existiert, aber er ist unterentwickelt. Gleichzeitig wächst der Online-Handel für Premium-Güter stark. Das Schöne an E-Commerce: keine Mietkosten, keine neuen Fixkosten. Ein B2B-Portal für Firmenkunden — Geschenke, Events, Konferenzen — lässt sich gut aufbauen."}, {"text": "Der Projektauftrag: E-Shop Relaunch mit B2B-Portal. Budget 200'000 bis 300'000 Franken. ROI — Return on Investment — in 18 Monaten."}, {"text": "Schwerpunkt 3: Marken- und Erlebnisstärke.\nDer grösste Unterschied zwischen Jupiter und Coop ist das Erlebnis. Ein Coop-Regal hat keine Geschichte. Jupiter hat einen Live-Confiseur, handgemachte Frischschokolade, 100 Jahre Tradition."}, {"text": "Der Projektauftrag: Ein Erlebniskonzept für die Topfilialen entwickeln. Live-Schaufenster, Storytelling, Kooperation mit SchweizTourismus."}, {"text": "Porter unterscheidet drei generische Strategien:", "section": "Die Wettbewerbsstrategien nach Porter"}, {"text": "Kostenführerschaft: Der günstigste Anbieter im Markt sein. Das ist für Jupiter nicht möglich. Coop und Migros haben Millionen Kunden und Skaleneffekte. Jupiter kann nie günstiger sein als sie."}, {"text": "Differenzierung: Im Gesamtmarkt einzigartig sein — durch Qualität, Erlebnis, Service. Das ist die richtige Strategie für Jupiter. Premium, Handwerk, Lembacher-Exklusivität — das ist der Weg."}, {"text": "Nischenstrategie: Sich auf ein spezifisches Segment konzentrieren. Für Jupiter partiell richtig: Tourismusorte, B2B-Geschenke, Hochfrequenzlagen."}, {"text": "Das grösste Risiko heisst «Stuck in the Middle» — weder günstig noch wirklich premium. Kein klares Profil. Das ist genau die Gefahr, wenn Jupiter weiterhin C-Filialen in Randlagen betreibt, die weder günstig noch erlebnisreich sind."}, {"text": "Eine Strategie ohne Zeitplan ist ein frommer Wunsch. Daher braucht Jupiter eine klare Roadmap:", "section": "Die 18-Monats-Roadmap"}, {"text": "Monate 1 bis 3: Stabilisierung. Sofort Standortanalyse starten. Lembacher um neue Finanzierung bitten. Krisenteam bilden."}, {"text": "Monate 3 bis 6: Bereinigung. Zehn Filialen schliessen. Mietverträge auflösen. Mitarbeitende kündigen — das ist Aufgabe 3."}, {"text": "Monate 6 bis 12: Fokus. E-Shop live schalten. Markenerlebnis in den Topfilialen einführen. B2B-Kanal aufbauen."}, {"text": "Monate 12 bis 18: Wachstum. Break-Even erreichen. Allenfalls einen oder zwei neue Premium-Standorte prüfen."}]}, {"id": 5, "title": "Aufgabe 3 — Personalreduktion", "icon": "⚖️", "color": "#B91C1C", "badge": "Aufgabe 3", "sub": "OR 335h · Sozialplan · Kommunikation", "paragraphs": [{"text": "Aufgabe 3 ist die emotionalste und rechtlich heikelste der drei Aufgaben. Es geht um Menschen."}, {"text": "Der Verwaltungsrat hat entschieden: Zehn Filialen werden geschlossen. Das bedeutet: Von 170 Mitarbeitenden werden mindestens 70 entlassen. Das sind echte Menschen mit echten Familien."}, {"text": "Wenn ein Unternehmen in einem kurzen Zeitraum viele Mitarbeitende entlässt, spricht das Schweizer Recht von einer Massenentlassung.", "section": "Das Rechtliche: OR 335h und 335i"}, {"text": "Die Schwellen sind klar geregelt: In einem Betrieb mit 20 bis 99 Mitarbeitenden gilt es, wenn mindestens 10 entlassen werden. Bei Jupiter mit 170 Mitarbeitenden sind 70 Entlassungen 41 Prozent — weit über der Schwelle."}, {"text": "OR 335i verpflichtet den Arbeitgeber zur Konsultation: Die Mitarbeitervertretung muss rechtzeitig informiert werden. Über die Gründe, das Ausmass und den Zeitplan. Und man muss gemeinsam über Massnahmen zur Milderung sprechen."}, {"text": "Wichtig: Die RAV-Meldung — also die Meldung an das Regionale Arbeitsvermittlungszentrum — muss vor den Kündigungen erfolgen. Wer das vergisst, macht sich strafbar."}, {"text": "Die Kündigungsfristen gemäss OR 335c: Im ersten Dienstjahr ein Monat. Im zweiten bis neunten Jahr zwei Monate. Ab dem zehnten Dienstjahr drei Monate."}, {"text": "Achtung: Kündigung während Krankheit ist nichtig! Das ist OR 336c. Wer eine kranke Mitarbeiterin entlässt, riskiert einen teuren Rechtsstreit."}, {"text": "Ein Sozialplan ist in der Schweiz nicht gesetzlich vorgeschrieben — aber er ist entscheidend für das Unternehmensimage.", "section": "Der Sozialplan"}, {"text": "Ein guter Sozialplan enthält: Abfindungen je nach Dienstjahren — in der Regel ein bis drei Monatslöhne. Outplacement-Unterstützung, also externe Stellenvermittlung. Bewerbungscoaching. Frühzeitige Information — mindestens 30 Tage vor der RAV-Meldung. Und die Möglichkeit, gute Mitarbeitende intern in die verbleibenden Filialen zu versetzen."}, {"text": "Der menschliche Aspekt: Wenn Jupiter würdevoll kommuniziert und fair entschädigt, bleiben die entlassenen Mitarbeitenden positive Botschafter der Marke. Wenn Jupiter kalt und bürokratisch vorgeht, stehen die Geschichten morgen in der Zeitung — und das schadet der Premiummarke."}, {"text": "Kommunikation bei einer Massenentlassung ist zeitkritisch und reihenfolgedependent. Es gibt eine klare Kaskade:", "section": "Das Kommunikationskonzept"}, {"text": "Phase 1 — Woche 1, intern, vertraulich: Verwaltungsrat und Geschäftsleitung fixieren den Entscheid. Ein Krisenteam wird gebildet. Der Rechtsanwalt bereitet das OR-335h-Protokoll vor. Die Filialliste wird finalisiert — und bleibt absolut vertraulich."}, {"text": "Phase 2 — Woche 2, Mitarbeitende zuerst: Direkte Gespräche mit den Filialleiterinnen. Betriebsversammlung in jeder betroffenen Filiale. Schriftliche Kündigung. Sozialplan wird vorgestellt."}, {"text": "Phase 3 — Woche 2 bis 3, externe Kommunikation: Genau eine, kontrollierte Medienmitteilung. Keine Interviews. Keine öffentlichen Kommentare zu Zahlen."}, {"text": "Die wichtigste Regel: Die Mitarbeitenden erfahren es zuerst — niemals durch die Medien. Wer das umdreht, verliert das Vertrauen der gesamten Belegschaft — auch der verbleibenden 100 Mitarbeitenden."}, {"text": "Das öffentliche Narrativ ist entscheidend. Jupiter darf nicht sagen: «Wir mussten sparen.» Das klingt nach Versagen.", "section": "Das Narrativ: Aus Stärke handeln"}, {"text": "Jupiter sollte sagen: «Wir fokussieren uns auf unsere stärksten Standorte, um die Premiummarke nachhaltig zu stärken und langfristig wettbewerbsfähig zu bleiben.»"}, {"text": "Der Unterschied: Das erste klingt reaktiv — wir hatten keine Wahl. Das zweite klingt proaktiv — wir entscheiden aus einer Stärkeposition heraus."}, {"text": "Das ist nicht gelogen. Es ist die richtige Rahmung einer schwierigen, aber notwendigen Entscheidung."}]}, {"id": 6, "title": "Führungsmodelle — Menschen führen", "icon": "👥", "color": "#6D28D9", "badge": "Block 1", "sub": "Hersey/Blanchard · Lewin · McGregor · MbO", "paragraphs": [{"text": "Unternehmensführung ist nicht nur Strategie und Zahlen. Es geht um Menschen. Und dafür gibt es bewährte Modelle."}, {"text": "Das bekannteste Modell für Mitarbeiterführung ist das situative Führungsmodell von Hersey und Blanchard.", "section": "Hersey und Blanchard — Situatives Führen"}, {"text": "Die Kernaussage: Es gibt keinen universell besten Führungsstil. Der richtige Stil hängt vom Reifegrad des Mitarbeitenden ab."}, {"text": "Der Reifegrad hat zwei Dimensionen: Können — also Fähigkeit und Erfahrung. Und Wollen — also Motivation und Bereitschaft."}, {"text": "S1 — Anweisen: Wenn jemand neu ist und wenig Erfahrung hat. Der Vorgesetzte sagt klar, was zu tun ist, und kontrolliert eng. Beispiel: Eine neue Verkäuferin in der Jupiter-Filiale bekommt genaue Anweisungen, wie sie Kunden begrüssen und Produkte erklären soll."}, {"text": "S2 — Trainieren: Wenn jemand motiviert ist, aber noch nicht genug Erfahrung hat. Der Vorgesetzte erklärt viel und gibt Feedback. Beispiel: Eine junge Kandidatin für eine Filialleitung — sie will, aber sie braucht noch Coaching."}, {"text": "S3 — Partizipieren: Wenn jemand erfahren ist, aber gerade demotiviert — vielleicht weil der Arbeitsalltag monoton geworden ist. Der Vorgesetzte holt sie ins Boot, fragt nach ihrer Meinung, bezieht sie in Entscheidungen ein."}, {"text": "S4 — Delegieren: Wenn jemand erfahren und motiviert ist. Der Vorgesetzte gibt das Ziel vor — und vertraut darauf, dass die Person den Weg selbst findet. Beispiel: Eine erfahrene Filialleiterin in Zürich, die seit zehn Jahren erfolgreich ist. Sie bekommt die Umsatzziele und entscheidet selbst, wie sie diese erreicht."}, {"text": "Der häufige Fehler: Immer gleich führen, egal wen. Eine erfahrene Filialleiterin mit S1 zu führen — also ihr alles vorzuschreiben — demotiviert sie. Eine neue Mitarbeiterin mit S4 loszuschicken — also sie ohne Anleitung arbeiten zu lassen — überfordert sie."}, {"text": "Douglas McGregor beschrieb zwei gegensätzliche Menschenbilder.", "section": "McGregor — Theorie X und Theorie Y"}, {"text": "Theorie X: Der Mensch ist von Natur aus faul, mag keine Verantwortung und muss kontrolliert und notfalls bestraft werden, um zu arbeiten. Eine Führungskraft mit Theorie-X-Denken führt autoritär, misstraut den Mitarbeitenden und kontrolliert alles."}, {"text": "Theorie Y: Der Mensch ist von Natur aus motiviert, sucht Verantwortung und möchte gute Arbeit leisten, wenn die Bedingungen stimmen. Eine Führungskraft mit Theorie-Y-Denken führt kooperativ, gibt Vertrauen und schafft Rahmenbedingungen für Eigenverantwortung."}, {"text": "Jupiter-Beispiel: Die Filialleiterinnen führen ihre Teams autonom. Das setzt Theorie Y voraus — die Zentrale vertraut darauf, dass sie gute Entscheidungen treffen. Das ist richtig für erfahrene, motivierte Führungskräfte."}, {"text": "Kurt Lewin unterscheidet drei klassische Führungsstile:", "section": "Führungsstile nach Lewin"}, {"text": "Autoritär: Der Chef entscheidet allein. Schnell, klar — aber ohne Input der Mitarbeitenden. Sinnvoll in einer Krise oder bei unerfahrenen Teams."}, {"text": "Demokratisch: Entscheidungen werden gemeinsam getroffen. Mehr Input, mehr Akzeptanz — aber langsamer. Sinnvoll im Normalfall."}, {"text": "Laissez-faire: Die Mitarbeitenden entscheiden selbst. Maximale Autonomie. Sinnvoll nur bei hoch erfahrenen, motivierten Spezialisten."}, {"text": "Bei Jupiter: In der aktuellen Krise braucht es vorübergehend mehr autoritäre Elemente — der Verwaltungsrat hat entschieden, es wird umgesetzt. Danach, wenn das Unternehmen stabilisiert ist, wieder mehr demokratisch."}, {"text": "Management by Objectives — MbO — bedeutet: Führen durch Zielvereinbarung. Vorgesetzter und Mitarbeitender vereinbaren gemeinsam messbare Ziele. Die Zielerreichung wird regelmässig kontrolliert.", "section": "MbO, MbD und MbE — Führungstechniken"}, {"text": "Beispiel: Die Filialleiterin in Zürich vereinbart mit der Geschäftsleitung: Umsatz 2 Millionen Franken, Kundenzufriedenheit über 85 Prozent, Personalkosten unter 22 Prozent. Wie sie diese Ziele erreicht, entscheidet sie selbst."}, {"text": "Management by Delegation — MbD — geht weiter: Aufgaben werden vollständig delegiert, inklusive Kompetenzen und Verantwortung. Wichtig ist das AKV-Prinzip: Aufgaben, Kompetenzen und Verantwortung müssen übereinstimmen. Wer Verantwortung trägt, muss auch die nötigen Kompetenzen und Entscheidungsfreiheiten haben."}, {"text": "Management by Exception — MbE — heisst: Eingreifen nur bei Ausnahmen. Läuft alles im Plan, bleibt der Vorgesetzte im Hintergrund. Erst wenn definierte Schwellen überschritten werden — zum Beispiel Umsatzrückgang mehr als 10 Prozent — greift er ein."}]}, {"id": 7, "title": "Finanzielle Unternehmensführung", "icon": "💰", "color": "#0F766E", "badge": "Block 4", "sub": "Bilanz · ER · Liquidität · BSC · Budget", "paragraphs": [{"text": "Jetzt kommen wir zum Bereich, den viele fürchten: die Finanzen. Aber keine Angst — wenn man es einmal verstanden hat, ist es logisch."}, {"text": "Die Bilanz zeigt, was ein Unternehmen zu einem bestimmten Zeitpunkt besitzt und wie das finanziert ist.", "section": "Bilanz und Erfolgsrechnung"}, {"text": "Die linke Seite — Aktiven — zeigt, was das Unternehmen hat: Kasse, Forderungen, Vorräte, Maschinen, Gebäude. Das Geld, das investiert wurde."}, {"text": "Die rechte Seite — Passiven — zeigt, woher das Geld kommt: von Lieferanten, Banken und anderen Gläubigern als Fremdkapital — oder vom Eigentümer als Eigenkapital."}, {"text": "Die goldene Regel: Aktiven müssen gleich Passiven sein. Immer."}, {"text": "Bei Jupiter: Total Aktiven 14'941'040 Franken. Davon Fremdkapital 15'229'115 Franken — und Eigenkapital minus 288'075 Franken. Das Eigenkapital ist negativ! Das heisst: Die Schulden sind grösser als alles, was das Unternehmen besitzt. Das ist die Definition von Überschuldung."}, {"text": "Die Erfolgsrechnung zeigt, was das Unternehmen in einem Jahr verdient und ausgegeben hat."}, {"text": "Vom Umsatz zieht man die Warenkosten ab — das ergibt den Bruttogewinn. Dann kommen die Betriebskosten: Personal, Miete, Abschreibungen. Was übrig bleibt, ist der EBIT — Earnings before Interest and Taxes. Bei Jupiter: minus 1.6 Millionen Franken. Dann kommen noch Finanzkosten — und wir landen beim Jahresverlust von minus 1'986'466 Franken."}, {"text": "Ein profitables Unternehmen kann bankrott gehen, wenn es nicht genug Cash hat, um seine laufenden Rechnungen zu bezahlen. Das nennt man eine Liquiditätskrise.", "section": "Liquidität — Cash ist König"}, {"text": "Cash Ratio — Kasse geteilt durch kurzfristiges Fremdkapital. Bei Jupiter etwa 0.72. Das ist unter 1 — kritisch! Das bedeutet: Mit der aktuellen Kasse könnte Jupiter seine kurzfristigen Schulden nicht vollständig bezahlen."}, {"text": "Quick Ratio — Kasse plus Debitoren geteilt durch kurzfristiges Fremdkapital. Bei Jupiter etwa 1.12. Knapp über 1 — gerade noch akzeptabel."}, {"text": "Current Ratio — ganzes Umlaufvermögen geteilt durch kurzfristiges Fremdkapital. Bei Jupiter 1.80 — das ist gut."}, {"text": "Liquiditätsplan: Um Liquidität zu managen, erstellt man einen monatlichen Plan: Was kommt rein? Was geht raus? Was ist das Netto? Und wie entwickelt sich die Summe über das Jahr? Dieser Plan zeigt, wann man in Schwierigkeiten gerät — bevor es zu spät ist."}, {"text": "«Cash is King» — das ist nicht nur ein Spruch. Viele Unternehmen gehen nicht bankrott, weil sie keine guten Produkte haben. Sie gehen bankrott, weil ihnen das Cash ausgeht."}, {"text": "Das Budget ist der Finanzplan für das kommende Jahr. Es wird auf zwei Wegen erstellt:", "section": "Budgetierung und Reporting"}, {"text": "Top-Down: Die Führung gibt die Umsatzziele vor — von aussen nach innen. Welchen Umsatz brauchen wir, um profitabel zu sein? Welchen Marktanteil wollen wir erreichen?"}, {"text": "Bottom-Up: Die Kostenstellen — Filialen, Abteilungen — melden ihren Bedarf von innen nach aussen. Was brauchen wir, um den Umsatz zu erreichen?"}, {"text": "Das Reporting überwacht dann, ob der Plan eingehalten wird. Der Soll-Ist-Vergleich zeigt jede Abweichung: Warum hat Filiale Basel 15 Prozent weniger Umsatz als geplant? Wegen Bauarbeiten vor dem Eingang? Oder wegen schlechter Führung?"}, {"text": "Das Instrument M11+1 ist ein rollierender Forecast: Elf Monate Ist-Zahlen plus ein Monat Prognose. Immer ein Jahr vorausschauen."}, {"text": "Die Balanced Scorecard, kurz BSC, wurde von Kaplan und Norton entwickelt. Sie löst ein wichtiges Problem: Wenn man nur auf Finanzkennzahlen schaut, sieht man nur die Vergangenheit.", "section": "Balanced Scorecard"}, {"text": "Die BSC ergänzt die Finanzen um drei weitere Perspektiven:"}, {"text": "Finanzperspektive: Wie sehen wir für die Aktionäre aus? Umsatz, Rentabilität, Eigenkapital."}, {"text": "Kundenperspektive: Wie sehen wir für die Kunden aus? Zufriedenheit, Markenbekanntheit, Marktanteil."}, {"text": "Prozessperspektive: Wie effizient sind unsere Prozesse? Durchlaufzeiten, Fehlerquoten, Mietkosten."}, {"text": "Lern- und Entwicklungsperspektive: Lernen und verbessern wir uns? Mitarbeiterkompetenz, Innovation, Kultur."}, {"text": "Das Schöne: Die BSC zeigt, ob die Strategie wirklich funktioniert. Nicht erst wenn der Jahresverlust da ist — sondern laufend, durch alle vier Perspektiven."}]}, {"id": 8, "title": "Krise und Sanierung", "icon": "⚠️", "color": "#B91C1C", "badge": "Block 5", "sub": "Kausalkette · Sanierungsdreieck · Handlungsoptionen", "paragraphs": [{"text": "Kommen wir zum vielleicht ernüchterndsten Thema: Was tun, wenn das Unternehmen in der Krise ist?"}, {"text": "Krisen entstehen selten über Nacht. Sie folgen einer Kausalkette.", "section": "Die Kausalkette der Unternehmenskrise"}, {"text": "Schritt 1: Die strategische Krise. Das Unternehmen hat die falsche Strategie, oder die Strategie passt nicht mehr zum Markt. Das ist schwer zu sehen — es gibt noch keine Verluste. Aber die Grundlage stimmt nicht mehr. Bei Jupiter: Die Restrukturierung 2008 war nicht konsequent genug. Zu viele unrentable Filialen blieben geöffnet."}, {"text": "Schritt 2: Die Ertragskrise. Jetzt sind die Verluste sichtbar. Der Umsatz sinkt, die Margen fallen, der EBIT wird negativ. Bei Jupiter 2010: EBIT minus 4.4 Prozent."}, {"text": "Schritt 3: Die Liquiditätskrise. Der Cash wird knapp. Lieferanten warten auf ihr Geld. Die Bank erhöht den Druck. Die Handlungsfähigkeit schwindet."}, {"text": "Schritt 4: Die Überschuldung. Das Eigenkapital ist aufgebraucht. Die Schulden übersteigen die Aktiven. Jetzt greift OR 725a — der Verwaltungsrat muss handeln."}, {"text": "Regel: Je früher man eingreift, desto mehr Optionen hat man. Wer erst in Schritt 4 handelt, hat nur noch Notlösungen."}, {"text": "Damit eine Sanierung gelingen kann, braucht es drei Dinge gleichzeitig:", "section": "Das Sanierungsdreieck"}, {"text": "Sanierungswille: Will die Führung wirklich? Oder gibt es Ausreden wie «Es war schon immer so» oder «Wir brauchen nur etwas mehr Kapital»? Ohne echten Willen scheitert jede Sanierung."}, {"text": "Sanierungsfähigkeit: Hat das Unternehmen die Ressourcen? Genug Cash, um die Übergangsphase zu finanzieren? Fähige Führungskräfte? Im Fall Jupiter: Lembacher als starker Eigentümer kann Kapital bereitstellen."}, {"text": "Sanierungswürdigkeit: Braucht der Markt dieses Unternehmen noch? Was wäre, wenn es Jupiter nicht mehr gäbe? Wenn die Antwort ist «gar nichts» — dann lohnt sich die Sanierung nicht. Für Jupiter: Ja, es gibt eine echte Marktlücke für handgemachte Premium-Chocolaterie in Tourismuslagen."}, {"text": "Kategorie A — Eigentum erhalten: Going Concern, also Weiterbetrieb. Kapitalerhöhung durch Lembacher. Restrukturierung — also genau das, was Jupiter gerade macht. Kapitalherabsetzung, um das Eigenkapital buchmässig zu bereinigen.", "section": "Handlungsoptionen"}, {"text": "Kategorie B — Eigentum verändern: Management Buyout, bei dem das Managementteam das Unternehmen übernimmt. Fusion mit einem Konkurrenten. Verkauf. Nachlassvertrag. Oder im schlimmsten Fall: Konkurs."}, {"text": "Für Jupiter ist Kategorie A die richtige Richtung: Sanierung mit Lembacher-Unterstützung, Restrukturierung, klare Strategie."}]}, {"id": 9, "title": "Unternehmenskultur, Ethik und Leitbild", "icon": "🧬", "color": "#6D28D9", "badge": "Block 1", "sub": "Eisberg · Vision · Werte · Ethik", "paragraphs": [{"text": "Jetzt kommen wir zu den weichen Faktoren — die aber in Wirklichkeit entscheidend sind."}, {"text": "Stell dir eine Hierarchie vor — von oben nach unten:", "section": "Vision, Leitbild und Werte"}, {"text": "Purpose — der tiefste Sinn: Warum existieren wir, über Profit hinaus? Für Jupiter könnte das sein: «Wir begeistern Menschen durch handgemachte Schokolade.»"}, {"text": "Vision — das Zukunftsbild: Wo wollen wir in fünf bis zehn Jahren sein? «2027 sind wir die profitabelste Premium-Chocolaterie der Schweiz.»"}, {"text": "Mission — der tägliche Auftrag: Was tun wir, für wen und womit? «Wir bieten frische Handwerks-Schokolade in besten Lagen der Schweiz.»"}, {"text": "Werte — wie verhalten wir uns? Qualität, Erlebnis, Nachhaltigkeit, Respekt."}, {"text": "Ein Leitbild ist kein Hochglanzprospekt. Es ist ein Versprechen — an Kunden, Mitarbeitende und die Gesellschaft. Und es muss gelebt werden."}, {"text": "Jupiter hat kein Leitbild. Das ist ein fundamentales Problem. Wenn niemand weiss, wofür das Unternehmen steht, fehlt die Orientierung für alle Entscheidungen."}, {"text": "Unternehmenskultur ist wie ein Eisberg: Ein kleiner Teil ist sichtbar — Symbole, Rituale, Kleiderordnung, Sprache. Aber 90 Prozent liegen unter der Oberfläche: Werte, Normen, unausgesprochene Regeln, Überzeugungen.", "section": "Unternehmenskultur — Das Eisberg-Modell"}, {"text": "Ein gefährlicher Kulturbruch bei Jupiter: Das Leitbild sagt «Qualität und Erlebnis» — aber der Kostendruck zwingt die Filialleiterinnen dazu, mit Minimalbudget zu arbeiten. Das schafft Frustration und führt zu Fluktuation."}, {"text": "Peter Drucker hat gesagt: «Culture eats strategy for breakfast.» Eine perfekte Strategie, die gegen die Unternehmenskultur kämpft, scheitert. Deshalb muss die Kulturarbeit parallel zur Strategie laufen."}, {"text": "Ist Gewinnstreben unethisch? Nicht unbedingt — aber es gibt Grenzen.", "section": "Unternehmenspolitik und Ethik"}, {"text": "Das erste Modell sagt: Gewinn geht über alles. Gesetze werden eingehalten, sonst ist Gewinnmaximierung das Ziel. Das Problem: Legales ist nicht immer legitim."}, {"text": "Das zweite Modell sagt: Moral geht über Gewinn. Soziale Verantwortung als oberste Priorität. Gut gemeint — aber oft wirtschaftlich nicht nachhaltig."}, {"text": "Das dritte Modell — und das ist heute der Standard — verbindet beide: Corporate Social Responsibility, CSR. Gewinne erwirtschaften und dabei Verantwortung für Mitarbeitende, Gesellschaft und Umwelt übernehmen."}, {"text": "Jupiter und Ethik: Die Entscheidung, 70 Mitarbeitende zu entlassen, ist schmerzhaft aber wirtschaftlich notwendig. Wie sie umgesetzt wird — mit Würde und fairem Sozialplan — das ist die ethische Dimension."}]}, {"id": 10, "title": "Zusammenhänge — Der rote Faden", "icon": "🔗", "color": "#B45309", "badge": "Assessment", "sub": "Roter Faden · Zusammenhänge · Kernbotschaft", "paragraphs": [{"text": "Stell dir Jupiter als Puzzle vor. Jedes Modell, das wir besprochen haben, ist ein Puzzlestück. Erst zusammen ergibt es das vollständige Bild.", "section": "Jetzt verbinden wir alles zu einem Gesamtbild."}, {"text": "Die SWOT-Analyse in Aufgabe 1 zeigt: Starke Marke, aber schlechte Kostenstruktur. Dieses Ergebnis ist die Grundlage für Aufgabe 2 und 3."}, {"text": "Die BCG-Matrix zeigt: Die C-Filialen sind Dogs — sie müssen weg. Das begründet direkt die Massenentlassung in Aufgabe 3."}, {"text": "Die Finanzanalyse zeigt: OR 725a greift — das Unternehmen ist überschuldet. Das ist die rechtliche Pflicht, sofort zu handeln. Das verbindet Aufgabe 1 direkt mit dem Krisenmanagement."}, {"text": "Porter's Five Forces begründen: Differenzierung ist der einzige Weg. Das ist die strategische Basis für alle drei Schwerpunkte in Aufgabe 2."}, {"text": "Ansoff zeigt: Erst Marktdurchdringung, dann Wachstum. Das erklärt die Reihenfolge der Roadmap: Zuerst Restrukturierung, dann E-Commerce."}, {"text": "Die Kausalkette der Krise erklärt, warum alles eskaliert ist: Strategische Krise 2008, Ertragskrise 2010, Handlungszwang 2011."}, {"text": "OR 335h gibt den Rahmen für Aufgabe 3: So und nicht anders wird die Massenentlassung durchgeführt. Rechtskonform, würdevoll, mit Kaskade."}, {"text": "Die BSC misst am Ende, ob die Strategie wirklich wirkt: Finanzen, Kunden, Prozesse, Lernen."}, {"text": "Die Führungsmodelle erklären, warum Mitarbeitende in dieser Phase besonders sorgfältig geführt werden müssen: Unsicherheit führt zu Leistungsabfall. Hersey/Blanchard sagt: In der Krise mehr S2 — Trainieren und Unterstützen."}, {"text": "Für jeden Punkt im Assessment gilt dieselbe Struktur:", "section": "Das Assessment-Schema"}, {"text": "Erstens: Die Methode benennen und erklären. Was ist die SWOT-Analyse? Was messen die Kennzahlen?"}, {"text": "Zweitens: Die Methode auf Jupiter anwenden. Was zeigt die SWOT konkret für Jupiter? Was sagen die Zahlen?"}, {"text": "Drittens: Den Zusammenhang herstellen. Was bedeutet das SWOT-Ergebnis für Aufgabe 2? Welche Verbindung hat die Bilanzanalyse zur Aufgabe 3?"}, {"text": "Wer dieses Schema anwendet, zeigt systemisches Denken — das ist das, was die Prüfer sehen wollen."}, {"text": "Jupiter hat alles, was eine erfolgreiche Premium-Chocolaterie braucht: eine starke Marke, exklusive Produkte durch Lembacher, treue Kundinnen in den richtigen Lagen.", "section": "Die Kernbotschaft"}, {"text": "Das Problem ist nicht das Produkt. Das Problem ist die Kostenstruktur."}, {"text": "Die Lösung ist klar und konsequent: Fokussieren statt verzetteln. Die stärksten 16 Filialen mit voller Kraft betreiben. Digital wachsen, ohne neue Fixkosten. Die Marke als echtes Erlebnis positionieren — dort, wo Coop und Migros niemals mithalten können."}, {"text": "Wenn Jupiter das schafft, ist der Weg zurück in die Profitabilität in 18 Monaten realistisch. Der Beweis dafür liegt in den eigenen Zahlen: 44.8 Prozent Bruttogewinnmarge. Das ist die Substanz. Es braucht jetzt den Mut, die Substanz freizulegen."}, {"text": "Ende des Text-to-Speech Skripts — UFUE Assessment · Jupiter Confiserien AG\nKapitel 1–10 · Gesamtlänge ca. 45–55 Minuten Sprechzeit"}]}];

let cur = null, paraIdx = 0, playing = false, utt = null;
let voices = [], selVoice = null, spd = 1.0;

// ── Board state ──
let sc = 1, ox = 0, oy = 0, drag = false, sx, sy, sox, soy;

window.addEventListener('DOMContentLoaded', () => {
  buildList();
  initBoard();
  loadVoices();
  if (window.speechSynthesis) speechSynthesis.onvoiceschanged = loadVoices;
});

// ── VOICES ──
function loadVoices() {
  if (!window.speechSynthesis) return;
  const all = speechSynthesis.getVoices();
  if (!all.length) return;
  voices = all;
  const sel = document.getElementById('voice-sel');
  sel.innerHTML = '';
  [...all].sort((a,b) => (a.lang.startsWith('de')?0:1)-(b.lang.startsWith('de')?0:1))
    .forEach(v => {
      const i = all.indexOf(v);
      const o = document.createElement('option');
      o.value = i;
      o.textContent = (v.lang.startsWith('de')?'🇩🇪 ':v.lang.startsWith('en')?'🇬🇧 ':'')+v.name;
      if (!selVoice && v.lang.startsWith('de')) { o.selected=true; selVoice=v; }
      sel.appendChild(o);
    });
  if (!selVoice && all.length) selVoice = all[0];
  document.getElementById('ch-count').textContent =
    `${CHAPTERS.length} Kapitel · ${all.filter(v=>v.lang.startsWith('de')).length} Stimme(n) geladen`;
}

function changeVoice() {
  selVoice = voices[+document.getElementById('voice-sel').value] || null;
}

function changeSpeed() {
  spd = parseFloat(document.getElementById('speed-sel').value);
  if (playing) { const p=paraIdx; stopAll(); setTimeout(()=>speak(p),100); }
}

// ── CHAPTER LIST ──
function buildList() {
  const list = document.getElementById('ch-list');
  CHAPTERS.forEach(ch => {
    const d = document.createElement('div');
    d.className = 'ch-item';
    d.id = 'ci'+ch.id;
    d.innerHTML = `<div class="ch-num">${ch.id}</div>
      <div class="ch-meta">
        <div class="ch-title-list">${ch.icon} ${ch.title}</div>
        <div class="ch-preview">${ch.paragraphs[0]?.text?.slice(0,60)}...</div>
      </div>`;
    d.onclick = () => selectCh(ch);
    list.appendChild(d);
  });
}

function selectCh(ch) {
  stopAll();
  cur = ch; paraIdx = 0;
  document.querySelectorAll('.ch-item').forEach(e=>e.classList.remove('active'));
  const el = document.getElementById('ci'+ch.id);
  if(el){ el.classList.add('active'); el.scrollIntoView({behavior:'smooth',block:'nearest'}); }
  document.getElementById('ch-now-title').textContent = ch.icon+' '+ch.title;
  document.getElementById('ch-now-sub').textContent = ch.sub;
  setProgress(0);
}

// ── PLAYBACK ──
function togglePlay() {
  if (!cur) { if(CHAPTERS.length){ selectCh(CHAPTERS[0]); speak(0); } return; }
  if (playing) { speechSynthesis.cancel(); playing=false; updBtn(); showWave(false); }
  else speak(paraIdx);
}

function speak(idx) {
  if (!cur || !window.speechSynthesis) return;
  if (idx >= cur.paragraphs.length) { onDone(); return; }
  paraIdx = idx;
  const p = cur.paragraphs[idx];
  const text = (p.section ? p.section+'. ' : '') + p.text;
  utt = new SpeechSynthesisUtterance(text);
  utt.rate = spd; utt.pitch = 1; utt.lang = 'de-DE';
  if (selVoice) utt.voice = selVoice;
  utt.onstart = () => { playing=true; updBtn(); showWave(true); setProgress((idx/cur.paragraphs.length)*100); };
  utt.onend = () => speak(idx+1);
  utt.onerror = e => { if(e.error!=='interrupted'&&e.error!=='canceled'){ playing=false;updBtn();showWave(false); } };
  speechSynthesis.speak(utt);
}

function onDone() {
  playing=false; updBtn(); showWave(false); setProgress(100);
  document.getElementById('ci'+cur.id)?.classList.add('done');
  const i = CHAPTERS.findIndex(c=>c.id===cur.id);
  if(i>=0 && i<CHAPTERS.length-1) setTimeout(()=>{selectCh(CHAPTERS[i+1]);speak(0);},1200);
}

function stopAll() {
  if(window.speechSynthesis) speechSynthesis.cancel();
  playing=false; paraIdx=0; updBtn(); showWave(false); setProgress(0);
}

function prevCh() {
  const i=CHAPTERS.findIndex(c=>c.id===cur?.id);
  const ch = i>0?CHAPTERS[i-1]:CHAPTERS[0];
  selectCh(ch); speak(0);
}

function nextCh() {
  const i=CHAPTERS.findIndex(c=>c.id===cur?.id);
  if(i>=0&&i<CHAPTERS.length-1){ selectCh(CHAPTERS[i+1]); speak(0); }
}

function seekClick(e) {
  if(!cur) return;
  const r=e.currentTarget.getBoundingClientRect();
  const idx=Math.round((e.clientX-r.left)/r.width*(cur.paragraphs.length-1));
  stopAll(); speak(Math.max(0,Math.min(idx,cur.paragraphs.length-1)));
}

function setProgress(p){ document.getElementById('prog-fill').style.width=p+'%'; }
function updBtn(){ document.getElementById('btn-play').textContent=playing?'⏸ Pause':'▶ Play'; }
function showWave(on){
  document.getElementById('wave').classList.toggle('hidden',!on);
  document.getElementById('wave-label').classList.toggle('hidden',!on);
}

// ── BOARD PAN/ZOOM ──
function initBoard() {
  const outer = document.getElementById('canvas-outer');
  setTimeout(fitBoard, 150);

  outer.addEventListener('wheel', e => {
    e.preventDefault();
    const r=outer.getBoundingClientRect(), mx=e.clientX-r.left, my=e.clientY-r.top;
    const d=e.deltaY>0?-0.1:0.1, ns=Math.min(Math.max(sc+d,0.05),8);
    ox=mx-(mx-ox)*(ns/sc); oy=my-(my-oy)*(ns/sc); sc=ns; applyT();
  },{passive:false});

  outer.addEventListener('mousedown', e=>{
    if(e.button!==0) return;
    drag=true; sx=e.clientX; sy=e.clientY; sox=ox; soy=oy;
    outer.classList.add('grabbing');
  });
  document.addEventListener('mousemove', e=>{
    if(!drag) return;
    ox=sox+(e.clientX-sx); oy=soy+(e.clientY-sy); applyT();
  });
  document.addEventListener('mouseup', ()=>{ drag=false; outer.classList.remove('grabbing'); });
  outer.addEventListener('dblclick', fitBoard);
}

function applyT() {
  document.getElementById('canvas-inner').style.transform=`translate(${ox}px,${oy}px) scale(${sc})`;
}

function fitBoard() {
  const outer=document.getElementById('canvas-outer');
  const svg=document.querySelector('#canvas-inner svg');
  if(!svg) return;
  const ow=outer.clientWidth, oh=outer.clientHeight;
  const vb=svg.viewBox.baseVal;
  const svgW=vb.width||5822, svgH=vb.height||2816;
  sc=Math.min(ow/svgW, oh/svgH)*0.97;
  ox=(ow-svgW*sc)/2; oy=(oh-svgH*sc)/2;
  applyT();
}

function zoom(d){ sc=Math.min(Math.max(sc+d,0.05),8); applyT(); }

function toggleFullscreen() {
  const el=document.getElementById('board-wrap');
  if(!document.fullscreenElement) el.requestFullscreen().catch(()=>{});
  else document.exitFullscreen();
}

document.addEventListener('keydown', e=>{
  if(e.target.tagName==='SELECT'||e.target.tagName==='INPUT') return;
  if(e.code==='Space'){ e.preventDefault(); togglePlay(); }
  if(e.code==='ArrowRight') nextCh();
  if(e.code==='ArrowLeft') prevCh();
  if(e.code==='KeyF') fitBoard();
});
</script>
