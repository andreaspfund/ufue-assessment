urch externe Berater, die bei der Jobsuche helfen. Bewerbungscoaching und CV-Unterstützung. Die Möglichkeit zur internen Versetzung in eine der verbleibenden Filialen — das ist bei Jupiter wichtig, weil die besten Mitarbeitenden der geschlossenen Filialen in die Topfilialen wechseln können. Und faire, transparente Kommunikation."}, {"section": "Die Kommunikationskaskade", "text": "Die Reihenfolge der Kommunikation bei einer Massenentlassung ist entscheidend und nicht verhandelbar. Woche 1 intern und vertraulich: Verwaltungsrat und Geschäftsleitung fixieren den Entscheid. Rechtsanwalt wird engagiert. Filialliste wird finalisiert — bleibt absolut geheim. Woche 2, Mitarbeitende zuerst: Direkte Gespräche mit den Filialleiterinnen der betroffenen Standorte. Dann Betriebsversammlungen. Dann schriftliche Kündigungen. Dann der Sozialplan. Erst danach, Woche 2 bis 3: Eine einzige, kontrollierte Medienmitteilung. Die eiserne Regel: Die Mitarbeitenden erfahren es zuerst. Niemals durch die Medien. Wer das verletzt, zerstört das Vertrauen der gesamten Belegschaft — auch der verbleibenden 100."}]}, {"id": 20, "icon": "🔗", "color": "#B45309", "badge": "Assessment", "title": "Roter Faden — Alle Modelle verbunden", "sub": "Zusammenhänge · Prüfungslogik · Kernbotschaft", "paragraphs": [{"section": "Der rote Faden ist das Assessment-Geheimnis", "text": "Im Assessment werden Sie nicht bewertet, weil Sie die SWOT-Analyse kennen. Sie werden bewertet, weil Sie zeigen können, was die SWOT-Analyse für Jupiter bedeutet — und was sie für die Strategie und den Personalabbau impliziert. Das ist der rote Faden: Die Verbindung zwischen Analyse, Strategie und Umsetzung. Wer die Modelle kennt, aber isoliert anwendet, bekommt eine mittlere Note. Wer die Zusammenhänge explizit herstellt, bekommt eine sehr gute."}, {"section": "Von der Analyse zur Strategie", "text": "Wie führt die Analyse zur Strategie? Die SWOT zeigt: Starke Marke, aber schlechte Kostenstruktur. Daraus folgt: Man muss die Stärken stärken und die Schwächen abbauen. Porter's Five Forces zeigen: Hohe Rivalität, Differenzierung ist der einzige Weg. Daraus folgt: Die Strategie muss auf Differenzierung ausgerichtet sein, nicht auf Kostenführerschaft. Die Finanzanalyse zeigt: Eigenkapital negativ, OR 725a greift. Daraus folgt: Sofortmassnahmen sind rechtlich vorgeschrieben, nicht optional. Die BCG-Matrix zeigt: Dogs schliessen, Stars investieren. Daraus folgt: Zehn Filialen schliessen, E-Commerce aufbauen. Das ist die Logik von Aufgabe 2."}, {"section": "Von der Strategie zum Personalabbau", "text": "Wie führt die Strategie zur Massenentlassung? Wenn zehn Filialen geschlossen werden — BCG und Ansoff begründen das — dann müssen die Mitarbeitenden dieser Filialen entlassen werden. Das ist die direkte Verbindung zwischen Aufgabe 2 und Aufgabe 3. Die Anzahl zu entlassender Mitarbeitenden folgt aus der Filialanalyse: Wie viele Stellen hängen an den geschlossenen Standorten? OR 335h gibt den Rahmen vor: Wie muss die Entlassung rechtlich erfolgen? Das Sanierungsdreieck stellt sicher, dass die Massnahme sinnvoll ist. Kausalkette und Sanierungsmassnahmen zeigen, warum es nötig ist."}, {"section": "Das Assessment-Schema für jede Antwort", "text": "Für jede Antwort im Assessment empfehle ich das dreistufige Schema. Erstens: Methode erklären. Was ist die BCG-Matrix? Wie funktioniert sie? Das zeigt, dass man das Instrument kennt. Zweitens: Auf Jupiter anwenden. Was zeigt die BCG konkret für die Jupiter-Filialen? Welche sind Stars, welche Dogs? Das zeigt, dass man die Methode anwenden kann. Drittens: Den Zusammenhang zur Gesamtstrategie oder zu einer anderen Aufgabe herstellen. «Das BCG-Ergebnis begründet direkt die Schliessung der C-Filialen in Aufgabe 3 und die Investition in E-Commerce in Aufgabe 2.» Das zeigt systemisches Denken — das ist die Königsdisziplin."}, {"section": "Die wichtigsten Modellverbindungen", "text": "Hier sind die wichtigsten Verbindungen, die man im Assessment explizit nennen sollte. SWOT und Porter begründen gemeinsam die Differenzierungsstrategie. BCG und GAP-Analyse begründen die Filialschliessung in Aufgabe 3. Ansoff erklärt die Reihenfolge der Strategieumsetzung — erst stabilisieren, dann wachsen. Finanzanalyse und OR 725a begründen die Dringlichkeit aller Massnahmen. Kausalkette erklärt, wie die Krise entstanden ist. Sanierungsdreieck stellt sicher, dass die Sanierung erfolgreich sein wird. BSC misst, ob die Strategie wirkt. Hersey-Blanchard erklärt, wie Mitarbeitende in der Krise geführt werden müssen."}, {"section": "Die Kernbotschaft für Jupiter", "text": "Jupiter hat alles, was es braucht, um erfolgreich zu sein. Eine starke Marke mit 100-jähriger Geschichte. Exklusive Produkte durch die Partnerschaft mit Lembacher. Das Potenzial eines wachsenden Premium-Marktes. Das Problem ist nicht das Produkt. Das Problem ist die Kostenstruktur — zu viele Filialen, zu hohe Fixkosten. Die Lösung ist klar: Fokussieren. Die stärksten 16 Standorte mit voller Energie betreiben. Digital wachsen ohne neue Fixkosten. Die Marke als einzigartiges Erlebnis positionieren. Wenn Jupiter das konsequent umsetzt, ist der Weg zurück in die Profitabilität in 18 Monaten realistisch. Die Substanz ist da — 44.8 Prozent Bruttogewinnmarge beweist es. Es braucht den Mut, die Substanz freizulegen."}]}];

let cur=null, paraIdx=0, playing=false, utt=null;
let voices=[], selVoice=null, spd=1.0;
let sc=1, ox=0, oy=0, drag=false, sx,sy,sox,soy;

window.addEventListener('DOMContentLoaded',()=>{
  buildList(); initBoard(); loadVoices();
  if(window.speechSynthesis) speechSynthesis.onvoiceschanged=loadVoices;
});

function loadVoices(){
  if(!window.speechSynthesis) return;
  const all=speechSynthesis.getVoices(); if(!all.length) return;
  voices=all;
  const sel=document.getElementById('voice-sel'); sel.innerHTML='';
  [...all].sort((a,b)=>(a.lang.startsWith('de')?0:1)-(b.lang.startsWith('de')?0:1))
    .forEach(v=>{
      const i=all.indexOf(v), o=document.createElement('option'); o.value=i;
      o.textContent=(v.lang.startsWith('de')?'🇩🇪 ':v.lang.startsWith('en')?'🇬🇧 ':'')+v.name;
      if(!selVoice&&v.lang.startsWith('de')){o.selected=true;selVoice=v;}
      sel.appendChild(o);
    });
  if(!selVoice&&all.length) selVoice=all[0];
  document.getElementById('ch-count').textContent=
    `${CHAPTERS.length} Kapitel · ${all.filter(v=>v.lang.startsWith('de')).length} Stimme(n) geladen`;
}

function changeVoice(){ selVoice=voices[+document.getElementById('voice-sel').value]||null; }
function changeSpeed(){
  spd=parseFloat(document.getElementById('speed-sel').value);
  if(playing){const p=paraIdx;stopAll();setTimeout(()=>speak(p),100);}
}

function buildList(){
  const list=document.getElementById('ch-list');
  CHAPTERS.forEach(ch=>{
    const d=document.createElement('div'); d.className='ch-item'; d.id='ci'+ch.id;
    d.innerHTML=`<div class="ch-num">${ch.id}</div>
      <div class="ch-meta">
        <div class="ch-title-list">${ch.icon} ${ch.title}</div>
        <div class="ch-preview">${ch.sub}</div>
      </div>`;
    d.onclick=()=>selectCh(ch); list.appendChild(d);
  });
}

function selectCh(ch){
  stopAll(); cur=ch; paraIdx=0;
  document.querySelectorAll('.ch-item').forEach(e=>e.classList.remove('active'));
  const el=document.getElementById('ci'+ch.id);
  if(el){el.classList.add('active');el.scrollIntoView({behavior:'smooth',block:'nearest'});}
  document.getElementById('ch-now-title').textContent=ch.icon+' '+ch.title;
  document.getElementById('ch-now-sub').textContent=ch.sub;
  setProgress(0);
}

function togglePlay(){
  if(!cur){if(CHAPTERS.length){selectCh(CHAPTERS[0]);speak(0);} return;}
  if(playing){speechSynthesis.cancel();playing=false;updBtn();showWave(false);}
  else speak(paraIdx);
}

function speak(idx){
  if(!cur||!window.speechSynthesis) return;
  if(idx>=cur.paragraphs.length){onDone();return;}
  paraIdx=idx;
  const p=cur.paragraphs[idx];
  const text=(p.section?p.section+'. ':'')+p.text;
  utt=new SpeechSynthesisUtterance(text);
  utt.rate=spd; utt.pitch=1; utt.lang='de-DE';
  if(selVoice) utt.voice=selVoice;
  utt.onstart=()=>{playing=true;updBtn();showWave(true);setProgress((idx/cur.paragraphs.length)*100);};
  utt.onend=()=>speak(idx+1);
  utt.onerror=e=>{if(e.error!=='interrupted'&&e.error!=='canceled'){playing=false;updBtn();showWave(false);}};
  speechSynthesis.speak(utt);
}

function onDone(){
  playing=false;updBtn();showWave(false);setProgress(100);
  document.getElementById('ci'+cur.id)?.classList.add('done');
  const i=CHAPTERS.findIndex(c=>c.id===cur.id);
  if(i>=0&&i<CHAPTERS.length-1) setTimeout(()=>{selectCh(CHAPTERS[i+1]);speak(0);},1200);
}

function stopAll(){
  if(window.speechSynthesis) speechSynthesis.cancel();
  playing=false;paraIdx=0;updBtn();showWave(false);setProgress(0);
}
function prevCh(){const i=CHAPTERS.findIndex(c=>c.id===cur?.id);selectCh(CHAPTERS[Math.max(0,i-1)]);speak(0);}
function nextCh(){const i=CHAPTERS.findIndex(c=>c.id===cur?.id);if(i<CHAPTERS.length-1){selectCh(CHAPTERS[i+1]);speak(0);}}
function seekClick(e){
  if(!cur) return;
  const r=e.currentTarget.getBoundingClientRect();
  const idx=Math.round((e.clientX-r.left)/r.width*(cur.paragraphs.length-1));
  stopAll();speak(Math.max(0,Math.min(idx,cur.paragraphs.length-1)));
}
function setProgress(p){document.getElementById('prog-fill').style.width=p+'%';}
function updBtn(){document.getElementById('btn-play').textContent=playing?'⏸ Pause':'▶ Play';}
function showWave(on){
  document.getElementById('wave').classList.toggle('hidden',!on);
  document.getElementById('wave-label').classList.toggle('hidden',!on);
}

function initBoard(){
  const outer=document.getElementById('canvas-outer');
  setTimeout(fitBoard,150);
  outer.addEventListener('wheel',e=>{
    e.preventDefault();
    const r=outer.getBoundingClientRect(),mx=e.clientX-r.left,my=e.clientY-r.top;
    const d=e.deltaY>0?-0.1:0.1,ns=Math.min(Math.max(sc+d,0.05),10);
    ox=mx-(mx-ox)*(ns/sc);oy=my-(my-oy)*(ns/sc);sc=ns;applyT();
  },{passive:false});
  outer.addEventListener('mousedown',e=>{
    if(e.button!==0)return;drag=true;sx=e.clientX;sy=e.clientY;sox=ox;soy=oy;
    outer.classList.add('grabbing');
  });
  document.addEventListener('mousemove',e=>{if(!drag)return;ox=sox+(e.clientX-sx);oy=soy+(e.clientY-sy);applyT();});
  document.addEventListener('mouseup',()=>{drag=false;document.getElementById('canvas-outer').classList.remove('grabbing');});
  outer.addEventListener('dblclick',fitBoard);
}

function applyT(){document.getElementById('canvas-inner').style.transform=`translate(${ox}px,${oy}px) scale(${sc})`;}
function fitBoard(){
  const outer=document.getElementById('canvas-outer');
  const svg=document.querySelector('#canvas-inner svg');
  if(!svg)return;
  const ow=outer.clientWidth,oh=outer.clientHeight;
  const vb=svg.viewBox.baseVal,svgW=vb.width||5822,svgH=vb.height||2816;
  sc=Math.min(ow/svgW,oh/svgH)*0.97;
  ox=(ow-svgW*sc)/2;oy=(oh-svgH*sc)/2;
  applyT();
}
function zoom(d){sc=Math.min(Math.max(sc+d,0.05),10);applyT();}
function toggleFullscreen(){
  const el=document.getElementById('board-wrap');
  if(!document.fullscreenElement)el.requestFullscreen().catch(()=>{});
  else document.exitFullscreen();
}

document.addEventListener('keydown',e=>{
  if(e.target.tagName==='SELECT'||e.target.tagName==='INPUT')return;
  if(e.code==='Space'){e.preventDefault();togglePlay();}
  if(e.code==='ArrowRight')nextCh();
  if(e.code==='ArrowLeft')prevCh();
  if(e.code==='KeyF')fitBoard();
});
</script>
</body>
</html>
